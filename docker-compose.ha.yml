# HiveRunr — High-Availability Compose file
#
# Extends the base docker-compose.yml with:
#   • PostgreSQL primary + one streaming replica (Bitnami images)
#   • Redis primary + two replicas + three Sentinel processes
#   • Two API replicas behind Caddy
#   • Two Celery workers
#   • Two scheduler replicas (leader-lock ensures only one fires)
#
# Usage:
#   docker compose -f docker-compose.ha.yml --env-file .env up -d
#
# Prerequisites:
#   • Copy .env.example to .env and fill in all values
#   • DATABASE_URL must point to the 'db' primary (writes always go to primary)
#   • REDIS_URL must point to 'redis' (the primary); Sentinel handles failover
#     by redirecting clients — add a Sentinel-aware proxy if needed
#
# NOTE: This file uses Bitnami PostgreSQL images (bitnami/postgresql) instead
# of the standard postgres image for built-in replication support.
# The data volume format is NOT compatible between the two images.
# Start fresh or migrate data first.

version: "3.9"

x-app-env: &app-env
  env_file: .env
  environment:
    - DATABASE_URL=${DATABASE_URL:-postgresql://hiverunr:hiverunr@db:5432/hiverunr}
    - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379/0}
    - DB_POOL_MIN=${DB_POOL_MIN:-2}
    - DB_POOL_MAX=${DB_POOL_MAX:-10}

x-api-base: &api-base
  build: .
  <<: *app-env
  volumes:
    - ./app:/app/app
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:

  # ── PostgreSQL primary ──────────────────────────────────────────────────────
  db:
    image: bitnami/postgresql:16
    environment:
      POSTGRESQL_USERNAME: hiverunr
      POSTGRESQL_PASSWORD: hiverunr
      POSTGRESQL_DATABASE: hiverunr
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicatorpass
    volumes:
      - db_primary_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiverunr"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── PostgreSQL streaming replica ────────────────────────────────────────────
  db-replica:
    image: bitnami/postgresql:16
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_MASTER_HOST: db
      POSTGRESQL_MASTER_PORT_NUMBER: "5432"
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicatorpass
      POSTGRESQL_USERNAME: hiverunr
      POSTGRESQL_PASSWORD: hiverunr
      POSTGRESQL_DATABASE: hiverunr
    volumes:
      - db_replica_data:/bitnami/postgresql
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiverunr"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis primary ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60 1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Redis replicas ──────────────────────────────────────────────────────────
  redis-replica-1:
    image: redis:7-alpine
    command: ["redis-server", "--replicaof", "redis", "6379", "--loglevel", "warning"]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis-replica-2:
    image: redis:7-alpine
    command: ["redis-server", "--replicaof", "redis", "6379", "--loglevel", "warning"]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis Sentinels ─────────────────────────────────────────────────────────
  # Three Sentinel processes provide quorum (2-of-3) for primary election.
  redis-sentinel-1:
    image: redis:7-alpine
    command: >
      sh -c "
        echo 'sentinel monitor mymaster redis 6379 2' > /sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 5000' >> /sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 10000' >> /sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /sentinel.conf &&
        redis-sentinel /sentinel.conf
      "
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis-sentinel-2:
    image: redis:7-alpine
    command: >
      sh -c "
        echo 'sentinel monitor mymaster redis 6379 2' > /sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 5000' >> /sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 10000' >> /sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /sentinel.conf &&
        redis-sentinel /sentinel.conf
      "
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis-sentinel-3:
    image: redis:7-alpine
    command: >
      sh -c "
        echo 'sentinel monitor mymaster redis 6379 2' > /sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 5000' >> /sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 10000' >> /sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /sentinel.conf &&
        redis-sentinel /sentinel.conf
      "
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── API replicas ────────────────────────────────────────────────────────────
  api:
    <<: *api-base
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    deploy:
      replicas: 2

  # ── Celery workers ──────────────────────────────────────────────────────────
  worker:
    <<: *api-base
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    deploy:
      replicas: 2

  # ── Scheduler replicas (leader-lock — only one is active) ──────────────────
  scheduler:
    <<: *api-base
    command: python -m app.scheduler
    deploy:
      replicas: 2

  # ── Reverse proxy (Caddy) ───────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_primary_data:
  db_replica_data:
  redis_data:
  caddy_data:
  caddy_config:
