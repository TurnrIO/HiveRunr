                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontSize:15,fontWeight:700,color:"#e2e8f0",marginBottom:4}}>
                        {selRun.flow_name || `Run #${selRun.id}`}
                      </div>
                      <div style={{fontSize:12,color:"#64748b"}}>
                        Started: {fmtTs(selRun.created_at)}
                        {selRun.updated_at && selRun.status !== "running" && selRun.status !== "queued" && <> · Finished: {fmtTs(selRun.updated_at)}</>}
                      </div>
                    </div>
                    <span style={{fontSize:12,fontWeight:700,padding:"4px 10px",borderRadius:20,
                      background:selRun.status==="succeeded"?"#14532d":selRun.status==="failed"?"#3f1111":"#1e3a5f",
                      color:STATUS_COLOR[selRun.status]||"#94a3b8"}}>
                      {selRun.status}
                    </span>
                  </div>
                  {selRun.error && <div style={{marginTop:10,padding:"8px 10px",background:"#3f1111",borderRadius:6,fontSize:12,color:"#f87171"}}>{selRun.error}</div>}
                </div>

                {traces.length===0
                  ? <div className="empty-state" style={{padding:"30px 0",background:"#1a1d2e",border:"1px solid #2a2d3e",borderRadius:10}}>No trace data for this run.</div>
                  : <div className="trace-table">
                      <table>
                        <thead>
                          <tr>
                            <th style={{width:18}}></th>
                            <th>Node</th>
                            <th>Type</th>
                            <th>Duration</th>
                            <th>Attempts</th>
                            <th>Input / Output</th>
                          </tr>
                        </thead>
                        <tbody>
                          {traces.map((t,i)=>(
                            <TraceRow key={i} t={t} fmtDur={fmtDur} dot={TRACE_DOT}/>
                          ))}
                        </tbody>
                      </table>
                    </div>
                }
              </>
          }
        </div>
      </div>
    </div>
  );
}

function TraceRow({ t, fmtDur, dot }) {
  const [open, setOpen] = useState(false);
  const hasDetail = t.input || t.output || t.error;
  return (
    <>
      <tr className="expandable-row" onClick={()=>hasDetail&&setOpen(o=>!o)}
        style={{cursor:hasDetail?"pointer":"default"}}>
        <td><span className="trace-status-dot" style={{background:dot[t.status]||"#64748b"}}/></td>
        <td style={{color:"#e2e8f0",fontWeight:500}}>{t.label||t.node_id}</td>
        <td style={{fontFamily:"monospace",fontSize:11,color:"#94a3b8"}}>{t.type}</td>
        <td style={{color:"#94a3b8"}}>{fmtDur(t.duration_ms)}</td>
        <td style={{color:"#94a3b8",textAlign:"center"}}>{t.attempts||1}</td>
        <td style={{color:t.status==="error"?"#f87171":"#64748b",fontSize:11}}>
          {t.status==="error" ? t.error : (hasDetail ? (open?"▲ hide":"▼ show") : "—")}
        </td>
      </tr>
      {open && hasDetail && (
        <tr>
          <td colSpan={6} style={{padding:"0 10px 10px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {t.input && <div>
                <div style={{fontSize:10,color:"#64748b",marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Input</div>
                <pre style={{background:"#0a0c14",border:"1px solid #2a2d3e",borderRadius:6,padding:"8px 10px",fontSize:11,color:"#94a3b8",whiteSpace:"pre-wrap",maxHeight:200,overflow:"auto",margin:0}}>
                  {typeof t.input==="string"?t.input:JSON.stringify(t.input,null,2)}
                </pre>
              </div>}
              {(t.output||t.error) && <div>
                <div style={{fontSize:10,color:"#64748b",marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>{t.error?"Error":"Output"}</div>
                <pre style={{background:"#0a0c14",border:`1px solid ${t.error?"#7f1d1d":"#2a2d3e"}`,borderRadius:6,padding:"8px 10px",fontSize:11,color:t.error?"#f87171":"#94a3b8",whiteSpace:"pre-wrap",maxHeight:200,overflow:"auto",margin:0}}>
                  {t.error || (typeof t.output==="string"?t.output:JSON.stringify(t.output,null,2))}
                </pre>
              </div>}
            </div>
          </td>
        </tr>
      )}
    </>
  );
}

// ── Audit Log ─────────────────────────────────────────────────────────────
const ACTION_COLORS = {
  "graph.create":          "#34d399",
  "graph.update":          "#60a5fa",
  "graph.delete":          "#f87171",
  "graph.run":             "#a78bfa",
  "graph.duplicate":       "#60a5fa",
  "graph.restore_version": "#fbbf24",
  "run.delete":            "#f87171",
  "run.clear_all":         "#ef4444",
  "run.trim":              "#fb923c",
  "run.cancel":            "#f87171",
  "run.replay":            "#a78bfa",
  "settings.retention":    "#fbbf24",
  "token.create":          "#34d399",
  "token.delete":          "#f87171",
  "user.create":           "#34d399",
  "user.update_role":      "#fbbf24",
  "user.reset_password":   "#fb923c",
  "user.delete":           "#f87171",
};

function AuditLog({ showToast, user }) {
  const [rows, setRows]           = useState([]);
  const [loading, setLoading]     = useState(false);
  const [filterActor, setFilterActor] = useState("");
  const [filterAction, setFilterAction] = useState("");
  const [offset, setOffset]       = useState(0);
  const PAGE = 100;

  async function load(off=0, actor="", action="") {
    setLoading(true);
    try {
      const params = new URLSearchParams({limit: PAGE, offset: off});
      if (actor.trim())  params.set("actor",  actor.trim());
      if (action.trim()) params.set("action", action.trim());
      const data = await api("GET", `/api/audit-log?${params}`);
      setRows(data || []);
      setOffset(off);
    } catch(e) {
      showToast("Failed to load audit log", "error");
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { load(0, filterActor, filterAction); }, []);

  function handleSearch(e) {
    e.preventDefault();
    load(0, filterActor, filterAction);
  }

  function fmtTime(iso) {
    if (!iso) return "—";
    try {
      return new Date(iso).toLocaleString(undefined, {
        month:"short", day:"numeric", hour:"2-digit", minute:"2-digit", second:"2-digit"
      });
    } catch { return iso; }
  }

  function DetailBadge({ detail }) {
    if (!detail) return null;
    const items = typeof detail === "string" ? JSON.parse(detail) : detail;
    const parts = Object.entries(items)
      .filter(([,v]) => v !== null && v !== undefined)
      .map(([k,v]) => `${k}: ${typeof v === "object" ? JSON.stringify(v) : v}`);
    return (
      <span style={{color:"#64748b",fontSize:11}}>
        {parts.join("  •  ")}
      </span>
    );
  }

  const actionGroups = [
    ["graph.", "Graphs"],
    ["run.",   "Runs"],
    ["settings.", "Settings"],
    ["token.", "Tokens"],
    ["user.",  "Users"],
  ];

  return (
    <div className="page">
      <h1 className="page-title">Audit Log</h1>

      {/* Filter bar */}
      <form onSubmit={handleSearch} style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <input
          className="input" placeholder="Filter by actor…" value={filterActor}
          onChange={e=>setFilterActor(e.target.value)}
          style={{width:180,fontSize:13}}
        />
        <select className="input" value={filterAction} onChange={e=>setFilterAction(e.target.value)}
          style={{width:180,fontSize:13,background:"#0f1117",color:"#e2e8f0",border:"1px solid #2a2d3e",borderRadius:6,padding:"6px 10px"}}>
          <option value="">All actions</option>
          {actionGroups.map(([prefix, label]) => (
            <optgroup key={prefix} label={label}>
              {Object.keys(ACTION_COLORS)
                .filter(a => a.startsWith(prefix))
                .map(a => <option key={a} value={a}>{a}</option>)}
            </optgroup>
          ))}
        </select>
        <button className="btn btn-primary btn-sm" type="submit" disabled={loading}>
          {loading ? "Loading…" : "Search"}
        </button>
        {(filterActor || filterAction) && (
          <button type="button" className="btn btn-ghost btn-sm" onClick={()=>{
            setFilterActor(""); setFilterAction(""); load(0,"","");
          }}>Clear</button>
        )}
      </form>

      {/* Table */}
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead>
            <tr style={{background:"#0f1117",borderBottom:"1px solid #1e2130"}}>
              <th style={{padding:"10px 14px",textAlign:"left",color:"#64748b",fontWeight:500,width:160}}>Time</th>
              <th style={{padding:"10px 14px",textAlign:"left",color:"#64748b",fontWeight:500,width:120}}>Actor</th>
              <th style={{padding:"10px 14px",textAlign:"left",color:"#64748b",fontWeight:500,width:180}}>Action</th>
              <th style={{padding:"10px 14px",textAlign:"left",color:"#64748b",fontWeight:500,width:80}}>Target</th>
              <th style={{padding:"10px 14px",textAlign:"left",color:"#64748b",fontWeight:500}}>Detail</th>
              <th style={{padding:"10px 14px",textAlign:"left",color:"#64748b",fontWeight:500,width:110}}>IP</th>
            </tr>
          </thead>
          <tbody>
            {rows.length === 0 && (
              <tr><td colSpan={6} style={{padding:24,textAlign:"center",color:"#475569"}}>
                {loading ? "Loading…" : "No audit log entries found."}
              </td></tr>
            )}
            {rows.map(r => (
              <tr key={r.id} style={{borderBottom:"1px solid #1e2130"}}
                onMouseEnter={e=>e.currentTarget.style.background="#0f1117"}
                onMouseLeave={e=>e.currentTarget.style.background=""}>
                <td style={{padding:"8px 14px",color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtTime(r.created_at)}</td>
                <td style={{padding:"8px 14px",color:"#e2e8f0",fontFamily:"monospace"}}>{r.actor}</td>
                <td style={{padding:"8px 14px"}}>
                  <span style={{
                    display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:11,
                    fontFamily:"monospace",fontWeight:600,letterSpacing:"0.3px",
                    background: (ACTION_COLORS[r.action]||"#475569")+"22",
                    color: ACTION_COLORS[r.action]||"#94a3b8",
                    border: "1px solid "+(ACTION_COLORS[r.action]||"#475569")+"44",
                  }}>{r.action}</span>
                </td>
                <td style={{padding:"8px 14px",color:"#64748b",fontSize:12}}>
                  {r.target_type && <span>{r.target_type}</span>}
                  {r.target_id && <span style={{color:"#475569"}}> #{r.target_id}</span>}
                </td>
                <td style={{padding:"8px 14px",maxWidth:320,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  <DetailBadge detail={r.detail}/>
                </td>
                <td style={{padding:"8px 14px",color:"#475569",fontFamily:"monospace",fontSize:11}}>{r.ip||"—"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Pagination */}
      <div style={{display:"flex",gap:8,marginTop:12,alignItems:"center"}}>
        <button className="btn btn-ghost btn-sm" disabled={offset===0 || loading}
          onClick={()=>load(Math.max(0,offset-PAGE), filterActor, filterAction)}>← Prev</button>
        <span style={{fontSize:12,color:"#64748b"}}>
          Showing {offset+1}–{offset+rows.length}
        </span>
        <button className="btn btn-ghost btn-sm" disabled={rows.length<PAGE || loading}
          onClick={()=>load(offset+PAGE, filterActor, filterAction)}>Next →</button>
      </div>
    </div>
  );
}

// ── Settings ──────────────────────────────────────────────────────────────
function StatusDot({ status }) {
  const colors = { ok:"#4ade80", warning:"#f59e0b", error:"#f87171", loading:"#64748b" };
  const labels = { ok:"OK", warning:"Warning", error:"Error", loading:"…" };
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12}}>
      <span style={{width:8,height:8,borderRadius:"50%",background:colors[status]||colors.loading,
        boxShadow: status==="ok"?`0 0 5px ${colors.ok}80`: status==="error"?`0 0 5px ${colors.error}80`:"none",
        flexShrink:0}}/>
      <span style={{color:colors[status]||colors.loading,fontWeight:600}}>{labels[status]||status}</span>
    </span>
  );
}

function Settings({ showToast, user }) {
  const [status,     setStatus]     = useState(null);
  const [loadingSt,  setLoadingSt]  = useState(true);
  const [nodes,      setNodes]      = useState([]);
  const [reloading,  setReloading]  = useState(false);
  const [resetting,  setResetting]  = useState(false);
  const [clearing,   setClearing]   = useState(false);
  const [trimming,   setTrimming]   = useState(false);
  const [savingRetention, setSavingRetention] = useState(false);
  const [retention,  setRetention]  = useState({enabled:false, mode:"count", count:500, days:30});
  const [tokens,     setTokens]     = useState([]);
  const [newTokenName, setNewTokenName] = useState("");
  const [newTokenScope, setNewTokenScope] = useState("manage");
  const [newTokenExpiry, setNewTokenExpiry] = useState("");  // days, or "" = never
  const [creatingToken, setCreatingToken] = useState(false);
  const [revealedToken, setRevealedToken] = useState(null); // shown once after creation
  const [confirmState, setConfirmState] = useState(null);
  const webhookBase = `${window.location.origin}/webhook/`;
  const isOwner = user?.role === "owner";

  useEffect(()=>{
    loadStatus();
    loadNodes();
    loadRetention();
    if(isOwner) loadTokens();
  },[isOwner]);

  function loadTokens() {
    api("GET","/api/tokens").then(setTokens).catch(()=>{});
  }

  async function createToken(e) {
    e.preventDefault();
    if(!newTokenName.trim()) return;
    setCreatingToken(true);
    try {
      const body = {name: newTokenName.trim(), scope: newTokenScope};
      const days = parseInt(newTokenExpiry);
      if(days > 0) body.expires_days = days;
      const t = await api("POST","/api/tokens", body);
      setRevealedToken(t);
      setNewTokenName(""); setNewTokenExpiry("");
      loadTokens();
    } catch(err) { showToast(err.message,"error"); }
    setCreatingToken(false);
  }

  async function revokeToken(id, name) {
    setConfirmState({
      message: `Revoke token "${name}"? Any services using it will lose access immediately.`,
      confirmLabel: "Revoke",
      fn: async () => {
        try { await api("DELETE",`/api/tokens/${id}`); loadTokens(); showToast("Token revoked"); }
        catch(err) { showToast(err.message,"error"); }
      }
    });
  }

  async function loadStatus() {
    setLoadingSt(true);
    try { setStatus(await api("GET","/api/system/status")); }
    catch(e) { setStatus(null); }
    setLoadingSt(false);
  }

  async function loadNodes() {
    try { const r = await api("GET","/api/nodes"); setNodes(r.node_types||[]); }
    catch(e) {}
  }

  async function reloadNodes() {
    setReloading(true);
    try {
      const r = await api("POST","/api/admin/reload_nodes");
      setNodes(r.node_types||[]);
      showToast(`Reloaded — ${(r.node_types||[]).length} node types registered`);
    } catch(e) { showToast(e.message,"error"); }
    setReloading(false);
  }

  async function clearRuns() {
    setConfirmState({
      message: "Delete ALL run history? This cannot be undone.",
      confirmLabel: "Delete",
      fn: async () => {
        setClearing(true);
        try { await api("DELETE","/api/runs"); showToast("Run history cleared"); loadStatus(); }
        catch(e) { showToast(e.message,"error"); }
        setClearing(false);
      }
    });
  }

  async function loadRetention() {
    try { setRetention(await api("GET","/api/runs/retention")); }
    catch(e) {}
  }

  async function saveRetention() {
    setSavingRetention(true);
    try {
      const saved = await api("PUT","/api/runs/retention", retention);
      setRetention(saved);
      showToast("Retention policy saved");
    } catch(e) { showToast(e.message,"error"); }
    setSavingRetention(false);
  }

  async function trimNow() {
    const body = retention.mode === "age"
      ? { days: retention.days }
      : { keep: retention.count };
    const modeLabel = retention.mode === "age"
      ? `runs older than ${retention.days} day${retention.days!==1?"s":""}`
      : `all but the ${retention.count} most recent run${retention.count!==1?"s":""}`;
    setConfirmState({
      message: `Delete ${modeLabel}? This cannot be undone.`,
      confirmLabel: "Delete",
      fn: async () => {
        setTrimming(true);
        try {
          const r = await api("POST","/api/runs/trim", body);
          showToast(`Trimmed ${r.deleted} old run${r.deleted!==1?"s":""}`);
          loadStatus();
        } catch(e) { showToast(e.message,"error"); }
        setTrimming(false);
      }
    });
  }

  async function resetSeqs() {
    setConfirmState({
      message: "Reset ID sequences? Only safe when all tables are empty.",
      confirmLabel: "Reset",
      fn: async () => {
        setResetting(true);
        try { await api("POST","/api/maintenance/reset_sequences"); showToast("Sequences reset"); }
        catch(e) { showToast(e.message,"error"); }
        setResetting(false);
      }
    });
  }

  function copyWebhook() {
    navigator.clipboard.writeText(webhookBase).then(()=>showToast("Webhook URL copied")).catch(()=>{});
  }

  const st = status || {};
  const db = st.db || {};
  const redis = st.redis || {};
  const worker = st.worker || {};
  const sys = st.system || {};

  const statusOf = s => loadingSt ? "loading" : (s.status||"error");

  return (
    <div style={{maxWidth:820}}>
      <h1 className="page-title">Settings</h1>

      {/* ── System Health ── */}
      <div className="card">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div className="card-title" style={{margin:0}}>System Health</div>
          <button className="btn btn-ghost btn-sm" onClick={loadStatus} disabled={loadingSt}>
            {loadingSt ? "Checking…" : "↺ Refresh"}
          </button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
          {[
            { label:"Database",      s: statusOf(db),     detail: db.status==="ok" ? `${db.db_size} · ${db.run_count} runs · ${db.flow_count} flows` : db.error },
            { label:"Redis",         s: statusOf(redis),  detail: redis.status==="ok" ? redis.url : redis.error },
            { label:"Celery Worker", s: statusOf(worker), detail: worker.status==="ok" ? `${worker.workers} worker${worker.workers!==1?"s":""} active` : worker.status==="warning" ? "No workers responding" : worker.error },
          ].map(({label,s,detail})=>(
            <div key={label} style={{background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:8,padding:"12px 14px"}}>
              <div style={{fontSize:11,color:"#64748b",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>{label}</div>
              <StatusDot status={s}/>
              {detail && <div style={{fontSize:11,color:"#475569",marginTop:5,wordBreak:"break-all"}}>{detail}</div>}
            </div>
          ))}
        </div>
        {sys.hostname && (
          <div style={{display:"flex",gap:24,flexWrap:"wrap",fontSize:12,color:"#475569",borderTop:"1px solid #1e2130",paddingTop:12}}>
            {[
              ["Version", `v${sys.app_version}`],
              ["Python",  sys.python],
              ["Host",    sys.hostname],
              ["PID",     sys.pid],
              ["Platform",sys.platform],
            ].map(([k,v])=>(
              <span key={k}><span style={{color:"#64748b"}}>{k}: </span>{v}</span>
            ))}
          </div>
        )}
      </div>

      {/* ── API Tokens ── */}
      {isOwner && (
        <div className="card">
          <div className="card-title">API Tokens</div>
          <p style={{fontSize:13,color:"#94a3b8",marginBottom:14}}>
            Tokens allow external services and scripts to call the API without a browser session.
            Preferred: <code style={{color:"#a78bfa"}}>Authorization: Bearer &lt;token&gt;</code> header.
            Legacy: <code style={{color:"#64748b"}}>x-api-token</code> header (also accepted).
            Tokens are shown only once at creation — store them securely.
            Choose <strong>read</strong> for monitoring, <strong>run</strong> for CI pipelines, <strong>manage</strong> for full API access.
          </p>

          {/* generate form */}
          <form onSubmit={createToken} style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
            <input value={newTokenName} onChange={e=>setNewTokenName(e.target.value)}
              placeholder="Token name (e.g. CI pipeline, monitoring)" style={{flex:"1 1 200px",minWidth:160}}/>
            <select value={newTokenScope} onChange={e=>setNewTokenScope(e.target.value)}
              title="Permission scope" style={{width:110,flex:"none"}}>
              <option value="read">read</option>
              <option value="run">run</option>
              <option value="manage">manage</option>
            </select>
            <input value={newTokenExpiry} onChange={e=>setNewTokenExpiry(e.target.value)}
              placeholder="Expires in days" type="number" min="1"
              title="Leave blank for no expiry" style={{width:140,flex:"none"}}/>
            <button type="submit" className="btn btn-primary" disabled={creatingToken||!newTokenName.trim()}>
              {creatingToken?"Generating…":"+ Generate"}
            </button>
          </form>

          {/* token list */}
          {tokens.length === 0 ? (
            <div className="empty-state" style={{padding:"12px 0"}}>No API tokens yet.</div>
          ) : (
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Scope</th>
                  <th>Created</th>
                  <th>Last used</th>
                  <th>Expires</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {tokens.map(t=>{
                  const expired = t.expires_at && new Date(t.expires_at) < new Date();
                  const expiryLabel = !t.expires_at ? "Never"
                    : expired ? <span style={{color:"#f87171"}}>Expired</span>
                    : new Date(t.expires_at).toLocaleDateString();
                  return (
                    <tr key={t.id} style={{opacity: expired ? 0.5 : 1}}>
                      <td style={{fontWeight:500}}>{t.name}</td>
                      <td>
                        <span style={{
                          fontSize:11,fontWeight:600,padding:"2px 7px",borderRadius:10,
                          background: t.scope==="manage"?"#3f2d70": t.scope==="run"?"#1e3a5f":"#1a2e1a",
                          color: t.scope==="manage"?"#c4b5fd": t.scope==="run"?"#60a5fa":"#4ade80",
                        }}>{t.scope||"manage"}</span>
                      </td>
                      <td style={{fontSize:12,color:"#64748b"}}>{new Date(t.created_at).toLocaleString()}</td>
                      <td style={{fontSize:12,color:"#64748b"}}>{t.last_used ? new Date(t.last_used).toLocaleString() : "Never"}</td>
                      <td style={{fontSize:12,color:"#64748b"}}>{expiryLabel}</td>
                      <td>
                        <button className="btn btn-danger btn-sm" onClick={()=>revokeToken(t.id,t.name)}>Revoke</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* ── Token reveal modal ── */}
      {revealedToken && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:2000,
          display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div className="card" style={{width:500,margin:0}}>
            <div className="card-title" style={{color:"#4ade80"}}>✓ Token created — copy it now</div>
            <p style={{fontSize:13,color:"#f87171",marginBottom:12}}>
              This token will <strong>not</strong> be shown again. Copy it and store it securely.
            </p>
            <div style={{background:"#0d0f1a",border:"1px solid #2a2d3e",borderRadius:8,padding:"10px 12px",
              fontFamily:"monospace",fontSize:13,color:"#a78bfa",wordBreak:"break-all",marginBottom:12,
              userSelect:"all",cursor:"text"}}>
              {revealedToken.token}
            </div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:12,display:"flex",gap:16}}>
              <span>Scope: <strong style={{color:"#c4b5fd"}}>{revealedToken.scope||"manage"}</strong></span>
              <span>Expires: <strong style={{color:"#94a3b8"}}>{revealedToken.expires_at ? new Date(revealedToken.expires_at).toLocaleDateString() : "Never"}</strong></span>
            </div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>
              Use as: <code style={{color:"#7dd3fc"}}>Authorization: Bearer {revealedToken.token.slice(0,12)}…</code>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-primary" onClick={()=>{
                navigator.clipboard.writeText(revealedToken.token);
                showToast("Token copied to clipboard");
              }}>⎘ Copy</button>
              <button className="btn btn-ghost" onClick={()=>setRevealedToken(null)}>Done — I've saved it</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Webhook URL ── */}
      <div className="card">
        <div className="card-title">Webhook Base URL</div>
        <p style={{fontSize:13,color:"#94a3b8",marginBottom:10}}>Trigger flows via HTTP. Append the webhook token configured on a Webhook Trigger node.</p>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <code style={{flex:1,padding:"9px 12px",background:"#0f1117",borderRadius:6,fontSize:13,color:"#4ade80",userSelect:"all",border:"1px solid #2a2d3e"}}>{webhookBase}<span style={{color:"#64748b"}}>{"<token>"}</span></code>
          <button className="btn btn-ghost btn-sm" onClick={copyWebhook}>⎘ Copy</button>
        </div>
      </div>

      {/* ── Quick Links ── */}
      <div className="card">
        <div className="card-title">Quick Links</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <button className="btn btn-primary btn-sm" onClick={()=>window.open("/canvas")}>⚡ Open Canvas →</button>
          <a href="/flower/" target="_blank" className="btn btn-ghost btn-sm">🌸 Flower monitor ↗</a>
          <a href="/docs"    target="_blank" className="btn btn-ghost btn-sm">📖 Swagger docs ↗</a>
        </div>
      </div>

      {/* ── Node Registry ── */}
      <div className="card">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div className="card-title" style={{margin:0}}>Node Registry</div>
          <button className="btn btn-ghost btn-sm" onClick={reloadNodes} disabled={reloading}>
            {reloading?"Reloading…":"↺ Reload custom nodes"}
          </button>
        </div>
        <p style={{fontSize:13,color:"#94a3b8",marginBottom:12}}>{nodes.length} node type{nodes.length!==1?"s":""} registered. Custom nodes live in <code style={{color:"#a78bfa"}}>app/nodes/custom/</code> and can be hot-reloaded without a restart.</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {nodes.map(n=>(
            <span key={n} style={{background:"#1e2130",border:"1px solid #2a2d3e",borderRadius:4,padding:"3px 8px",fontSize:11,color:"#94a3b8",fontFamily:"monospace"}}>{n}</span>
          ))}
        </div>
      </div>

      {/* ── Run Retention Policy ── */}
      <div className="card">
        <div className="card-title">Run History &amp; Retention</div>
        {db.run_count != null && (
          <p style={{fontSize:13,color:"#94a3b8",marginBottom:16}}>
            {db.run_count} run{db.run_count!==1?"s":""} stored in the database.
          </p>
        )}

        {/* Auto-trim toggle */}
        <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:14,userSelect:"none"}}>
          <div style={{
            position:"relative",width:36,height:20,borderRadius:10,flexShrink:0,
            background:retention.enabled?"#7c3aed":"#2a2d3e",
            transition:"background .2s",cursor:"pointer"
          }} onClick={()=>setRetention(r=>({...r,enabled:!r.enabled}))}>
            <div style={{
              position:"absolute",top:2,left:retention.enabled?18:2,width:16,height:16,
              borderRadius:"50%",background:"#fff",transition:"left .2s"
            }}/>
          </div>
          <span style={{fontSize:13,color:"#e2e8f0",fontWeight:500}}>Auto-trim runs nightly</span>
          {retention.enabled && <span style={{fontSize:11,color:"#4ade80",fontWeight:600}}>ON</span>}
        </label>

        {/* Mode + value selector */}
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:16,
          opacity: retention.enabled ? 1 : 0.45, pointerEvents: retention.enabled ? "auto" : "none"}}>
          <select value={retention.mode}
            onChange={e=>setRetention(r=>({...r,mode:e.target.value}))}
            style={{background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:6,
              padding:"5px 10px",color:"#e2e8f0",fontSize:13}}>
            <option value="count">Keep last N runs</option>
            <option value="age">Delete runs older than N days</option>
          </select>
          <input type="number" min="1"
            value={retention.mode==="age" ? retention.days : retention.count}
            onChange={e=>{
              const v = Math.max(1, parseInt(e.target.value)||1);
              setRetention(r=>retention.mode==="age" ? {...r,days:v} : {...r,count:v});
            }}
            style={{width:80,background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:6,
              padding:"5px 8px",color:"#e2e8f0",fontSize:13}}/>
          <span style={{fontSize:13,color:"#94a3b8"}}>
            {retention.mode==="age" ? "days" : "runs"}
          </span>
        </div>

        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:16}}>
          <button className="btn btn-primary btn-sm" onClick={saveRetention} disabled={savingRetention}>
            {savingRetention ? "Saving…" : "Save policy"}
          </button>
          <button className="btn btn-ghost btn-sm" onClick={trimNow} disabled={trimming}>
            {trimming ? "Trimming…" : "✂ Trim now"}
          </button>
          <span style={{fontSize:11,color:"#475569"}}>
            Trim now applies the current mode and value immediately.
          </span>
        </div>

        <div style={{borderTop:"1px solid #1e2130",paddingTop:12}}>
          <button className="btn btn-danger btn-sm" onClick={clearRuns} disabled={clearing}>
            {clearing ? "Clearing…" : "🗑 Clear all run history"}
          </button>
          <span style={{fontSize:11,color:"#475569",marginLeft:10}}>Permanently deletes all run records and traces.</span>
        </div>
      </div>

      {/* ── Maintenance ── */}
      <div className="card" style={{borderColor:"#7f1d1d44"}}>
        <div className="card-title" style={{color:"#f87171"}}>Danger Zone</div>
        <p style={{fontSize:13,color:"#94a3b8",marginBottom:12}}>Reset PostgreSQL ID sequences back to 1. <strong style={{color:"#f87171"}}>Only run this when all tables are completely empty</strong>, otherwise it will cause duplicate key errors.</p>
        <button className="btn btn-danger btn-sm" disabled={resetting} onClick={resetSeqs}>{resetting?"Resetting…":"Reset ID sequences"}</button>
      </div>
      {confirmState && <ConfirmModal message={confirmState.message} confirmLabel={confirmState.confirmLabel} onConfirm={()=>{confirmState.fn();setConfirmState(null);}} onCancel={()=>setConfirmState(null)}/>}
    </div>
  );
}

// ── Graphs ────────────────────────────────────────────────────────────────
function Graphs({ showToast, user }) {
  const [graphs, setGraphs]     = useState([]);
  const [loading, setLoading]   = useState(true);
  const [running, setRunning]   = useState(null);
  const [search, setSearch]     = useState("");
  const [reseeding, setReseeding] = useState(false);
  const [confirmState, setConfirmState] = useState(null);

  const load = useCallback(async () => {
    try { setGraphs(await api("GET","/api/graphs")); }
    catch(e) { showToast(e.message,"error"); }
    setLoading(false);
  }, []);
  useEffect(()=>{ load(); },[]);

  async function reseedExamples() {
    setConfirmState({
      message: "Re-seed all example flows? Missing examples will be restored; existing ones are left unchanged.",
      confirmLabel: "Re-seed",
      fn: async () => {
        setReseeding(true);
        try { await api("POST","/api/graphs/reseed"); showToast("Examples re-seeded"); load(); }
        catch(e) { showToast(e.message,"error"); }
        setReseeding(false);
      }
    });
  }

  async function renameGraph(g) {
    const newName = window.prompt("Rename flow:", g.name);
    if(!newName || newName.trim() === g.name) return;
    try { await api("PUT",`/api/graphs/${g.id}`,{name:newName.trim()}); showToast("Renamed"); load(); }
    catch(e) { showToast(e.message,"error"); }
  }

  async function runGraph(id, name) {
    setRunning(id);
    try { await api("POST",`/api/graphs/${id}/run`,{source:"admin"}); showToast(`Queued: ${name}`); }
    catch(e) { showToast(e.message,"error"); }
    setRunning(null);
  }

  async function toggleGraph(id, enabled) {
    try { await api("PUT",`/api/graphs/${id}`,{enabled:!enabled}); load(); showToast(enabled?"Disabled":"Enabled"); }
    catch(e) { showToast(e.message,"error"); }
  }

  async function duplicateGraph(g) {
    try {
      const copy = await api("POST",`/api/graphs/${g.id}/duplicate`);
      showToast(`Duplicated as "${copy.name}"`); load();
    } catch(e) { showToast(e.message,"error"); }
  }

  async function deleteGraph(id, name) {
    setConfirmState({
      message: `Delete "${name}"? This cannot be undone.`,
      confirmLabel: "Delete",
      fn: async () => {
        try { await api("DELETE",`/api/graphs/${id}`); showToast("Deleted"); load(); }
        catch(e) { showToast(e.message,"error"); }
      }
    });
  }

  const EXAMPLE_RE = /^[📧🤖🔄⚠⚡🔍🧪📊🐍⏰💻📁]/u;
  const isExample = (name) => EXAMPLE_RE.test(name);

  const q = search.toLowerCase();
  const filtered = graphs.filter(g => !q || g.name.toLowerCase().includes(q) || (g.description||"").toLowerCase().includes(q));
  const exampleFlows = filtered.filter(g=>isExample(g.name));
  const userFlows    = filtered.filter(g=>!isExample(g.name));

  const ro = user?.role === "viewer";
  return (
    <div>
      {ro && <ViewerBanner/>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <h1 className="page-title" style={{marginBottom:0}}>Canvas Flows</h1>
        {!ro && <div style={{display:"flex",gap:8}}>
          <button className="btn btn-ghost" disabled={reseeding} onClick={reseedExamples} title="Restore any missing example flows">
            {reseeding ? "Reseeding…" : "↺ Restore examples"}
          </button>
          <a href={`/canvas`} className="btn btn-primary">+ New in Canvas</a>
        </div>}
      </div>

      <div style={{marginBottom:16}}>
        <input style={{width:"100%",background:"#1a1d2e",color:"#e2e8f0",border:"1px solid #2a2d3e",borderRadius:8,padding:"8px 12px",fontSize:13}}
          placeholder="🔍  Search flows…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>

      {loading ? <div className="empty-state">Loading…</div> :
       graphs.length === 0 ? (
        <div className="card">
          <div className="empty-state" style={{padding:"40px 0"}}>
            No graphs yet.<br/>
            <a href={`/canvas`} style={{color:"#a78bfa",textDecoration:"none",marginTop:8,display:"inline-block"}}>Open the canvas to create your first flow →</a>
          </div>
        </div>
      ) : filtered.length === 0 ? (
        <div className="card"><div className="empty-state">No flows match "{search}".</div></div>
      ) : (
        <div>
          {/* ── example graphs ── */}
          {exampleFlows.length > 0 && (
            <div className="card" style={{marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <div className="card-title" style={{marginBottom:0}}>Example Flows <span style={{fontSize:11,color:"#64748b",fontWeight:400}}>({exampleFlows.length})</span></div>
                <span style={{fontSize:11,color:"#64748b"}}>Duplicate to make your own copy</span>
              </div>
              {exampleFlows.map(g=>(
                <GraphRow key={g.id} g={g} running={running} onRun={runGraph} onToggle={toggleGraph} onDuplicate={duplicateGraph} onDelete={deleteGraph} onRename={renameGraph} showToast={showToast} load={load} isExample={true} ro={ro}/>
              ))}
            </div>
          )}
          {/* ── custom graphs ── */}
          {userFlows.length > 0 && (
            <div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <div className="card-title" style={{marginBottom:0}}>Your Flows <span style={{fontSize:11,color:"#64748b",fontWeight:400}}>({userFlows.length})</span></div>
              </div>
              {userFlows.map(g=>(
                <GraphRow key={g.id} g={g} running={running} onRun={runGraph} onToggle={toggleGraph} onDuplicate={duplicateGraph} onDelete={deleteGraph} onRename={renameGraph} showToast={showToast} load={load} isExample={false}/>
              ))}
            </div>
          )}
        </div>
      )}
      {confirmState && <ConfirmModal message={confirmState.message} confirmLabel={confirmState.confirmLabel} onConfirm={()=>{confirmState.fn();setConfirmState(null);}} onCancel={()=>setConfirmState(null)}/>}
    </div>
  );
}

function GraphRow({ g, running, onRun, onToggle, onDuplicate, onDelete, onRename, showToast, load, isExample, ro }) {
  const [open, setOpen] = useState(false);
  const [showVersions, setShowVersions] = useState(false);
  const [versions, setVersions] = useState([]);
  const [loadingVersions, setLoadingVersions] = useState(false);
  const [previewVersion, setPreviewVersion] = useState(null);  // {version, graph_data, note, saved_at}
  const [loadingPreview, setLoadingPreview] = useState(false);
  const [confirmState, setConfirmState] = useState(null);
  const [showAlerts, setShowAlerts] = useState(false);
  const [alertCfg, setAlertCfg] = useState({alert_emails:"",alert_webhook:"",alert_on_success:false});
  const [savingAlerts, setSavingAlerts] = useState(false);
  const nodeCount = ((g.graph_data?.nodes)||[]).filter(n=>n.type!=="note").length;

  useEffect(()=>{
    if (!showVersions) return;
    const h = e => { if(e.key==="Escape") setShowVersions(false); };
    document.addEventListener("keydown",h);
    return ()=>document.removeEventListener("keydown",h);
  }, [showVersions]);

  async function openVersionHistory() {
    setLoadingVersions(true);
    try {
      const v = await api("GET",`/api/graphs/${g.id}/versions`);
      setVersions(v);
      setShowVersions(true);
    } catch(e) { showToast(e.message,"error"); }
    setLoadingVersions(false);
  }

  async function previewVer(v) {
    setLoadingPreview(v.id);
    try {
      const full = await api("GET",`/api/graphs/${g.id}/versions/${v.id}`);
      setPreviewVersion(full);
    } catch(e) { showToast(e.message,"error"); }
    setLoadingPreview(false);
  }

  async function openAlerts() {
    try {
      const cfg = await api("GET",`/api/graphs/${g.id}/alerts`);
      setAlertCfg({
        alert_emails:    cfg.alert_emails    || "",
        alert_webhook:   cfg.alert_webhook   || "",
        alert_on_success: cfg.alert_on_success || false,
      });
      setShowAlerts(true);
    } catch(e) { showToast(e.message,"error"); }
  }

  async function saveAlerts() {
    setSavingAlerts(true);
    try {
      await api("PUT",`/api/graphs/${g.id}/alerts`, {
        alert_emails:    alertCfg.alert_emails.trim()   || null,
        alert_webhook:   alertCfg.alert_webhook.trim()  || null,
        alert_on_success: alertCfg.alert_on_success,
      });
      showToast("Alert settings saved");
      setShowAlerts(false);
    } catch(e) { showToast(e.message,"error"); }
    setSavingAlerts(false);
  }

  async function restoreVersion(vid) {
    setConfirmState({
      message: "Restore this version? Current changes will be lost.",
      confirmLabel: "Restore",
      fn: async () => {
        try {
          await api("POST",`/api/graphs/${g.id}/versions/${vid}/restore`);
          showToast("Version restored");
          load();
          setShowVersions(false);
          setPreviewVersion(null);
        } catch(e) { showToast(e.message,"error"); }
      }
    });
  }

  return (
    <>
      <div style={{borderBottom:"1px solid #1e2235",paddingBottom:12,marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
              <span style={{fontWeight:600,fontSize:14,color:"#e2e8f0"}}>{g.name}</span>
              <span className={`badge ${g.enabled?"badge-succeeded":"badge-cancelled"}`}>{g.enabled?"enabled":"disabled"}</span>
              <span style={{fontSize:11,color:"#4b5563"}}>#{g.id} · {nodeCount} node{nodeCount!==1?"s":""}</span>
            </div>
            {g.description && <div style={{fontSize:12,color:"#64748b"}}>{g.description}</div>}
          </div>
          <div style={{display:"flex",gap:6,flex:"none"}}>
            <a className="btn btn-ghost" href={`/canvas#graph-${g.id}`}>{ro?"👁 View":"✏️ Edit"}</a>
            {!ro && <button className="btn btn-success" disabled={running===g.id||!g.enabled}
                    onClick={()=>onRun(g.id,g.name)}>{running===g.id?"…":"▶"}</button>}
            {!ro && <button className="btn btn-ghost" onClick={()=>setOpen(o=>!o)} aria-expanded={open}>⋯</button>}
          </div>
        </div>
        {open && (
          <div style={{display:"flex",gap:8,marginTop:10,paddingTop:10,borderTop:"1px solid #1e2235",flexWrap:"wrap"}}>
            <button className="btn btn-ghost" onClick={()=>onRename(g)}>✏ Rename</button>
            <button className="btn btn-ghost" onClick={()=>onDuplicate(g)}>📋 Duplicate</button>
            <button className="btn btn-ghost" onClick={openVersionHistory} disabled={loadingVersions}>📜 History</button>
            <button className="btn btn-ghost" onClick={openAlerts}>🔔 Alerts</button>
            <button className="btn btn-ghost" onClick={()=>onToggle(g.id,g.enabled)}>{g.enabled?"⏸ Disable":"▶ Enable"}</button>
            <div style={{flex:1}}/>
            <div style={{fontSize:11,color:"#4b5563",alignSelf:"center",display:"flex",gap:8,alignItems:"center"}}>
              Webhook: <span style={{fontFamily:"monospace",fontSize:12,color:"#94a3b8"}}>{"••••••••"}</span>
              <button className="btn btn-ghost" style={{marginLeft:8,padding:"3px 8px",fontSize:11}} onClick={()=>navigator.clipboard.writeText(g.webhook_token).then(()=>showToast("Copied")).catch(()=>showToast("Copy failed","error"))}>Copy</button>
            </div>
            <button className="btn btn-danger" onClick={()=>onDelete(g.id,g.name)}
              title={isExample ? "⚠ This is an example flow — use ↺ Restore examples to get it back" : undefined}>
              🗑 Delete{isExample?" (example)":""}
            </button>
          </div>
        )}
      </div>

      {showVersions && (
        <div className="modal-overlay" onClick={e=>{ if(e.target.className==="modal-overlay"){ setShowVersions(false); setPreviewVersion(null); }}}>
          <div className="modal" style={{width: previewVersion ? 700 : 480, maxWidth:"95vw"}}>
            <h2>📜 Version History — {g.name}</h2>
            <div style={{display:"grid", gridTemplateColumns: previewVersion ? "220px 1fr" : "1fr", gap:16, marginTop:12}}>
              {/* Version list */}
              <div>
                {versions.length === 0 ? (
                  <div className="empty-state" style={{padding:"20px 0"}}>No versions yet — versions are saved automatically each time you save the flow.</div>
                ) : versions.map((v,idx)=>(
                  <div key={idx} className="version-row"
                    style={{background: previewVersion?.id===v.id ? "#252840" : "transparent",
                            borderLeft: `3px solid ${previewVersion?.id===v.id ? "#7c3aed" : "transparent"}`,
                            borderRadius:4, paddingLeft:6}}>
                    <div className="version-info" style={{flex:1, cursor:"pointer"}} onClick={()=>previewVer(v)}>
                      <div className="version-num">v{v.version}</div>
                      <div className="version-date">{new Date(v.saved_at).toLocaleString()}</div>
                      {v.note && <div className="version-note">{v.note}</div>}
                    </div>
                    <div style={{display:"flex",gap:4}}>
                      <button className="btn btn-ghost btn-sm"
                        disabled={loadingPreview===v.id}
                        onClick={()=>previewVer(v)}>
                        {loadingPreview===v.id ? "…" : "👁"}
                      </button>
                      {!ro && <button className="btn btn-ghost btn-sm" onClick={()=>restoreVersion(v.version)}>↩</button>}
                    </div>
                  </div>
                ))}
              </div>

              {/* Preview panel */}
              {previewVersion && (
                <div style={{borderLeft:"1px solid #2a2d3e", paddingLeft:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <span style={{fontWeight:600,color:"#e2e8f0"}}>v{previewVersion.version} preview</span>
                    <div style={{display:"flex",gap:6}}>
                      {!ro && <button className="btn btn-primary btn-sm"
                        onClick={()=>restoreVersion(previewVersion.version)}>↩ Restore this version</button>}
                      <button className="btn btn-ghost btn-sm" onClick={()=>setPreviewVersion(null)}>✕</button>
                    </div>
                  </div>
                  {previewVersion.note && <div style={{fontSize:12,color:"#94a3b8",marginBottom:10,fontStyle:"italic"}}>{previewVersion.note}</div>}
                  <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>
                    {(() => {
                      const nodes = (previewVersion.graph_data?.nodes||[]).filter(n=>n.type!=="note");
                      const edges = previewVersion.graph_data?.edges||[];
                      return `${nodes.length} node${nodes.length!==1?"s":""} · ${edges.length} edge${edges.length!==1?"s":""}`;
                    })()}
                  </div>
                  <div style={{fontSize:11,color:"#64748b",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>Nodes</div>
                  <div style={{maxHeight:180,overflowY:"auto",marginBottom:10}}>
                    {(previewVersion.graph_data?.nodes||[]).filter(n=>n.type!=="note").map((n,i)=>(
                      <div key={i} style={{display:"flex",gap:8,padding:"3px 0",borderBottom:"1px solid #1e2130",fontSize:12}}>
                        <span style={{color:"#94a3b8",fontFamily:"monospace",fontSize:10,flex:"none",width:90,overflow:"hidden",textOverflow:"ellipsis"}}>{n.type}</span>
                        <span style={{color:"#e2e8f0"}}>{n.data?.label || n.id}</span>
                      </div>
                    ))}
                  </div>
                  <details>
                    <summary style={{fontSize:11,color:"#475569",cursor:"pointer",marginBottom:4}}>Raw JSON</summary>
                    <pre style={{background:"#0a0c14",border:"1px solid #1e2235",borderRadius:6,padding:"8px 10px",
                      fontSize:10,color:"#64748b",maxHeight:160,overflowY:"auto",whiteSpace:"pre-wrap",margin:0}}>
                      {JSON.stringify(previewVersion.graph_data,null,2)}
                    </pre>
                  </details>
                </div>
              )}
            </div>
            <div className="modal-btns">
              <button className="btn btn-ghost" onClick={()=>{ setShowVersions(false); setPreviewVersion(null); }}>Close</button>
            </div>
          </div>
        </div>
      )}
      {confirmState && <ConfirmModal message={confirmState.message} confirmLabel={confirmState.confirmLabel} onConfirm={()=>{confirmState.fn();setConfirmState(null);}} onCancel={()=>setConfirmState(null)}/>}

      {showAlerts && (
        <div className="modal-overlay" onClick={e=>{ if(e.target.className==="modal-overlay") setShowAlerts(false); }}>
          <div className="modal" style={{maxWidth:480}}>
            <h2>🔔 Alert Settings — {g.name}</h2>
            <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>
              Notifications are sent when this flow fails. Enable "also on success" to alert on every run.
            </p>

            <div className="field-group">
              <label className="field-label">Email recipients</label>
              <input className="field-input" type="text" placeholder="alice@example.com, bob@example.com"
                value={alertCfg.alert_emails}
                onChange={e=>setAlertCfg(c=>({...c,alert_emails:e.target.value}))}/>
              <div style={{fontSize:11,color:"#475569",marginTop:4}}>Comma-separated. Requires AGENTMAIL_API_KEY in .env.</div>
            </div>

            <div className="field-group">
              <label className="field-label">Webhook URL</label>
              <input className="field-input" type="url" placeholder="https://hooks.example.com/…"
                value={alertCfg.alert_webhook}
                onChange={e=>setAlertCfg(c=>({...c,alert_webhook:e.target.value}))}/>
              <div style={{fontSize:11,color:"#475569",marginTop:4}}>POST JSON with event, flow, task_id, status, error.</div>
            </div>

            <div className="field-group" style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <input type="checkbox" id={`alert-success-${g.id}`} checked={alertCfg.alert_on_success}
                onChange={e=>setAlertCfg(c=>({...c,alert_on_success:e.target.checked}))}
                style={{width:16,height:16,accentColor:"#7c3aed",cursor:"pointer"}}/>
              <label htmlFor={`alert-success-${g.id}`} style={{fontSize:13,color:"#94a3b8",cursor:"pointer",margin:0}}>
                Also alert on successful runs
              </label>
            </div>

            <div className="modal-btns">
              <button className="btn btn-ghost" onClick={()=>setShowAlerts(false)}>Cancel</button>
              <button className="btn btn-primary" disabled={savingAlerts} onClick={saveAlerts}>
                {savingAlerts ? "Saving…" : "Save alerts"}
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ── Templates ─────────────────────────────────────────────────────────────
const CATEGORY_COLORS = {
  "Monitoring":   "#0891b2",
  "Integrations": "#7c3aed",
  "Productivity": "#059669",
  "Reporting":    "#d97706",
  "AI":           "#8b5cf6",
  "General":      "#475569",
};

function Templates({ showToast }) {
  const [templates, setTemplates] = useState([]);
  const [loading, setLoading]     = useState(true);
  const [importing, setImporting] = useState(null);

  useEffect(() => {
    api("GET", "/api/templates")
      .then(setTemplates)
      .catch(e => showToast(e.message, "error"))
      .finally(() => setLoading(false));
  }, []);

  async function useTemplate(t) {
    setImporting(t.id);
    try {
      const g = await api("POST", `/api/templates/${t.id}/use`, {});
      showToast(`Flow "${g.name}" created! Open it in Canvas Flows.`);
    } catch(e) {
      showToast("Failed: " + e.message, "error");
    }
    setImporting(null);
  }

  // Group by category
  const groups = {};
  templates.forEach(t => {
    if (!groups[t.category]) groups[t.category] = [];
    groups[t.category].push(t);
  });

  return (
    <div className="page">
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:24}}>
        <div>
          <h1 className="page-title" style={{marginBottom:6}}>📐 Workflow Templates</h1>
          <div style={{fontSize:13,color:"#64748b"}}>Start from a pre-built template — click <strong style={{color:"#94a3b8"}}>Use template</strong> to create a flow, then edit it in Canvas Flows.</div>
        </div>
      </div>
      {loading && <div style={{color:"#64748b",padding:24}}>Loading templates…</div>}
      {!loading && templates.length === 0 && (
        <div style={{color:"#64748b",padding:24}}>No templates found. Add JSON files to <code>app/templates/</code>.</div>
      )}
      {Object.entries(groups).map(([category, items]) => (
        <div key={category} style={{marginBottom:32}}>
          <div style={{fontSize:11,fontWeight:600,color:(CATEGORY_COLORS[category]||"#94a3b8"),
            textTransform:"uppercase",letterSpacing:".08em",marginBottom:12,paddingBottom:6,
            borderBottom:`1px solid ${(CATEGORY_COLORS[category]||"#2a2d3e")}44`}}>
            {category}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
            {items.map(t => (
              <div key={t.id} style={{background:"#181b2e",border:"1px solid #2a2d3e",borderRadius:10,
                padding:"16px 18px",display:"flex",flexDirection:"column",gap:8,
                transition:"border-color .15s",cursor:"default"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=(CATEGORY_COLORS[t.category]||"#7c3aed")}
                onMouseLeave={e=>e.currentTarget.style.borderColor="#2a2d3e"}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
                  <div style={{fontWeight:600,color:"#e2e8f0",fontSize:14}}>{t.name}</div>
                  <span style={{fontSize:10,color:(CATEGORY_COLORS[t.category]||"#475569"),
                    background:(CATEGORY_COLORS[t.category]||"#475569")+"22",
                    borderRadius:4,padding:"2px 7px",whiteSpace:"nowrap"}}>{t.category}</span>
                </div>
                <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6}}>{t.description}</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4}}>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {(t.tags||[]).map(tag=>(
                      <span key={tag} style={{fontSize:10,color:"#64748b",background:"#0f1117",
                        borderRadius:3,padding:"1px 6px",border:"1px solid #2a2d3e"}}>{tag}</span>
                    ))}
                    <span style={{fontSize:10,color:"#4b5563"}}>
                      {t.node_count} node{t.node_count!==1?"s":""}
                    </span>
                  </div>
                  <button
                    className="btn btn-primary btn-sm"
                    disabled={importing === t.id}
                    onClick={()=>useTemplate(t)}
                    style={{minWidth:80}}>
                    {importing===t.id ? "Importing…" : "Use template"}
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Users & Permissions ────────────────────────────────────────────────────
const ROLE_META = {
  owner: { label:"Owner",  color:"#f59e0b", bg:"#f59e0b14", desc:"Full access to everything, including user management and danger-zone actions. Only one owner account exists." },
  admin: { label:"Admin",  color:"#a78bfa", bg:"#7c3aed14", desc:"Full access to flows, schedules, credentials, scripts, and settings. Can manage viewer accounts." },
  viewer:{ label:"Viewer", color:"#64748b", bg:"#64748b14", desc:"Read-only access. Can view flows, runs, metrics, and logs but cannot create, edit, delete, or trigger anything." },
};

function RoleBadge({ role }) {
  const m = ROLE_META[role] || ROLE_META.viewer;
  return <span style={{fontSize:10,fontWeight:700,borderRadius:4,padding:"2px 7px",
    background:m.bg,color:m.color,textTransform:"uppercase",letterSpacing:".05em"}}>{m.label}</span>;
}

function Users({ showToast, user }) {
  const [users, setUsers]   = useState([]);
  const [form, setForm]     = useState({username:"",email:"",password:"",role:"viewer"});
  const [creating, setCreating] = useState(false);
  const [resetModal, setResetModal] = useState(null); // {id, username}
  const [newPw, setNewPw]   = useState("");
  const [confirmState, setConfirmState] = useState(null);
  const isOwner = user?.role === "owner";
  const isAdmin = user?.role === "admin" || isOwner;

  const load = () => api("GET","/api/users").then(setUsers).catch(()=>{});
  useEffect(()=>{ load(); },[]);

  async function create(e) {
    e.preventDefault();
    setCreating(true);
    try {
      await api("POST","/api/users", form);
      setForm({username:"",email:"",password:"",role:"viewer"});
      load(); showToast("User created");
    } catch(err) { showToast(err.message,"error"); }
    setCreating(false);
  }

  async function changeRole(id, role) {
    try { await api("PATCH",`/api/users/${id}/role`,{role}); load(); showToast("Role updated"); }
    catch(err) { showToast(err.message,"error"); }
  }

  async function deleteUser(id, username) {
    setConfirmState({
      message: `Delete user "${username}"? This cannot be undone.`,
      confirmLabel: "Delete",
      fn: async () => {
        try { await api("DELETE",`/api/users/${id}`); load(); showToast("User deleted"); }
        catch(err) { showToast(err.message,"error"); }
      }
    });
  }

  async function resetPassword(e) {
    e.preventDefault();
    try {
      await api("POST",`/api/users/${resetModal.id}/reset-password`,{new_password:newPw});
      setResetModal(null); setNewPw(""); showToast("Password reset");
    } catch(err) { showToast(err.message,"error"); }
  }

  return (
    <div>
      <h1 className="page-title">Users &amp; Permissions</h1>

      {/* ── Role documentation ── */}
      <div className="card">
        <div className="card-title">Roles &amp; Permissions</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:12,marginBottom:4}}>
          {Object.entries(ROLE_META).map(([role,m])=>(
            <div key={role} style={{background:m.bg,border:`1px solid ${m.color}33`,borderRadius:10,padding:"12px 14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{fontSize:18}}>{role==="owner"?"👑":role==="admin"?"🛡":"👁"}</span>
                <span style={{fontWeight:700,color:m.color,fontSize:13}}>{m.label}</span>
              </div>
              <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.55,margin:0}}>{m.desc}</p>
            </div>
          ))}
        </div>
        <p style={{fontSize:12,color:"#475569",marginTop:10}}>
          Roles are enforced on both the API and UI layers. The owner account cannot be deleted or demoted.
          Password resets for any user can be performed by the owner; admins can reset viewer passwords.
        </p>
      </div>

      {/* ── Create user ── */}
      {isAdmin && (
        <div className="card">
          <div className="card-title">Create User</div>
          <form onSubmit={create}>
            <div className="form-row">
              <div className="form-group">
                <label>Username</label>
                <input required value={form.username} onChange={e=>setForm({...form,username:e.target.value})} placeholder="jsmith"/>
              </div>
              <div className="form-group">
                <label>Email</label>
                <input required type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="j@example.com"/>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Password</label>
                <input required type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="At least 8 characters"/>
              </div>
              <div className="form-group">
                <label>Role</label>
                <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                  <option value="viewer">Viewer — read-only</option>
                  {isOwner && <option value="admin">Admin — full access</option>}
                </select>
              </div>
            </div>
            <button type="submit" className="btn btn-primary" disabled={creating}>{creating?"Creating…":"+ Create User"}</button>
          </form>
        </div>
      )}

      {/* ── Users table ── */}
      <div className="card">
        <div className="card-title">All Users</div>
        {users.length === 0 ? <div className="empty-state">No users found.</div> : (
          <table>
            <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Joined</th>{isAdmin && <th></th>}</tr></thead>
            <tbody>
              {users.map(u=>{
                const isMe = user?.id === u.id;
                const canEdit = isOwner || (isAdmin && u.role !== "owner" && u.role !== "admin");
                return (
                  <tr key={u.id}>
                    <td>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:28,height:28,borderRadius:"50%",flexShrink:0,
                          background: u.role==="owner"?"#f59e0b22": u.role==="admin"?"#7c3aed22":"#64748b22",
                          border:`1px solid ${u.role==="owner"?"#f59e0b55":u.role==="admin"?"#7c3aed55":"#64748b55"}`,
                          display:"flex",alignItems:"center",justifyContent:"center",
                          fontSize:11,fontWeight:700,
                          color: u.role==="owner"?"#f59e0b":u.role==="admin"?"#a78bfa":"#64748b"}}>
                          {u.username[0].toUpperCase()}
                        </div>
                        <span style={{fontWeight:500}}>{u.username}{isMe && <span style={{fontSize:10,color:"#475569",marginLeft:5}}>(you)</span>}</span>
                      </div>
                    </td>
                    <td style={{fontSize:12,color:"#64748b"}}>{u.email}</td>
                    <td>
                      {(isOwner && u.role !== "owner") ? (
                        <select value={u.role} onChange={e=>changeRole(u.id,e.target.value)}
                          style={{fontSize:11,padding:"2px 6px",background:"#0d0f1a",border:"1px solid #2a2d3e",color:"#e2e8f0",borderRadius:4}}>
                          <option value="viewer">Viewer</option>
                          <option value="admin">Admin</option>
                        </select>
                      ) : <RoleBadge role={u.role}/>}
                    </td>
                    <td style={{fontSize:12,color:"#64748b"}}>{new Date(u.created_at).toLocaleDateString()}</td>
                    {isAdmin && (
                      <td>
                        <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                          {canEdit && (
                            <button className="btn btn-ghost btn-sm" onClick={()=>{setResetModal({id:u.id,username:u.username});setNewPw("");}}>
                              🔑 Reset pw
                            </button>
                          )}
                          {canEdit && !isMe && (
                            <button className="btn btn-ghost btn-sm" style={{color:"#f87171"}}
                              onClick={()=>deleteUser(u.id,u.username)}>✕</button>
                          )}
                        </div>
                      </td>
                    )}
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {/* ── Reset password modal ── */}
      {resetModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div className="card" style={{width:360,margin:0}}>
            <div className="card-title">Reset password — {resetModal.username}</div>
            <form onSubmit={resetPassword}>
              <div className="form-group">
                <label>New Password</label>
                <input required type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="At least 8 characters" autoFocus/>
              </div>
              <div style={{display:"flex",gap:8,marginTop:4}}>
                <button type="submit" className="btn btn-primary" disabled={newPw.length<8}>Reset Password</button>
                <button type="button" className="btn btn-ghost" onClick={()=>setResetModal(null)}>Cancel</button>
              </div>
            </form>
          </div>
        </div>
      )}
      {confirmState && <ConfirmModal message={confirmState.message} confirmLabel={confirmState.confirmLabel} onConfirm={()=>{confirmState.fn();setConfirmState(null);}} onCancel={()=>setConfirmState(null)}/>}
    </div>
  );
}


// ── Workspaces page ────────────────────────────────────────────────────────
function WorkspacesPage({showToast, user}) {
  const isOwner = user?.role === "owner";
  const isAdmin = isOwner || user?.role === "admin";

  const [ws, setWs]             = useState(null);
  const [allWs, setAllWs]       = useState([]);
  const [members, setMembers]   = useState([]);
  const [allUsers, setAllUsers] = useState([]);
  const [loading, setLoading]   = useState(true);

  // Rename — separate edit mode so button isn't confusingly pre-disabled
  const [renaming, setRenaming] = useState(false);
  const [editingName, setEditingName] = useState(false);
  const [newName, setNewName]   = useState("");

  // Add member
  const [addUserId, setAddUserId] = useState("");
  const [addRole, setAddRole]     = useState("viewer");
  const [addBusy, setAddBusy]     = useState(false);

  // Create workspace
  const [showCreate, setShowCreate] = useState(false);
  const [createName, setCreateName] = useState("");
  const [createBusy, setCreateBusy] = useState(false);

  const [confirmState, setConfirmState] = useState(null);

  const wsId = _getWorkspaceId();

  // Re-run whenever user prop resolves (fixes stale-closure / isOwner=false on first render)
  const load = async () => {
    setLoading(true);
    try {
      const _isOwner = user?.role === "owner";
      // For owner, my/list already returns ALL workspaces (backend fix)
      // so we reuse the same list for both the active-workspace lookup
      // and the All Workspaces table — no second round-trip needed.
      const [myList, usersResp] = await Promise.all([
        api("GET", "/api/workspaces/my/list"),
        api("GET", "/api/users"),
      ]);
      const list = myList || [];
      setAllUsers(usersResp || []);
      if (_isOwner) setAllWs(list);   // owner sees every workspace
      const active = (wsId ? list.find(w => String(w.id) === String(wsId)) : null) || list[0];
      if (active) {
        setWs(active);
        setNewName(active.name);
        setEditingName(false);
        const mem = await api("GET", `/api/workspaces/${active.id}/members`);
        setMembers(mem || []);
      }
    } catch(e) { showToast(e.message, "error"); }
    setLoading(false);
  };

  useEffect(() => { if (user?.id) load(); }, [user?.id]);

  const rename = async (e) => {
    e.preventDefault();
    if (!ws || !newName.trim() || newName.trim() === ws.name) return;
    setRenaming(true);
    try {
      const updated = await api("PATCH", `/api/workspaces/${ws.id}`, {name: newName.trim()});
      setWs(updated);
      setNewName(updated.name);
      setEditingName(false);
      setAllWs(prev => prev.map(w => w.id === updated.id ? {...w, name: updated.name} : w));
      showToast("Workspace renamed");
    } catch(e) { showToast(e.message, "error"); }
    setRenaming(false);
  };

  const addMember = async (e) => {
    e.preventDefault();
    if (!ws || !addUserId) return;
    setAddBusy(true);
    try {
      await api("PUT", `/api/workspaces/${ws.id}/members`, {user_id: parseInt(addUserId), role: addRole});
      const mem = await api("GET", `/api/workspaces/${ws.id}/members`);
      setMembers(mem || []);
      setAddUserId(""); setAddRole("viewer");
      showToast("Member added");
    } catch(e) { showToast(e.message, "error"); }
    setAddBusy(false);
  };

  const changeRole = async (userId, role) => {
    if (!ws) return;
    try {
      await api("PUT", `/api/workspaces/${ws.id}/members`, {user_id: userId, role});
      setMembers(m => m.map(x => x.user_id === userId ? {...x, role} : x));
      showToast("Role updated");
    } catch(e) { showToast(e.message, "error"); }
  };

  const removeMember = (userId, username) => {
    setConfirmState({
      message: `Remove ${username} from this workspace?`,
      confirmLabel: "Remove",
      fn: async () => {
        try {
          await api("DELETE", `/api/workspaces/${ws.id}/members/${userId}`);
          setMembers(m => m.filter(x => x.user_id !== userId));
          showToast("Member removed");
        } catch(e) { showToast(e.message, "error"); }
      }
    });
  };

  const createWorkspace = async (e) => {
    e.preventDefault();
    if (!createName.trim()) return;
    setCreateBusy(true);
    try {
      await api("POST", "/api/workspaces", {name: createName.trim()});
      setCreateName(""); setShowCreate(false);
      // Full reload so sidebar + allWs reflect the new workspace
      await load();
      showToast("Workspace created — switch to it using the sidebar or the table below");
    } catch(e) { showToast(e.message, "error"); }
    setCreateBusy(false);
  };

  const deleteWorkspace = (w) => {
    setConfirmState({
      message: `Delete workspace "${w.name}"? This cannot be undone.`,
      confirmLabel: "Delete",
      fn: async () => {
        try {
          await api("DELETE", `/api/workspaces/${w.id}`);
          setAllWs(prev => prev.filter(x => x.id !== w.id));
          showToast("Workspace deleted");
        } catch(e) { showToast(e.message, "error"); }
      }
    });
  };

  const switchTo = async (w) => {
    try {
      await api("POST", `/api/workspaces/${w.id}/switch`);
      showToast(`Switched to ${w.name}`);
      window.location.reload();
    } catch(e) { showToast(e.message, "error"); }
  };

  const WS_ROLE_COLORS = {owner:"#f59e0b", admin:"#a78bfa", viewer:"#64748b"};
  const nonMemberUsers = allUsers.filter(u => !members.find(m => m.user_id === u.id));

  if (loading) return <div className="page"><div className="empty-state">Loading…</div></div>;

  return (
    <div className="page">
      <h1 className="page-title">🏢 Workspaces</h1>

      {/* Warning when no active workspace resolved from cookie */}
      {!ws && (
        <div className="card" style={{borderColor:"#f59e0b44",background:"#f59e0b08"}}>
          <div style={{color:"#f59e0b",fontSize:13}}>
            ⚠ No active workspace found. Switch to one using the table below, or create a new one.
          </div>
        </div>
      )}

      {/* ── Current workspace ───────────────────────────────────────────────────── */}
      {ws && (
        <div className="card">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div>
              <div className="card-title" style={{marginBottom:2}}>Current: {ws.name}</div>
              <div style={{fontSize:12,color:"#475569"}}>
                Slug: <code style={{color:"#a78bfa"}}>{ws.slug}</code>
                &nbsp;·&nbsp; Plan: <span style={{color:"#94a3b8",textTransform:"capitalize"}}>{ws.plan||"free"}</span>
              </div>
            </div>
            {isAdmin && !editingName && (
              <button className="btn btn-ghost" style={{fontSize:12}}
                onClick={()=>{ setNewName(ws.name); setEditingName(true); }}>✏ Rename</button>
            )}
          </div>
          {editingName && (
            <form onSubmit={rename} style={{display:"flex",gap:10,alignItems:"flex-end"}}>
              <div className="form-group" style={{flex:1,marginBottom:0}}>
                <label>New Name</label>
                <input value={newName} onChange={e=>setNewName(e.target.value)} required autoFocus/>
              </div>
              <button type="submit" className="btn btn-primary"
                disabled={renaming || !newName.trim() || newName.trim()===ws.name}>
                {renaming ? "Saving…" : "Save"}
              </button>
              <button type="button" className="btn btn-ghost"
                onClick={()=>setEditingName(false)}>Cancel</button>
            </form>
          )}
        </div>
      )}

      {/* ── Members ──────────────────────────────────────────────────────────── */}
      {ws && (
        <div className="card">
          <div className="card-title">Members</div>
          <table>
            <thead><tr><th>User</th><th>Workspace Role</th>{isAdmin && <th></th>}</tr></thead>
            <tbody>
              {members.map(m => {
                const isMe = user?.id === m.user_id;
                const isWsOwner = m.role === "owner";
                return (
                  <tr key={m.user_id}>
                    <td>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:26,height:26,borderRadius:"50%",flexShrink:0,
                          background:WS_ROLE_COLORS[m.role]+"22",
                          border:`1px solid ${WS_ROLE_COLORS[m.role]}55`,
                          display:"flex",alignItems:"center",justifyContent:"center",
                          fontSize:11,fontWeight:700,color:WS_ROLE_COLORS[m.role]}}>
                          {(m.username||"?")[0].toUpperCase()}
                        </div>
                        <span style={{fontWeight:500}}>{m.username}
                          {isMe && <span style={{fontSize:10,color:"#475569",marginLeft:5}}>(you)</span>}
                        </span>
                      </div>
                    </td>
                    <td>
                      {isAdmin && !isWsOwner ? (
                        <select value={m.role} onChange={e=>changeRole(m.user_id, e.target.value)}
                          style={{background:"#1e2130",border:"1px solid #2d3148",borderRadius:6,
                                  color:"#e2e8f0",fontSize:12,padding:"3px 6px"}}>
                          <option value="viewer">viewer</option>
                          <option value="admin">admin</option>
                          <option value="owner">owner</option>
                        </select>
                      ) : (
                        <span style={{fontSize:12,color:WS_ROLE_COLORS[m.role],fontWeight:600,
                                      textTransform:"capitalize"}}>{m.role}</span>
                      )}
                    </td>
                    {isAdmin && (
                      <td style={{textAlign:"right"}}>
                        {!isWsOwner && !isMe && (
                          <button className="btn btn-ghost" style={{fontSize:11,padding:"2px 8px",color:"#f87171"}}
                            onClick={()=>removeMember(m.user_id, m.username)}>Remove</button>
                        )}
                      </td>
                    )}
                  </tr>
                );
              })}
            </tbody>
          </table>
          {isAdmin && nonMemberUsers.length > 0 && (
            <form onSubmit={addMember} style={{display:"flex",gap:10,alignItems:"flex-end",marginTop:16,
                                              borderTop:"1px solid #2a2d3e",paddingTop:14}}>
              <div className="form-group" style={{flex:1,marginBottom:0}}>
                <label>Add Member</label>
                <select value={addUserId} onChange={e=>setAddUserId(e.target.value)} required
                  style={{width:"100%",background:"#1e2130",border:"1px solid #2d3148",borderRadius:6,
                          color:"#e2e8f0",fontSize:13,padding:"6px 8px"}}>
                  <option value="">— select user —</option>
                  {nonMemberUsers.map(u=>(
                    <option key={u.id} value={u.id}>{u.username} ({u.email})</option>
                  ))}
                </select>
              </div>
              <div className="form-group" style={{width:130,marginBottom:0}}>
                <label>Role</label>
                <select value={addRole} onChange={e=>setAddRole(e.target.value)}
                  style={{width:"100%",background:"#1e2130",border:"1px solid #2d3148",borderRadius:6,
                          color:"#e2e8f0",fontSize:13,padding:"6px 8px"}}>
                  <option value="viewer">viewer</option>
                  <option value="admin">admin</option>
                  <option value="owner">owner</option>
                </select>
              </div>
              <button type="submit" className="btn btn-primary" disabled={addBusy||!addUserId}>
                {addBusy ? "Adding…" : "+ Add"}
              </button>
            </form>
          )}
        </div>
      )}

      {/* ── All workspaces (owner only) ───────────────────────────────────── */}
      {isOwner && (
        <div className="card">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div className="card-title" style={{marginBottom:0}}>All Workspaces</div>
            <button className="btn btn-primary" style={{fontSize:12}}
              onClick={()=>setShowCreate(s=>!s)}>
              {showCreate ? "Cancel" : "+ New Workspace"}
            </button>
          </div>
          {showCreate && (
            <form onSubmit={createWorkspace} style={{display:"flex",gap:10,alignItems:"flex-end",
              marginBottom:16,paddingBottom:14,borderBottom:"1px solid #2a2d3e"}}>
              <div className="form-group" style={{flex:1,marginBottom:0}}>
                <label>Workspace Name</label>
                <input value={createName} onChange={e=>setCreateName(e.target.value)}
                       required placeholder="e.g. Acme Corp" autoFocus/>
              </div>
