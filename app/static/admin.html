              <button type="submit" className="btn btn-primary" disabled={createBusy}>
                {createBusy ? "Creating…" : "Create"}
              </button>
            </form>
          )}
          {allWs.length === 0
            ? <div className="empty-state">No workspaces found.</div>
            : (
            <table>
              <thead><tr><th>Name</th><th>Slug</th><th>Plan</th><th>Members</th><th></th></tr></thead>
              <tbody>
                {allWs.map(w => {
                  const isCurrent = ws && w.id === ws.id;
                  return (
                    <tr key={w.id} style={isCurrent ? {background:"#1a1d2e"} : {}}>
                      <td>
                        <span style={{fontWeight:600}}>{w.name}</span>
                        {isCurrent && <span style={{fontSize:10,color:"#a78bfa",marginLeft:6,
                          background:"#7c3aed22",padding:"1px 6px",borderRadius:4}}>current</span>}
                      </td>
                      <td><code style={{fontSize:11,color:"#64748b"}}>{w.slug}</code></td>
                      <td style={{fontSize:12,color:"#94a3b8",textTransform:"capitalize"}}>{w.plan||"free"}</td>
                      <td style={{fontSize:12,color:"#94a3b8"}}>{w.member_count ?? "—"}</td>
                      <td style={{textAlign:"right"}}>
                        {!isCurrent && (
                          <button className="btn btn-ghost" style={{fontSize:11,padding:"2px 8px",marginRight:4}}
                            onClick={()=>switchTo(w)}>Switch</button>
                        )}
                        {w.slug !== "default" && (
                          <button className="btn btn-ghost" style={{fontSize:11,padding:"2px 8px",color:"#f87171"}}
                            onClick={()=>deleteWorkspace(w)}>Delete</button>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      )}

      {confirmState && <ConfirmModal message={confirmState.message} confirmLabel={confirmState.confirmLabel}
        onConfirm={()=>{confirmState.fn();setConfirmState(null);}}
        onCancel={()=>setConfirmState(null)}/>}
    </div>
  );
}

// ── App shell ─────────────────────────────────────────────────────────────
const PAGES = [
  {id:"dashboard",  icon:"⬛", label:"Dashboard"},
  {id:"graphs",     icon:"🎨", label:"Canvas Flows"},
  {id:"templates",  icon:"📐", label:"Templates"},
  {id:"metrics",    icon:"📊", label:"Metrics"},
  {id:"scripts",    icon:"🐍", label:"Scripts"},
  {id:"credentials",icon:"🔑", label:"Credentials"},
  {id:"schedules",  icon:"⏰", label:"Schedules"},
  {id:"logs",       icon:"📋", label:"Logs"},
  {id:"users",      icon:"👥", label:"Users"},
  {id:"audit",      icon:"🔍", label:"Audit Log"},
  {id:"settings",   icon:"⚙",  label:"Settings"},
  {id:"workspaces",  icon:"🏢", label:"Workspaces"},
];

function App() {
  const validIds = PAGES.map(p=>p.id);
  const hashPage = () => {
    const h = window.location.hash.slice(1);
    const HASH_ALIAS = { flows:"graphs", canvas:"graphs" };
    const page = HASH_ALIAS[h] || h;
    return validIds.includes(page) ? page : "dashboard";
  };
  const [page, setPageState]               = useState(hashPage);
  const [toast, setToast]                  = useState(null);
  const [currentUser, setCurrentUser]      = useState(null);
  const [encryptionOk, setEncryptionOk]   = useState(true);
  const [workspaces, setWorkspaces]        = useState([]);
  const [activeWorkspace, setActiveWorkspace] = useState(null);
  const showToast = useCallback((msg, type="success") => setToast({msg,type,key:Date.now()}), []);

  useEffect(()=>{
    api("GET","/api/auth/me").then(u=>{ if(u) setCurrentUser(u); }).catch(()=>{});
    api("GET","/api/auth/status").then(s=>{ if(s) setEncryptionOk(!!s.encryption_configured); }).catch(()=>{});
    api("GET","/api/workspaces/my/list").then(list=>{
      setWorkspaces(list||[]);
      const wid = _getWorkspaceId();
      const active = wid ? (list||[]).find(w=>String(w.id)===String(wid)) : null;
      setActiveWorkspace(active||(list&&list[0])||null);
    }).catch(()=>{});
  },[]);

  const setPage = useCallback((id) => {
    window.location.hash = id;
    setPageState(id);
  }, []);

  useEffect(() => {
    const onHashChange = () => setPageState(hashPage());
    window.addEventListener("hashchange", onHashChange);
    return () => window.removeEventListener("hashchange", onHashChange);
  }, []);

  async function logout() {
    try { await fetch("/api/auth/logout", {method:"POST", credentials:"same-origin"}); } catch(e){}
    window.location.href = "/login";
  }

  return (
    <>
      <div className="sidebar">
        <div className="logo">⚡ HiveRunr</div>
        {/* Workspace selector — only shown when the user belongs to multiple workspaces */}
        {workspaces.length > 1 && (
          <div style={{padding:"0 12px 12px",borderBottom:"1px solid #2a2d3e",marginBottom:4}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <div style={{fontSize:10,color:"#4b5563",textTransform:"uppercase",letterSpacing:.06,fontWeight:600}}>Workspace</div>
              {(currentUser?.role==="owner"||currentUser?.role==="admin") && (
                <button onClick={()=>setPage("workspaces")} title="Workspace settings"
                  style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:12,padding:0,lineHeight:1}}
                  onMouseEnter={e=>e.currentTarget.style.color="#a78bfa"}
                  onMouseLeave={e=>e.currentTarget.style.color="#4b5563"}>⚙</button>
              )}
            </div>
            <select
              value={activeWorkspace?.id||""}
              onChange={async e=>{
                const wid = parseInt(e.target.value);
                if(!wid) return;
                try {
                  const res = await api("POST",`/api/workspaces/${wid}/switch`);
                  setActiveWorkspace(res.workspace);
                  window.location.reload();
                } catch(err){ alert(err.message); }
              }}
              style={{width:"100%",background:"#1e2130",border:"1px solid #2d3148",borderRadius:6,
                      color:"#a78bfa",fontSize:12,padding:"5px 8px",cursor:"pointer"}}
            >
              {workspaces.map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
            </select>
          </div>
        )}
        {workspaces.length === 1 && activeWorkspace && (
          <div style={{padding:"0 12px 10px",borderBottom:"1px solid #2a2d3e",marginBottom:4}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
              <div style={{fontSize:10,color:"#4b5563",textTransform:"uppercase",letterSpacing:.06,fontWeight:600}}>Workspace</div>
              {(currentUser?.role==="owner"||currentUser?.role==="admin") && (
                <button onClick={()=>setPage("workspaces")} title="Workspace settings"
                  style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:12,padding:0,lineHeight:1}}
                  onMouseEnter={e=>e.currentTarget.style.color="#a78bfa"}
                  onMouseLeave={e=>e.currentTarget.style.color="#4b5563"}>⚙</button>
              )}
            </div>
            <div style={{fontSize:12,color:"#a78bfa",fontWeight:600}}>🏢 {activeWorkspace.name}</div>
          </div>
        )}
        {PAGES.map(p=>(
          <div key={p.id} className={`nav-item${page===p.id?" active":""}`} onClick={()=>setPage(p.id)}>
            <span className="nav-icon">{p.icon}</span>{p.label}
          </div>
        ))}
        <div className="sidebar-footer">
          <div className="footer-label">Quick links</div>
          <a className="ext-link" href="/canvas">
            <span className="el-icon">🎨</span>Node Canvas
          </a>
          <a className="ext-link" href="/flower/" target="_blank" rel="noopener">
            <span className="el-icon">🌸</span>Flower / Celery
          </a>
          <a className="ext-link" href="/docs" target="_blank" rel="noopener">
            <span className="el-icon">📖</span>API Docs
          </a>
          <a className="ext-link" href="/health" target="_blank" rel="noopener">
            <span className="el-icon">💚</span>Health check
          </a>
          {currentUser && (
            <div style={{marginTop:12,borderTop:"1px solid #2a2d3e",paddingTop:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 8px",marginBottom:2}}>
                <div style={{width:26,height:26,borderRadius:"50%",background:"#7c3aed22",
                  border:"1px solid #7c3aed55",display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:11,fontWeight:700,color:"#a78bfa",flexShrink:0}}>
                  {currentUser.username[0].toUpperCase()}
                </div>
                <div style={{overflow:"hidden",flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,color:"#e2e8f0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{currentUser.username}</div>
                  <div style={{fontSize:10,color:"#475569",textTransform:"capitalize"}}>{currentUser.role}</div>
                </div>
              </div>
              <button onClick={logout} style={{width:"100%",textAlign:"left",background:"none",border:"none",
                color:"#64748b",fontSize:12,cursor:"pointer",padding:"6px 8px",borderRadius:6,
                display:"flex",alignItems:"center",gap:6,transition:"color .15s"}}
                onMouseEnter={e=>e.currentTarget.style.color="#f87171"}
                onMouseLeave={e=>e.currentTarget.style.color="#64748b"}>
                <span style={{fontSize:14}}>⎋</span> Sign out
              </button>
            </div>
          )}
        </div>
      </div>
      <div className="main">
        {page==="dashboard"  && <Dashboard   showToast={showToast} user={currentUser}/>}
        {page==="graphs"     && <Graphs      showToast={showToast} user={currentUser}/>}
        {page==="templates"  && <Templates   showToast={showToast} user={currentUser}/>}
        {page==="metrics"    && <Metrics     showToast={showToast} user={currentUser}/>}
        {page==="scripts"    && <Scripts     showToast={showToast} user={currentUser}/>}
        {page==="credentials"&& <Credentials showToast={showToast} user={currentUser} encryptionOk={encryptionOk}/>}
        {page==="schedules"  && <Schedules   showToast={showToast} user={currentUser}/>}
        {page==="logs"       && <Logs        showToast={showToast} user={currentUser}/>}
        {page==="users"      && <Users       showToast={showToast} user={currentUser}/>}
        {page==="audit"      && <AuditLog    showToast={showToast} user={currentUser}/>}
        {page==="settings"   && <Settings    showToast={showToast} user={currentUser}/>}
        {page==="workspaces" && <WorkspacesPage showToast={showToast} user={currentUser}/>}
      </div>
      {toast && <Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</head>
