<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HiveRunr</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
#root{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1a1d2e;border-right:1px solid #2a2d3e;display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;position:fixed;height:100vh;z-index:10}
.sidebar .logo{font-size:16px;font-weight:700;color:#a78bfa;padding:0 20px 24px;letter-spacing:-.3px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:#94a3b8;font-size:13px;font-weight:500;border-radius:0;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:#252840;color:#e2e8f0}
.nav-item.active{background:#252840;color:#a78bfa;border-left-color:#7c3aed}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{margin-top:auto;border-top:1px solid #2a2d3e;padding:14px 12px 10px}
.sidebar-footer .footer-label{font-size:10px;color:#4b5563;padding:0 8px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.ext-link{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;color:#64748b;font-size:12px;font-weight:500;text-decoration:none;transition:all .15s;cursor:pointer}
.ext-link:hover{background:#252840;color:#e2e8f0}
.ext-link .el-icon{font-size:15px;width:20px;text-align:center}
.main{margin-left:220px;flex:1;padding:32px;max-width:1100px}
.page-title{font-size:22px;font-weight:700;margin-bottom:24px;color:#f1f5f9}
.card{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:10px;padding:20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:10px;padding:18px 20px}
.stat-val{font-size:28px;font-weight:700;color:#e2e8f0}
.stat-lbl{font-size:12px;color:#64748b;margin-top:4px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.badge-queued{background:#1e3a5f;color:#60a5fa}
.badge-running{background:#1c3238;color:#34d399;animation:pulse 1.5s infinite}
.badge-succeeded{background:#14532d;color:#4ade80}
.badge-failed{background:#3f1111;color:#f87171}
.badge-cancelled{background:#2d2d2d;color:#9ca3af}
.badge-credential{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;font-family:monospace;background:#0f1117;border:1px solid #2a2d3e}
.badge-credential.openai_api{background:#5b21b633;color:#d8b4fe;border-color:#7c3aed}
.badge-credential.smtp{background:#1e3a8a33;color:#93c5fd;border-color:#0284c7}
.badge-credential.telegram{background:#164e6333;color:#67e8f9;border-color:#0891b2}
.badge-credential.aws{background:#7c2d1233;color:#fed7aa;border-color:#d97706}
.badge-credential.ssh{background:#0f4c3a33;color:#34d399;border-color:#059669}
.badge-credential.ftp{background:#1e3a5f33;color:#7dd3fc;border-color:#0284c7}
.badge-credential.generic,.badge-credential.other{background:#2d2d2d33;color:#9ca3af;border-color:#4b5563}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:#64748b;font-weight:500;padding:8px 12px;border-bottom:1px solid #2a2d3e;font-size:12px}
td{padding:10px 12px;border-bottom:1px solid #1e2235;color:#cbd5e1;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#1e2235}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:#7c3aed;color:#fff}.btn-primary:hover{background:#6d28d9}
.btn-success{background:#059669;color:#fff}.btn-success:hover{background:#047857}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-ghost{background:#2a2d3e;color:#94a3b8;border:1px solid #374151}.btn-ghost:hover{color:#e2e8f0;background:#374151}
.btn-warning{background:#d97706;color:#fff}.btn-warning:hover{background:#b45309}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn[aria-expanded="true"]{background:#374151;color:#e2e8f0}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{margin-bottom:12px}
label{display:block;font-size:11px;color:#94a3b8;font-weight:500;margin-bottom:5px}
input,select,textarea{width:100%;background:#0f1117;color:#e2e8f0;border:1px solid #2a2d3e;border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#7c3aed}
.wf-pill{display:flex;align-items:center;justify-content:space-between;background:#0f1117;border:1px solid #2a2d3e;border-radius:8px;padding:10px 14px;margin-bottom:8px}
.wf-name{font-size:13px;font-weight:500}
.wf-enabled{font-size:11px;color:#059669}
.wf-disabled{font-size:11px;color:#dc2626}
.log-file{background:#0f1117;border:1px solid #2a2d3e;border-radius:6px;padding:10px 14px;font-size:12px;font-family:monospace;cursor:pointer;margin-bottom:6px;color:#94a3b8;transition:border-color .15s}
.log-file:hover{border-color:#7c3aed;color:#e2e8f0}
.log-content{background:#0a0c14;border:1px solid #2a2d3e;border-radius:6px;padding:14px;font-size:11px;font-family:monospace;white-space:pre-wrap;max-height:400px;overflow-y:auto;color:#94a3b8;line-height:1.7}
.actions-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.empty-state{color:#4b5563;font-size:13px;text-align:center;padding:40px 0}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1d2e;border:1px solid #2a2d3e;border-radius:8px;padding:10px 16px;font-size:13px;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:slideUp .2s ease}
.toast.ok{border-color:#059669;color:#34d399}
.toast.err{border-color:#dc2626;color:#f87171}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.info-box{background:#0f1117;border:1px solid #2a2d3e;border-left:3px solid #7c3aed;border-radius:6px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:#94a3b8;line-height:1.6}
.trace-table{margin-top:10px;background:#0f1117;border:1px solid #2a2d3e;border-radius:6px;padding:0;overflow:hidden}
.trace-table table{margin:0;font-size:12px}
.trace-table th,.trace-table td{padding:8px 10px}
.trace-status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.trace-status-dot.ok{background:#4ade80}
.trace-status-dot.err{background:#f87171}
.trace-status-dot.skipped{background:#64748b}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:12px;padding:22px;min-width:400px;max-width:600px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:14px;color:#e2e8f0}
.modal-section{font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 8px;padding-bottom:5px;border-bottom:1px solid #2a2d3e}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.version-row{padding:10px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between}
.version-row:last-child{border-bottom:none}
.version-info{flex:1;min-width:0;font-size:12px}
.version-num{font-weight:600;color:#e2e8f0;margin-bottom:2px}
.version-date{font-size:11px;color:#64748b}
.version-note{font-size:11px;color:#94a3b8;margin-top:2px}
.expandable-row{cursor:pointer;transition:background .15s}
.expandable-row:hover td{background:#252840}
.trace-collapsed{background:#252840;border:1px solid #2a2d3e;border-radius:6px;padding:12px 14px;font-size:11px;color:#94a3b8;display:none;margin-top:8px}
.trace-collapsed.show{display:block}
.stat-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:10px;padding:20px;text-align:center}
.stat-value{font-size:32px;font-weight:700;margin-bottom:4px;line-height:1}
.stat-label{font-size:12px;color:#64748b}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:80px;margin:12px 0 6px}
.bar-col{display:flex;flex-direction:column-reverse;align-items:center;flex:1;gap:1px}
.bar-seg{width:100%;border-radius:2px 2px 0 0;min-height:2px;transition:height .3s}
.bar-label{font-size:9px;color:#4b5563;margin-top:4px;text-align:center}
.script-list{width:210px;flex-shrink:0;background:#1a1d2e;border-right:1px solid #2a2d3e;display:flex;flex-direction:column;height:calc(100vh - 160px)}
.script-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #1e2235;transition:background .12s}
.script-item:hover{background:#2a2d3e}
.script-item.active{background:#2a2d3e;border-left:2px solid #7c3aed}
.script-item-name{font-size:13px;color:#e2e8f0;font-weight:500}
.script-item-meta{font-size:10px;color:#4b5563;margin-top:2px}
.editor-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.editor-toolbar{padding:8px 14px;background:#1a1d2e;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;gap:8px}
.editor-container{flex:1}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

function _getWorkspaceId() {
  const m = document.cookie.match(/(?:^|;\s*)hr_workspace=([^;]+)/);
  return m ? m[1] : null;
}

async function api(method, path, body) {
  const headers = {"Content-Type":"application/json"};
  const wid = _getWorkspaceId();
  if (wid) headers["X-Workspace-Id"] = wid;
  const r = await fetch(path, {
    method,
    headers,
    credentials: "same-origin",
    body: body ? JSON.stringify(body) : undefined
  });
  if (r.status === 401) { window.location.href = "/login"; return; }
  if (!r.ok) { const e = await r.json().catch(()=>({detail:r.statusText})); throw new Error(e.detail || r.statusText); }
  return r.json();
}

function Toast({ msg, type, onDone }) {
  useEffect(()=>{ const t=setTimeout(onDone,3000); return ()=>clearTimeout(t); },[]);
  return <div className={`toast ${type==="error"?"err":"ok"}`}>{type==="error"?"✗":"✓"} {msg}</div>;
}

// ── ConfirmModal ───────────────────────────────────────────────────────────
function ConfirmModal({ message, confirmLabel="Confirm", onConfirm, onCancel }) {
  useEffect(()=>{
    const h = e => { if(e.key==="Escape") onCancel(); };
    document.addEventListener("keydown",h);
    return ()=>document.removeEventListener("keydown",h);
  },[]);
  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
        <p style={{margin:"0 0 20px",color:"#e2e8f0",fontSize:14,lineHeight:1.6}}>{message}</p>
        <div className="modal-btns">
          <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button className="btn btn-danger" onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

// ── Viewer banner ──────────────────────────────────────────────────────────
function ViewerBanner() {
  return (
    <div style={{background:"#64748b14",border:"1px solid #64748b33",borderRadius:8,
      padding:"8px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#94a3b8"}}>
      <span>👁</span>
      <span><strong style={{color:"#e2e8f0"}}>View-only mode.</strong> Your account has the Viewer role — you can browse but not make changes. Contact an admin to request elevated access.</span>
    </div>
  );
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function Dashboard({ showToast, user }) {
  const [runs, setRuns]       = useState([]);
  const [workflows, setWfs]   = useState([]);
  const [graphs, setGraphs]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [expandedRunId, setExpandedRunId] = useState(null);

  const load = useCallback(async () => {
    try {
      const [r, w, g] = await Promise.all([api("GET","/api/runs?page_size=200"), api("GET","/api/workflows"), api("GET","/api/graphs")]);
      setRuns(r.runs ?? r); setWfs(w); setGraphs(g);
    } catch(e) { showToast(e.message,"error"); }
    setLoading(false);
  }, []);

  useEffect(() => { load(); const t=setInterval(load,5000); return ()=>clearInterval(t); }, []);

  const stats = {
    total: runs.length,
    active: runs.filter(r=>r.status==="running"||r.status==="queued").length,
    ok: runs.filter(r=>r.status==="succeeded").length,
    failed: runs.filter(r=>r.status==="failed").length
  };

  async function toggleWf(name) {
    try { await api("POST",`/api/workflows/${name}/toggle`); load(); showToast("Toggled"); }
    catch(e) { showToast(e.message,"error"); }
  }
  async function runWf(name) {
    try { await api("POST",`/api/workflows/${name}/run`,{payload:{}}); load(); showToast("Queued!"); }
    catch(e) { showToast(e.message,"error"); }
  }
  async function deleteRun(id) {
    try { await api("DELETE",`/api/runs/${id}`); load(); }
    catch(e) { showToast(e.message,"error"); }
  }
  async function cancelRun(id) {
    try { await api("POST",`/api/runs/${id}/cancel`); load(); showToast("Cancelled"); }
    catch(e) { showToast(e.message,"error"); }
  }
  async function replayRun(id) {
    try { await api("POST",`/api/runs/${id}/replay`); load(); showToast("Queued for replay"); }
    catch(e) { showToast(e.message,"error"); }
  }

  const ro = user?.role === "viewer";
  return (
    <div>
      <h1 className="page-title">Dashboard</h1>
      {ro && <ViewerBanner/>}
      <div className="stat-grid">
        <div className="stat-card"><div className="stat-val">{stats.total}</div><div className="stat-lbl">Total Runs</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"#60a5fa"}}>{stats.active}</div><div className="stat-lbl">Active</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"#4ade80"}}>{stats.ok}</div><div className="stat-lbl">Succeeded</div></div>
        <div className="stat-card"><div className="stat-val" style={{color:"#f87171"}}>{stats.failed}</div><div className="stat-lbl">Failed</div></div>
      </div>
      {(workflows.length > 0 || graphs.length > 0) && (
        <div style={{display:"grid",gridTemplateColumns:workflows.length>0&&graphs.length>0?"1fr 1fr":"1fr",gap:16,marginBottom:24}}>
          {workflows.length > 0 && (
            <div className="card" style={{marginBottom:0}}>
              <div className="card-title">Python Workflows</div>
              {workflows.map(w=>(
                <div key={w.name} className="wf-pill">
                  <div>
                    <div className="wf-name">{w.name}</div>
                    <div className={w.enabled?"wf-enabled":"wf-disabled"}>{w.enabled?"● enabled":"○ disabled"}</div>
                  </div>
                  {!ro && <div style={{display:"flex",gap:8}}>
                    <button className="btn btn-ghost" onClick={()=>toggleWf(w.name)}>Toggle</button>
                    <button className="btn btn-success" disabled={!w.enabled} onClick={()=>runWf(w.name)}>▶ Run</button>
                  </div>}
                </div>
              ))}
            </div>
          )}
          {graphs.length > 0 && (
            <div className="card" style={{marginBottom:0}}>
              <div className="card-title">Canvas Flows</div>
              {graphs.map(g=>(
                <div key={g.id} className="wf-pill">
                  <div>
                    <div className="wf-name">{g.name}</div>
                    <div className={g.enabled?"wf-enabled":"wf-disabled"}>{g.enabled?"● enabled":"○ disabled"}</div>
                  </div>
                  {!ro && <div style={{display:"flex",gap:8}}>
                    <a className="btn btn-ghost" href={`/canvas#graph-${g.id}`}>✏️ Edit</a>
                    <button className="btn btn-success" disabled={!g.enabled} onClick={async()=>{try{await api("POST",`/api/graphs/${g.id}/run`,{payload:{}});load();showToast("Queued!");}catch(e){showToast(e.message,"error");}}}>▶ Run</button>
                  </div>}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      <div className="card">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div className="card-title" style={{marginBottom:0}}>Recent Runs</div>
          {!ro && runs.length > 0 && <button className="btn btn-ghost" onClick={()=>api("DELETE","/api/runs").then(load)}>Clear all</button>}
        </div>
        {loading ? <div className="empty-state">Loading…</div> : runs.length === 0 ? (
          <div className="empty-state">No runs yet. Trigger a workflow to get started.</div>
        ) : (
          <>
            <table>
              <thead><tr><th>#</th><th>Workflow</th><th>Status</th><th>Started</th><th>Duration</th><th></th></tr></thead>
              <tbody>
                {runs.map(r=>(
                  <React.Fragment key={r.id}>
                    <tr className="expandable-row" onClick={()=>setExpandedRunId(expandedRunId===r.id?null:r.id)} style={{cursor:'pointer'}}>
                      <td style={{color:"#4b5563"}}>{r.id}</td>
                      <td>{r.flow_name || "—"}</td>
                      <td><span className={`badge badge-${r.status}`}>{r.status}</span></td>
                      <td style={{color:"#64748b"}}>{r.created_at ? new Date(r.created_at).toLocaleString() : "—"}</td>
                      <td style={{color:"#64748b",fontVariantNumeric:"tabular-nums"}}>{r.status==="queued"||r.status==="running"?"—":r.updated_at&&r.created_at?((d=>(d<1000?d+"ms":(d/1000).toFixed(1)+"s"))(new Date(r.updated_at)-new Date(r.created_at))):"—"}</td>
                      <td>
                        <div style={{display:"flex",gap:6}}>
                          {r.graph_id && <button className="btn btn-ghost" onClick={(e)=>{e.stopPropagation();replayRun(r.id)}}>▶ Replay</button>}
                          {(r.status==="queued"||r.status==="running") &&
                            <button className="btn btn-warning" onClick={(e)=>{e.stopPropagation();cancelRun(r.id)}}>Cancel</button>}
                          <button className="btn btn-danger" title="Delete run" onClick={(e)=>{e.stopPropagation();deleteRun(r.id)}}>✕</button>
                        </div>
                      </td>
                    </tr>
                    {expandedRunId===r.id && (
                      <tr style={{background:"#0f1117"}}>
                        <td colSpan="5" style={{padding:"12px"}}>
                          {r.initial_payload && Object.keys(r.initial_payload).length > 0 && (
                            <div style={{marginBottom:12}}>
                              <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",marginBottom:6}}>Initial Payload</div>
                              <div style={{background:"#0a0c14",border:"1px solid #2a2d3e",borderRadius:6,padding:10,fontFamily:"monospace",fontSize:11,color:"#94a3b8",maxHeight:200,overflowY:"auto"}}>
                                {JSON.stringify(r.initial_payload,null,2)}
                              </div>
                            </div>
                          )}
                          {/* ── run output / error ── */}
                          {r.result && (r.result.output || r.result.error) && (
                            <div style={{marginBottom:12}}>
                              <div style={{fontSize:11,fontWeight:600,color: r.result.error?"#f87171":"#4ade80",marginBottom:6}}>
                                {r.result.error ? "❌ Error" : "✅ Output"}
                              </div>
                              <div style={{
                                background:"#0a0c14",border:`1px solid ${r.result.error?"#7f1d1d":"#14532d"}`,
                                borderRadius:6,padding:10,fontFamily:"monospace",fontSize:11,
                                color: r.result.error?"#fca5a5":"#86efac",
                                maxHeight:300,overflowY:"auto",whiteSpace:"pre-wrap",wordBreak:"break-word"
                              }}>
                                {r.result.error || r.result.output}
                              </div>
                            </div>
                          )}
                          {r.traces && r.traces.length > 0 ? (
                            <div>
                              <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",marginBottom:6}}>Trace</div>
                              <div className="trace-table">
                                <table>
                                  <thead><tr><th>Node</th><th>Type</th><th>Status</th><th>Duration (ms)</th><th>Attempts</th><th>Output/Error</th></tr></thead>
                                  <tbody>
                                    {r.traces.map((t,idx)=>(
                                      <tr key={idx}>
                                        <td style={{fontFamily:"monospace",fontSize:11}}>{t.node_id}</td>
                                        <td style={{fontSize:11}}>{t.type}</td>
                                        <td>
                                          <span className={`trace-status-dot ${t.status===undefined||t.status==="ok"?"ok":t.status==="error"?"err":"skipped"}`}/>
                                          {t.status===undefined||t.status==="ok"?"ok":t.status==="error"?"error":"skipped"}
                                        </td>
                                        <td>{t.duration_ms ?? "—"}</td>
                                        <td>{t.attempts ?? 1}</td>
                                        <td>
                                          <div style={{maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:11}}>
                                            {t.error ? <span style={{color:"#f87171"}}>{String(t.error).slice(0,50)}</span> :
                                             t.output ? <span style={{color:"#94a3b8"}}>{typeof t.output==="string"?t.output:JSON.stringify(t.output).slice(0,50)}</span> :
                                             "—"}
                                          </div>
                                        </td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          ) : <div style={{color:"#4b5563",fontSize:12}}>No trace data available</div>}
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
          </>
        )}
      </div>
    </div>
  );
}

function relativeTime(ts) {
  const d = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (d < 60) return `${d}s ago`;
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  if (d < 86400) return `${Math.floor(d/3600)}h ago`;
  return `${Math.floor(d/86400)}d ago`;
}

function Metrics({ showToast }) {
  const [metrics, setMetrics] = useState(null);
  const [failingFlows, setFailingFlows] = useState([]);
  const [recentRuns, setRecentRuns] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    try {
      const m = await api("GET", "/api/metrics");
      setMetrics(m);

      const runsResp = await api("GET", "/api/runs?page_size=200");
      const runs = runsResp.runs ?? runsResp;
      const failMap = {};
      runs.forEach(r => {
        if (r.status === "failed") {
          const wf = r.flow_name || "unknown";
          failMap[wf] = (failMap[wf] || 0) + 1;
        }
      });
      const failing = Object.entries(failMap).sort((a, b) => b[1] - a[1]).slice(0, 5);
      setFailingFlows(failing);
      setRecentRuns(runs.slice(0, 10));
    } catch(e) { showToast(e.message, "error"); }
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, []);

  if (loading) return <div className="empty-state">Loading metrics…</div>;
  if (!metrics) return <div className="empty-state">No metrics available.</div>;

  const lastDay = (metrics.daily || []).slice(-14);
  const maxRuns = Math.max(...lastDay.map(d => (d.succeeded || 0) + (d.failed || 0)), 1);

  return (
    <div>
      <h1 className="page-title">Metrics</h1>

      <div className="stat-cards">
        <div className="stat-card">
          <div className="stat-value" style={{color:"#a78bfa"}}>{metrics.total || 0}</div>
          <div className="stat-label">Total Runs</div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{color:"#4ade80"}}>{metrics.succeeded || 0}</div>
          <div className="stat-label">Succeeded</div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{color:"#f87171"}}>{metrics.failed || 0}</div>
          <div className="stat-label">Failed</div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{color:"#38bdf8"}}>{Math.round(metrics.avg_ms || 0)}</div>
          <div className="stat-label">Avg Duration (ms)</div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{color:"#4ade80"}}>{metrics.success_rate ?? 0}%</div>
          <div className="stat-label">Success Rate</div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Last 14 Days</div>
        <div className="bar-chart">
          {lastDay.map((day, idx) => {
            const succeeded = day.succeeded || 0;
            const failed = day.failed || 0;
            const total = succeeded + failed;
            const sucHeight = maxRuns > 0 ? (succeeded / maxRuns) * 70 : 0;
            const failHeight = maxRuns > 0 ? (failed / maxRuns) * 70 : 0;
            const dateStr = new Date(day.day).getDate().toString().padStart(2, '0');
            return (
              <div key={idx} className="bar-col" title={`${dateStr}: ${succeeded}✓ ${failed}✗`}>
                {succeeded > 0 && <div className="bar-seg" style={{height:`${sucHeight}px`,background:"#4ade80"}}/>}
                {failed > 0 && <div className="bar-seg" style={{height:`${failHeight}px`,background:"#f87171"}}/>}
                <div className="bar-label">{dateStr}</div>
              </div>
            );
          })}
        </div>
      </div>

      {failingFlows.length > 0 && (
        <div className="card">
          <div className="card-title">Top Failing Flows</div>
          <table>
            <thead><tr><th>Flow</th><th>Failed</th></tr></thead>
            <tbody>
              {failingFlows.map(([name, count]) => (
                <tr key={name}>
                  <td>{name}</td>
                  <td><span className="badge badge-failed">{count}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {recentRuns.length > 0 && (
        <div className="card">
          <div className="card-title">Recent Runs</div>
          <table>
            <thead><tr><th>Flow</th><th>Status</th><th>Duration (ms)</th><th>Time</th></tr></thead>
            <tbody>
              {recentRuns.map(r => {
                const durMs = r.created_at && r.updated_at
                  ? Math.max(0, Math.round((new Date(r.updated_at) - new Date(r.created_at))))
                  : null;
                return (
                <tr key={r.id}>
                  <td style={{fontSize:12}}>{r.flow_name || "—"}</td>
                  <td><span className={`badge badge-${r.status}`}>{r.status}</span></td>
                  <td style={{fontSize:12}}>{durMs != null ? durMs : "—"}</td>
                  <td style={{fontSize:12,color:"#64748b"}}>{relativeTime(r.created_at)}</td>
                </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ── Scripts ────────────────────────────────────────────────────────────────
function Scripts({ showToast, user }) {
  const [scripts, setScripts]           = useState([]);
  const [selectedScript, setSelectedScript] = useState(null);
  const [loadingContent, setLoadingContent] = useState(false);
  const [newName, setNewName]           = useState("");
  const [creating, setCreating]         = useState(false);
  const [confirmState, setConfirmState] = useState(null);
  const monacoRef          = useRef(null);
  const editorContainerRef = useRef(null);

  // Fetch the script list; if nothing selected yet, auto-select the first
  const load = useCallback(async (keepSelected) => {
    try {
      const s = await api("GET", "/api/scripts");
      setScripts(Array.isArray(s) ? s : []);
      if (!keepSelected && s.length > 0) {
        await selectScript(s[0].name);
      }
    } catch(e) { showToast(e.message, "error"); }
  }, []);

  // Fetch full script content and set as selected
  async function selectScript(name) {
    setLoadingContent(true);
    try {
      const full = await api("GET", `/api/scripts/${name}`);
      setSelectedScript(full);        // full = { name, content }
    } catch(e) { showToast(e.message, "error"); }
    setLoadingContent(false);
  }

  useEffect(() => { load(false); }, []);

  // (Re-)create Monaco editor whenever the selected script name changes
  useEffect(() => {
    if (!selectedScript || !editorContainerRef.current) return;
    if (monacoRef.current) { monacoRef.current.dispose(); monacoRef.current = null; }

    function initEditor() {
      monacoRef.current = window.monaco.editor.create(editorContainerRef.current, {
        value: selectedScript.content || '',
        language: 'python',
        theme: 'vs-dark',
        fontSize: 13,
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        automaticLayout: true,
      });
    }

    if (window.monaco) { initEditor(); }
    else {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js';
      script.onload = () => {
        window.require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        window.require(['vs/editor/editor.main'], initEditor);
      };
      document.head.appendChild(script);
    }

    return () => { if (monacoRef.current) { monacoRef.current.dispose(); monacoRef.current = null; } };
  }, [selectedScript?.name]);

  async function createScript(e) {
    e.preventDefault();
    if (!newName.trim()) { showToast("Script name required", "error"); return; }
    setCreating(true);
    try {
      await api("POST", "/api/scripts", { name: newName, content: `# ${newName}.py\n` });
      const created = newName;
      setNewName("");
      await load(true);
      await selectScript(created);
      showToast("Script created");
    } catch(e) { showToast(e.message, "error"); }
    setCreating(false);
  }

  async function saveScript() {
    if (!selectedScript || !monacoRef.current) return;
    try {
      const content = monacoRef.current.getValue();
      await api("PUT", `/api/scripts/${selectedScript.name}`, { content });
      // Update local state so content is current without re-fetching
      setSelectedScript(s => ({ ...s, content }));
      await load(true);
      showToast("Saved");
    } catch(e) { showToast(e.message, "error"); }
  }

  async function deleteScript() {
    if (!selectedScript) return;
    setConfirmState({
      message: `Delete script "${selectedScript.name}"? This cannot be undone.`,
      confirmLabel: "Delete",
      fn: async () => {
        try {
          await api("DELETE", `/api/scripts/${selectedScript.name}`);
          showToast("Deleted");
          setSelectedScript(null);
          await load(false);
        } catch(e) { showToast(e.message, "error"); }
      }
    });
  }

  async function runScript() {
    if (!selectedScript) return;
    try {
      const res = await api("POST", `/api/scripts/${selectedScript.name}/run`);
      showToast(`Queued: task ${res.task_id}`);
    } catch(e) { showToast(e.message, "error"); }
  }

  const ro = user?.role === "viewer";
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <h1 className="page-title">Scripts</h1>
      {ro && <ViewerBanner/>}
      <div style={{display:"flex",flex:1,overflow:"hidden",marginTop:-24,marginLeft:-32,marginRight:-32,marginBottom:-32}}>
        <div className="script-list">
          {!ro && <div style={{padding:"10px 14px",borderBottom:"1px solid #2a2d3e"}}>
            <form onSubmit={createScript}>
              <input
                type="text"
                placeholder="New script name"
                value={newName}
                onChange={e => setNewName(e.target.value)}
                style={{width:"100%",marginBottom:8}}
              />
              <button type="submit" className="btn btn-primary" style={{width:"100%"}} disabled={creating}>
                {creating ? "Creating…" : "+ Create"}
              </button>
            </form>
          </div>}
          <div style={{flex:1,overflowY:"auto"}}>
            {scripts.length === 0 && (
              <div style={{padding:"16px 14px",color:"#475569",fontSize:12}}>No scripts yet. Create one above.</div>
            )}
            {scripts.map(s => (
              <div
                key={s.name}
                className={`script-item${selectedScript?.name === s.name ? " active" : ""}`}
                onClick={() => selectScript(s.name)}
              >
                <div className="script-item-name">{s.name}</div>
                <div className="script-item-meta">{s.size} bytes · {new Date(s.modified * 1000).toLocaleDateString()}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="editor-wrap">
          {loadingContent ? (
            <div className="empty-state" style={{alignSelf:"center",marginTop:"40%"}}>Loading…</div>
          ) : selectedScript ? (
            <>
              <div className="editor-toolbar">
                <span style={{color:"#64748b",fontSize:12,marginRight:"auto",fontFamily:"monospace"}}>{selectedScript.name}.py</span>
                {!ro && <button className="btn btn-primary" onClick={saveScript}>💾 Save</button>}
                {!ro && <button className="btn btn-success" onClick={runScript}>▶ Run</button>}
                {!ro && <button className="btn btn-danger" onClick={deleteScript}>✕ Delete</button>}
              </div>
              <div className="editor-container" ref={editorContainerRef}/>
            </>
          ) : (
            <div className="empty-state" style={{alignSelf:"center",marginTop:"40%"}}>Select a script or create a new one.</div>
          )}
        </div>
      </div>
      {confirmState && <ConfirmModal message={confirmState.message} confirmLabel={confirmState.confirmLabel} onConfirm={()=>{confirmState.fn();setConfirmState(null);}} onCancel={()=>setConfirmState(null)}/>}
    </div>
  );
}

const CRED_SCHEMAS = {

  generic:    { label:"Generic Secret",          fields:[{k:"secret",  l:"Secret Value",      ph:"any secret value",                secret:true}] },

  // ── messaging / notifications ─────────────────────────────────────────────
  slack:      { label:"Slack Incoming Webhook",  fields:[{k:"webhook_url", l:"Webhook URL",   ph:"https://hooks.slack.com/services/T…/B…/…", secret:true}] },
  webhook:    { label:"Webhook URL",             fields:[{k:"url",         l:"Webhook URL",   ph:"https://discord.com/api/webhooks/…",        secret:true}] },
  telegram:   { label:"Telegram Bot",            fields:[{k:"secret",  l:"Bot Token",         ph:"123456:ABC…",                     secret:true},
                                                         {k:"chat_id", l:"Default Chat ID",   ph:"-100123456789"}] },

  // ── HTTP / API auth ───────────────────────────────────────────────────────
  api_key:    { label:"API Key / Bearer Token",  fields:[{k:"key",      l:"API Key / Token",  ph:"sk-… or eyJ…",                   secret:true},
                                                         {k:"header",   l:"Header name",      ph:"Authorization"}] },
  basic_auth: { label:"HTTP Basic Auth",         fields:[{k:"username", l:"Username",         ph:"admin"},
                                                         {k:"password", l:"Password",         ph:"••••••••",                        secret:true}] },
  openai_api: { label:"OpenAI / LLM API Key",   fields:[{k:"secret",   l:"API Key",          ph:"sk-…",                            secret:true},
                                                         {k:"base_url", l:"Base URL (optional)", ph:"https://api.openai.com/v1"}] },

  // ── email ─────────────────────────────────────────────────────────────────
  smtp:       { label:"SMTP Server",             fields:[{k:"host",    l:"Host",              ph:"smtp.agentmail.to"},
                                                         {k:"port",    l:"Port",              ph:"587"},
                                                         {k:"user",    l:"Username",          ph:"inbox@agentmail.to"},
                                                         {k:"pass",    l:"Password / API key",ph:"your-api-key",                    secret:true}] },

  // ── infrastructure ────────────────────────────────────────────────────────
  ssh:        { label:"SSH Server",              fields:[{k:"host",    l:"Host / IP",         ph:"192.168.1.1"},
                                                         {k:"port",    l:"Port",              ph:"22"},
                                                         {k:"username",l:"Username",          ph:"admin"},
                                                         {k:"password",l:"Password",          ph:"••••••••",                        secret:true},
                                                         {k:"key",     l:"Private Key (PEM, optional)", ph:"-----BEGIN RSA PRIVATE KEY-----…", textarea:true}] },
  sftp:       { label:"SFTP / FTP Server",       fields:[{k:"protocol",l:"Protocol",         ph:"sftp", select:["sftp","ftp"]},
                                                         {k:"host",    l:"Host / IP",         ph:"files.example.com"},
                                                         {k:"port",    l:"Port",              ph:"22 (sftp) · 21 (ftp)"},
                                                         {k:"username",l:"Username",          ph:"ftpuser"},
                                                         {k:"password",l:"Password",          ph:"••••••••",                        secret:true}] },
  aws:        { label:"AWS Credentials",         fields:[{k:"access_key_id",     l:"Access Key ID",     ph:"AKIAIOSFODNN7EXAMPLE"},
                                                         {k:"secret_access_key", l:"Secret Access Key", ph:"wJalrXUt…",            secret:true},
                                                         {k:"region",            l:"Default Region",    ph:"us-east-1"}] },
};


// CSS class suffix for the type badge (maps CRED_SCHEMAS keys → .badge-credential.* class)
const typeColors = {
  openai_api: "openai_api",
  smtp:       "smtp",
  telegram:   "telegram",
  aws:        "aws",
  ssh:        "ssh",
  sftp:       "ftp",  // CSS class is .ftp
};

// Build blank sub-field state for a given type
function blankSubFields(type) {
  const schema = CRED_SCHEMAS[type] || CRED_SCHEMAS.generic;
  return Object.fromEntries(schema.fields.map(f => [f.k, '']));
}

// Serialize sub-fields to the `secret` string stored in DB
function encodeSecret(type, subFields) {
  const schema = CRED_SCHEMAS[type] || CRED_SCHEMAS.generic;
  if (schema.fields.length === 1 && schema.fields[0].k === 'secret') {
    return subFields.secret || '';
  }
  // Structured: JSON-encode all non-empty fields
  const obj = {};
  schema.fields.forEach(f => { if (subFields[f.k]) obj[f.k] = subFields[f.k]; });
  return JSON.stringify(obj);
}

// Human-readable summary of stored fields (for table display)
function credFieldSummary(type) {
  const schema = CRED_SCHEMAS[type] || CRED_SCHEMAS.generic;
  if (schema.fields.length === 1) return null;
  return schema.fields.filter(f=>!f.secret).map(f=>f.l).join(' · ');
}

// ── CronBuilder ────────────────────────────────────────────────────────────
const HOUR_LABELS = ["Midnight","1 AM","2 AM","3 AM","4 AM","5 AM","6 AM","7 AM",
  "8 AM","9 AM","10 AM","11 AM","Noon","1 PM","2 PM","3 PM","4 PM","5 PM",
  "6 PM","7 PM","8 PM","9 PM","10 PM","11 PM"];
const WEEKDAY_LABELS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function CronBuilder({ value, onChange, timezone }) {
  const [mode, setMode] = useState("fixed"); // "fixed" | "expression"
  const [type, setType] = useState("day");   // minute|hour|day|week|month
  const [cfg, setCfg] = useState({
    minuteInterval: 15,
    hourInterval: 1,  hourMinute: 0,
    dayInterval: 1,   dayHour: 9,   dayMinute: 0,
    weekDays: [1],    weekHour: 9,  weekMinute: 0,
    monthDay: 1,      monthHour: 9, monthMinute: 0,
  });
  const [expr, setExpr] = useState(value || "0 9 * * *");
  const [nextRun, setNextRun] = useState(null);   // {valid, next[], error}
  const [fetchingNext, setFetchingNext] = useState(false);

  function buildCron(t, c) {
    switch(t || type) {
      case "minute": return `*/${c.minuteInterval||1} * * * *`;
      case "hour":   return `${c.hourMinute} */${c.hourInterval||1} * * *`;
      case "day":    return `${c.dayMinute} ${c.dayHour} */${c.dayInterval||1} * *`;
      case "week":   return `${c.weekMinute} ${c.weekHour} * * ${(c.weekDays.length?c.weekDays:[0]).sort().join(",")}`;
      case "month":  return `${c.monthMinute} ${c.monthHour} ${c.monthDay} * *`;
      default:       return "0 9 * * *";
    }
  }

  function update(patch, newType) {
    const next = {...cfg, ...patch};
    setCfg(next);
    if (mode === "fixed") onChange(buildCron(newType || type, next));
  }

  function switchMode(m) {
    setMode(m);
    if (m === "fixed") onChange(buildCron(type, cfg));
    else onChange(expr);
  }

  function switchType(t) {
    setType(t);
    if (mode === "fixed") onChange(buildCron(t, cfg));
  }

  function toggleDay(d) {
    const days = cfg.weekDays.includes(d)
      ? cfg.weekDays.filter(x=>x!==d)
      : [...cfg.weekDays, d];
    update({ weekDays: days.length ? days : [d] });
  }

  // fire on mount so form.cron is populated from initial fixed state
  useEffect(()=>{ if(mode==="fixed") onChange(buildCron(type, cfg)); },[]);

  const preview = mode==="fixed" ? buildCron(type, cfg) : expr;

  // Fetch next-run times whenever the cron expression changes (debounced 500 ms)
  useEffect(()=>{
    if(!preview) return;
    const timer = setTimeout(async ()=>{
      setFetchingNext(true);
      try {
        const tz = encodeURIComponent(timezone||"UTC");
        const r = await api("GET",`/api/schedules/next-run?cron=${encodeURIComponent(preview)}&timezone=${tz}&count=3`);
        setNextRun(r);
      } catch(e) { setNextRun({valid:false,error:e.message}); }
      setFetchingNext(false);
    }, 500);
    return ()=>clearTimeout(timer);
  },[preview, timezone]);

  const pill = (active, onClick, children, extra={}) => (
    <span onClick={onClick} style={{
      padding:"3px 10px", borderRadius:20, fontSize:12, cursor:"pointer", userSelect:"none",
      fontWeight:600, border:"1px solid",
      background: active?"#7c3aed":"transparent",
      borderColor: active?"#7c3aed":"#2a2d3e",
      color: active?"#fff":"#64748b",
      ...extra
    }}>{children}</span>
  );

  const sel = (val, opts, onChange_) => (
    <select value={val} onChange={e=>onChange_(+e.target.value || e.target.value)}
      style={{flex:1,minWidth:0}}>
      {opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
    </select>
  );

  const num = (val, min, max, onChg) => (
    <input type="number" value={val} min={min} max={max} onChange={e=>onChg(+e.target.value)}
      style={{width:70}}/>
  );

  const row = (label, children) => (
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
      <span style={{width:160,fontSize:12,color:"#94a3b8",flexShrink:0}}>{label}</span>
      {children}
    </div>
  );

  const minuteOpts = [1,2,5,10,15,20,30].map(n=>[n,`${n} min${n>1?"s":""}`]);
  const hourOpts   = [1,2,3,4,6,8,12].map(n=>[n,`${n} hour${n>1?"s":""}`]);
  const hourSel    = HOUR_LABELS.map((l,i)=>[i,l]);
  const minSel     = Array.from({length:60},(_,i)=>[i,String(i).padStart(2,"0")]);

  return (
    <div style={{background:"#13151f",border:"1px solid #1e2130",borderRadius:8,padding:"12px 14px"}}>
      {/* header row */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <span style={{fontSize:12,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em"}}>Trigger Schedule</span>
        <div style={{display:"flex",gap:4}}>
          {pill(mode==="fixed",  ()=>switchMode("fixed"),  "Fixed")}
          {pill(mode==="expr",   ()=>switchMode("expr"),   "Expression")}
        </div>
      </div>

      {mode==="expr" ? (
        <input value={expr} onChange={e=>{ setExpr(e.target.value); onChange(e.target.value); }}
          placeholder="0 9 * * *" style={{width:"100%",fontFamily:"monospace"}}/>
      ) : (
        <>
          {/* interval type */}
          {row("Trigger Interval",
            <select value={type} onChange={e=>switchType(e.target.value)} style={{flex:1}}>
              <option value="minute">Minutes</option>
              <option value="hour">Hours</option>
              <option value="day">Days</option>
              <option value="week">Weeks</option>
              <option value="month">Months</option>
            </select>
          )}

          {type==="minute" && row("Every",
            sel(cfg.minuteInterval, minuteOpts, v=>update({minuteInterval:v}))
          )}

          {type==="hour" && <>
            {row("Every",    sel(cfg.hourInterval, hourOpts, v=>update({hourInterval:v})))}
            {row("At Minute", num(cfg.hourMinute, 0, 59, v=>update({hourMinute:v})))}
          </>}

          {type==="day" && <>
            {row("Every",    sel(cfg.dayInterval, [1,2,3,7,14].map(n=>[n,`${n} day${n>1?"s":""}`]), v=>update({dayInterval:v})))}
            {row("At Hour",  sel(cfg.dayHour,    hourSel, v=>update({dayHour:v})))}
            {row("At Minute",num(cfg.dayMinute,  0, 59,   v=>update({dayMinute:v})))}
          </>}

          {type==="week" && <>
            {row("On Days",
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {WEEKDAY_LABELS.map((d,i)=>pill(cfg.weekDays.includes(i),()=>toggleDay(i),d,{fontSize:11}))}
              </div>
            )}
            {row("At Hour",  sel(cfg.weekHour,   hourSel, v=>update({weekHour:v})))}
            {row("At Minute",num(cfg.weekMinute, 0, 59,   v=>update({weekMinute:v})))}
          </>}

          {type==="month" && <>
            {row("On Day",   num(cfg.monthDay,   1, 31, v=>update({monthDay:v})))}
            {row("At Hour",  sel(cfg.monthHour,  hourSel, v=>update({monthHour:v})))}
            {row("At Minute",num(cfg.monthMinute,0, 59,  v=>update({monthMinute:v})))}
          </>}
        </>
      )}

      {/* cron preview + validation */}
      <div style={{marginTop:10,padding:"7px 10px",background:"#0d0f1a",borderRadius:6}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom: nextRun ? 4 : 0}}>
          <span style={{fontSize:10,color:"#475569",flexShrink:0}}>cron</span>
          <code style={{fontSize:12,color: nextRun?.valid===false ? "#f87171" : "#a78bfa",fontFamily:"monospace"}}>{preview}</code>
          {nextRun?.valid===false && <span style={{fontSize:10,color:"#f87171",marginLeft:4}}>⚠ invalid</span>}
        </div>
        {nextRun?.valid===false && nextRun.error && (
          <div style={{fontSize:11,color:"#f87171",marginTop:2}}>{nextRun.error}</div>
        )}
        {nextRun?.valid && nextRun.next?.length > 0 && (
          <div style={{fontSize:11,color:"#4ade80",marginTop:2}}>
            Next: {new Date(nextRun.next[0]).toLocaleString()}
            {nextRun.next[1] && <span style={{color:"#475569"}}> · {new Date(nextRun.next[1]).toLocaleString()}</span>}
          </div>
        )}
        {fetchingNext && <div style={{fontSize:10,color:"#475569",marginTop:2}}>checking…</div>}
      </div>
    </div>
  );
}

function FlowPicker({ value, onChange, graphs, scripts }) {
  const [query, setQuery] = useState(value || "");
  const [open,  setOpen]  = useState(false);
  const wrapRef = useRef(null);

  useEffect(()=>{ if(!value) setQuery(""); }, [value]);

  useEffect(()=>{
    if(!open) return;
    function close(e){ if(wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", close);
    return ()=>document.removeEventListener("mousedown", close);
  },[open]);

  const q = (query||"").toLowerCase();
  const filteredGraphs   = (graphs  ||[]).filter(g => g.name.toLowerCase().includes(q)).slice(0, 20);
  const filteredScripts  = (scripts ||[]).filter(s => s.name.toLowerCase().includes(q)).slice(0, 20);
  const hasResults = filteredGraphs.length > 0 || filteredScripts.length > 0;

  function selectGraph(g)  { setQuery(g.name);               onChange({workflow: g.name,              graph_id: g.id});   setOpen(false); }
  function selectScript(s) { setQuery("script:" + s.name);  onChange({workflow: "script:" + s.name,  graph_id: null});   setOpen(false); }

  function handleInput(e) { setQuery(e.target.value); onChange({workflow: e.target.value, graph_id: null}); setOpen(true); }

  const sectionLabel = {
    padding:"4px 12px 2px",fontSize:10,fontWeight:700,letterSpacing:"0.08em",
    textTransform:"uppercase",color:"#475569",background:"#13151f"
  };

    padding:"8px 12px",cursor:"pointer",display:"flex",alignItems:"center",
    justifyContent:"space-between",borderBottom:"1px solid #1e2130",fontSize:13
  };

  return (
    <div ref={wrapRef} style={{position:"relative"}}>
      <input required value={query} onChange={handleInput} onFocus={()=>setOpen(true)}

                  <span style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:10,background:"#312e81",color:"#a5b4fc",borderRadius:4,padding:"1px 6px",fontWeight:600}}>Flow</span>
                    <span style={{fontSize:10,color:"#475569",fontFamily:"monospace"}}>#{g.id}</span>

function CronNextRun({ cron, timezone, enabled, runAt }) {
  const [info, setInfo] = useState(null);
  const [now, setNow]   = useState(Date.now());

  // Tick every second so the relative countdown updates live
  useEffect(()=>{
    const t = setInterval(()=>setNow(Date.now()), 1000);
    return ()=>clearInterval(t);
  },[]);

  useEffect(()=>{
    if (runAt) { setInfo({ valid: true, next: [runAt] }); return; }
    if (!cron) return;
    let cancelled = false;
    api("GET",`/api/schedules/next-run?cron=${encodeURIComponent(cron)}&timezone=${encodeURIComponent(timezone||"UTC")}&count=1`)
      .then(r=>{ if(!cancelled) setInfo(r); })
      .catch(()=>{ if(!cancelled) setInfo({valid:false}); });
    return ()=>{ cancelled=true; };
  },[cron,timezone,runAt]);

  function fmtRelative(isoStr) {
    const diff = new Date(isoStr) - now;
    if (diff <= 0) return "now";
    const s = Math.floor(diff / 1000);
    if (s < 60)   return `in ${s}s`;
    const m = Math.floor(s / 60);
    if (m < 60)   return `in ${m}m ${s % 60}s`;
    const h = Math.floor(m / 60);
    if (h < 24)   return `in ${h}h ${m % 60}m`;
    const d = Math.floor(h / 24);
    return `in ${d}d ${h % 24}h`;
  }

  if (!info) return <span style={{fontSize:11,color:"#475569"}}>—</span>;
  if (!info.valid) return <span style={{fontSize:11,color:"#f87171"}}>⚠ invalid cron</span>;
  if (!enabled) return <span style={{fontSize:11,color:"#64748b"}}>paused</span>;
  if (!info.next?.length) return <span style={{fontSize:11,color:"#475569"}}>—</span>;
  return (
    <span style={{fontSize:11}}>
      <span style={{color:"#4ade80",fontWeight:600}}>{fmtRelative(info.next[0])}</span>
      <span style={{color:"#475569",marginLeft:6}}>{new Date(info.next[0]).toLocaleString()}</span>
    </span>
  );
}

// ── DateTimePicker ────────────────────────────────────────────────────────
// Separate date + time inputs (each opens its own native picker) with
// quick-pick shortcuts to pre-fill common times.
function DateTimePicker({ value, onChange, required }) {
  const pad = n => String(n).padStart(2,"0");

  // Split the combined "YYYY-MM-DDTHH:mm" string into parts
  const datePart = value ? value.split("T")[0] : "";
  const timePart = value ? (value.split("T")[1] || "09:00") : "09:00";

  function combine(d, t) {
    if (!d) { onChange(""); return; }
    onChange(`${d}T${t || "09:00"}`);
  }

  function localStr(dt) {
    return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
  }

  const picks = [
    { label:"In 1 hour",    fn:()=>{ const d=new Date(); d.setHours(d.getHours()+1,0,0,0); return d; }},
    { label:"In 4 hours",   fn:()=>{ const d=new Date(); d.setHours(d.getHours()+4,0,0,0); return d; }},
    { label:"Tonight 8pm",  fn:()=>{ const d=new Date(); d.setHours(20,0,0,0);             return d; }},
    { label:"Tomorrow 9am", fn:()=>{ const d=new Date(); d.setDate(d.getDate()+1); d.setHours(9,0,0,0); return d; }},
    { label:"Mon 9am",      fn:()=>{
        const d=new Date();
        d.setDate(d.getDate() + ((8-d.getDay())%7||7));
        d.setHours(9,0,0,0);
        return d;
    }},
  ];

  const inputStyle = {
    background:"#0f1117", border:"1px solid #2a2d3e", borderRadius:6,
    padding:"6px 10px", color:"#e2e8f0", fontSize:13,
    colorScheme:"dark",   // tells Chrome/Safari to render the picker dark
  };

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:6}}>
        <input
          type="date"
          value={datePart}
          onChange={e=>combine(e.target.value, timePart)}
          required={required}
          style={{...inputStyle, flex:1}}
        />
        <input
          type="time"
          value={timePart}
          onChange={e=>combine(datePart, e.target.value)}
          style={{...inputStyle, width:110, flex:"none"}}
        />
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {picks.map(p=>(
          <button key={p.label} type="button"
            onClick={()=>onChange(localStr(p.fn()))}
            style={{
              padding:"3px 9px", fontSize:11, borderRadius:6, cursor:"pointer",
              border:"1px solid #2a2d3e", background:"#1a1d2e", color:"#94a3b8", fontWeight:500,
            }}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#7c3aed"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#2a2d3e"}>
            {p.label}
          </button>
        ))}
      </div>
    </div>
  );
}

  "UTC",
  "Europe/London","Europe/Paris","Europe/Berlin","Europe/Amsterdam",
  "Europe/Madrid","Europe/Rome","Europe/Stockholm","Europe/Warsaw",
  "Europe/Athens","Europe/Helsinki","Europe/Lisbon",
  "America/New_York","America/Chicago","America/Denver","America/Los_Angeles",
  "America/Toronto","America/Vancouver","America/Sao_Paulo","America/Mexico_City",
  "America/Buenos_Aires","America/Bogota","America/Lima",
  "Asia/Dubai","Asia/Kolkata","Asia/Dhaka","Asia/Bangkok",
  "Asia/Singapore","Asia/Hong_Kong","Asia/Shanghai","Asia/Tokyo","Asia/Seoul",
  "Asia/Karachi","Asia/Tashkent","Asia/Yekaterinburg",
  "Australia/Sydney","Australia/Melbourne","Australia/Perth","Australia/Brisbane",

];

function TimezoneSelect({ value, onChange }) {
  const [search, setSearch] = useState("");
  const [open,   setOpen]   = useState(false);
  const ref = useRef(null);

  useEffect(()=>{
    if (!open) return;
    function close(e){ if(ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", close);
    return ()=>document.removeEventListener("mousedown", close);
  },[open]);

  const filtered = search
    ? COMMON_TZ.filter(tz=>tz.toLowerCase().includes(search.toLowerCase()))
    : COMMON_TZ;

  return (
    <div ref={ref} style={{position:"relative"}}>
      <input
        value={open ? search : (value||"UTC")}
        onChange={e=>{ setSearch(e.target.value); setOpen(true); }}
        onFocus={()=>{ setSearch(""); setOpen(true); }}
        placeholder="UTC"
      />
      {open && (
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,
          background:"#1a1d2e",border:"1px solid #7c3aed",borderRadius:8,
          zIndex:999,maxHeight:220,overflowY:"auto",boxShadow:"0 8px 24px rgba(0,0,0,.5)"}}>
          {filtered.length === 0 && (
            <div style={{padding:"10px 12px",fontSize:12,color:"#475569"}}>No matches</div>
          )}
          {filtered.map(tz=>(
            <div key={tz}
              onMouseDown={()=>{ onChange(tz); setSearch(""); setOpen(false); }}
              style={{padding:"7px 12px",cursor:"pointer",fontSize:12,
                background: tz===value?"#2a2d3e":"",
                color: tz===value?"#e2e8f0":"#94a3b8"}}
              onMouseEnter={e=>e.currentTarget.style.background="#252840"}
              onMouseLeave={e=>e.currentTarget.style.background=tz===value?"#2a2d3e":""}>
              {tz}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Schedules({ showToast, user }) {
  const [schedules, setSchedules] = useState([]);
  const [graphs,    setGraphs]    = useState([]);
  const [scripts,   setScripts]   = useState([]);
  const [confirmState, setConfirmState] = useState(null);
  const [runningNow, setRunningNow] = useState({});  // {scheduleId: true} while triggering

  // Detect default timezone: prefer server APP_TIMEZONE, fall back to browser tz, then UTC
  const browserTz = Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";
  const [defaultTz, setDefaultTz] = useState(browserTz);

  // Create form
  const [schedMode, setSchedMode] = useState("recurring"); // "recurring" | "once"
  const [form, setForm] = useState({
    name:"", workflow:"", graph_id:null,
    cron:"0 9 * * *", payload:"{}", timezone:browserTz, run_at:""
  });

  // Inline edit
  const [editingId, setEditingId] = useState(null);
  const [editForm,  setEditForm]  = useState({});

  const load = async () => { try { setSchedules(await api("GET","/api/schedules")); } catch(e){} };
  useEffect(()=>{
    load();
    api("GET","/api/graphs").then(setGraphs).catch(()=>{});
    api("GET","/api/scripts").then(data => setScripts(Array.isArray(data) ? data : (data.scripts || []))).catch(()=>{});
    // Fetch server-configured timezone and apply to the form if not yet edited
    api("GET","/api/system/status").then(st => {
      const tz = st?.system?.app_timezone;
      if (tz) {
        setDefaultTz(tz);
        setForm(f => ({...f, timezone: tz}));
      }
    }).catch(()=>{});
  },[]);

  async function create(e) {
    e.preventDefault();
    if (!form.workflow?.trim()) { showToast("Select a flow or script", "error"); return; }
    if (schedMode === "once" && !form.run_at) { showToast("Pick a date/time", "error"); return; }
    try {
      const body = {
        ...form,
        payload: JSON.parse(form.payload || "{}"),
        cron:   schedMode === "once" ? null : form.cron,
        run_at: schedMode === "once" ? new Date(form.run_at).toISOString() : null,
      };
      await api("POST", "/api/schedules", body);
      setForm({name:"",workflow:"",graph_id:null,cron:"0 9 * * *",payload:"{}",timezone:defaultTz,run_at:""});
      setSchedMode("recurring");
      load(); showToast("Schedule created");
    } catch(err) { showToast(err.message, "error"); }
  }

  async function toggle(id) {
    try { await api("POST",`/api/schedules/${id}/toggle`); load(); }
    catch(e){ showToast(e.message,"error"); }
  }

  async function runNow(id, name) {
    setRunningNow(r=>({...r,[id]:true}));
    try {
      const res = await api("POST",`/api/schedules/${id}/run-now`);
      showToast(`▶ "${name}" queued (task ${res.task_id?.slice(0,8)}…)`);
    } catch(e){ showToast(e.message,"error"); }
    setRunningNow(r=>({...r,[id]:false}));
  }

  function confirmDel(id, name) {
    setConfirmState({
      message: `Delete schedule "${name}"? This cannot be undone.`,
      confirmLabel: "Delete",
      fn: async () => {
        try { await api("DELETE",`/api/schedules/${id}`); load(); showToast("Schedule deleted"); }
        catch(e){ showToast(e.message,"error"); }
      }
    });
  }

  function startEdit(s) {
    setEditingId(s.id);
    setEditForm({
      name: s.name,
      workflow: s.workflow || "",
      graph_id: s.graph_id || null,
      cron: s.cron || "0 9 * * *",
      payload: typeof s.payload === "object" ? JSON.stringify(s.payload) : (s.payload || "{}"),
      timezone: s.timezone || defaultTz,
      run_at: s.run_at ? new Date(s.run_at).toISOString().slice(0,16) : "",
      mode: s.run_at ? "once" : "recurring",
    });
  }

  async function saveEdit(e) {
    e.preventDefault();
    try {
      const body = {
        name: editForm.name,
        workflow: editForm.workflow,
        graph_id: editForm.graph_id,
        payload: JSON.parse(editForm.payload || "{}"),
        timezone: editForm.timezone,
        cron:   editForm.mode === "once" ? null : editForm.cron,
        run_at: editForm.mode === "once" ? new Date(editForm.run_at).toISOString() : null,
      };
      await api("PUT", `/api/schedules/${editingId}`, body);
      setEditingId(null); setEditForm({});
      load(); showToast("Schedule updated");
    } catch(ex) { showToast(ex.message,"error"); }
  }

  const ro = user?.role === "viewer";

  const pill = (active, onClick, label) => (
    <span onClick={onClick} style={{
      padding:"3px 12px", borderRadius:20, fontSize:12, cursor:"pointer",
      fontWeight:600, border:"1px solid",
      background: active?"#7c3aed":"transparent",
      borderColor: active?"#7c3aed":"#2a2d3e",
      color: active?"#fff":"#64748b",
    }}>{label}</span>
  );

  return (
    <div>
      <h1 className="page-title">Schedules</h1>
      {ro && <ViewerBanner/>}

      {!ro && (
        <div className="card">
          <div className="card-title">New Schedule</div>
          <form onSubmit={create}>
            <div className="form-row">
              <div className="form-group">
                <label>Name</label>
                <input required value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Daily digest"/>
              </div>
              <div className="form-group">
                <label>Flow / Script</label>
                <FlowPicker value={form.workflow} graphs={graphs} scripts={scripts}
                  onChange={({workflow,graph_id})=>setForm({...form,workflow,graph_id})}/>
              </div>
            </div>

            {/* Mode toggle */}
            <div className="form-group">
              <label>Schedule Type</label>
              <div style={{display:"flex",gap:6,marginTop:2}}>
                {pill(schedMode==="recurring", ()=>setSchedMode("recurring"), "🔁 Recurring")}
                {pill(schedMode==="once",      ()=>setSchedMode("once"),      "⚡ Run Once")}
              </div>
            </div>

            {schedMode === "recurring" ? (
              <div className="form-row" style={{alignItems:"flex-start"}}>
                <div className="form-group" style={{flex:2}}>
                  <label>Schedule</label>
                  <CronBuilder value={form.cron} onChange={v=>setForm({...form,cron:v})} timezone={form.timezone}/>
                </div>
                <div className="form-group" style={{flex:1}}>
                  <label>Timezone</label>
                  <TimezoneSelect value={form.timezone} onChange={v=>setForm({...form,timezone:v})}/>
                </div>
              </div>
            ) : (
              <div className="form-row">
                <div className="form-group">
                  <label>Run at (local time)</label>
                  <DateTimePicker value={form.run_at} onChange={v=>setForm({...form,run_at:v})} required={schedMode==="once"}/>
                </div>
                <div className="form-group">
                  <label>Timezone</label>
                  <TimezoneSelect value={form.timezone} onChange={v=>setForm({...form,timezone:v})}/>
                </div>
              </div>
            )}

            <div className="form-group">
              <label>Payload (JSON)</label>
              <input value={form.payload} onChange={e=>setForm({...form,payload:e.target.value})} placeholder="{}"/>
            </div>
            <button type="submit" className="btn btn-primary">+ Create</button>
          </form>
        </div>
      )}

      <div className="card">
        <div className="card-title">Scheduled Jobs</div>
        {schedules.length===0 ? <div className="empty-state">No schedules yet.</div> : (
          <table>
            <thead>
              <tr><th>Name</th><th>Flow</th><th>Schedule</th><th>Next run</th><th>Last run</th><th>Status</th>{!ro && <th></th>}</tr>
            </thead>
            <tbody>
              {schedules.map(s=>{
                const lastRunBadge = s.last_run_status ? (
                  <span style={{display:"flex",flexDirection:"column",gap:2}}>
                    <span className={`badge badge-${s.last_run_status}`} style={{fontSize:10}}>{s.last_run_status}</span>
                    <span style={{fontSize:10,color:"#475569"}}>{new Date(s.last_run_at).toLocaleString()}</span>
                    {s.last_run_duration_ms && <span style={{fontSize:10,color:"#475569"}}>{(s.last_run_duration_ms/1000).toFixed(1)}s</span>}
                  </span>
                ) : <span style={{fontSize:11,color:"#475569"}}>never</span>;

                return (
                <React.Fragment key={s.id}>
                  <tr>
                    <td style={{fontWeight:500}}>{s.name}</td>
                    <td style={{fontSize:12}}>
                      {s.graph_name
                        ? <span style={{color:"#a78bfa"}}>{s.graph_name}</span>
                        : <span style={{color:"#475569",fontFamily:"monospace"}}>{s.workflow || "—"}</span>}
                    </td>
                    <td style={{fontFamily:"monospace",fontSize:12}}>
                      {s.run_at
                        ? <span><span style={{fontSize:10,background:"#1e3a5f",color:"#60a5fa",borderRadius:4,padding:"1px 6px",fontWeight:600,marginRight:6}}>ONCE</span>{new Date(s.run_at).toLocaleString()}</span>
                        : s.cron}
                    </td>
                    <td>
                      <CronNextRun cron={s.cron} timezone={s.timezone} enabled={s.enabled} runAt={s.run_at}/>
                    </td>
                    <td>{lastRunBadge}</td>
                    <td><span className={`badge ${s.enabled?"badge-succeeded":"badge-cancelled"}`}>{s.enabled?"active":"paused"}</span></td>
                    {!ro && (
                      <td>
                        <div style={{display:"flex",gap:6}}>
                          {s.graph_id && (
                            <button className="btn btn-primary btn-sm"
                              onClick={()=>runNow(s.id, s.name)}
                              disabled={runningNow[s.id]}
                              title="Run now">
                              {runningNow[s.id] ? "…" : "▶"}
                            </button>
                          )}
                          <button className="btn btn-ghost" onClick={()=>startEdit(s)} title="Edit schedule">✏️</button>
                          {!s.run_at && (
                            <button className="btn btn-ghost" onClick={()=>toggle(s.id)}>{s.enabled?"Pause":"Resume"}</button>
                          )}
                          <button className="btn btn-danger btn-sm" onClick={()=>confirmDel(s.id,s.name)} title="Delete schedule">✕</button>
                        </div>
                      </td>
                    )}
                  </tr>
                  {editingId === s.id && (
                    <tr style={{background:"#0f1117"}}>
                      <td colSpan="6" style={{padding:"16px"}}>
                        <form onSubmit={saveEdit}>
                          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
                            <div style={{display:"flex",flexDirection:"column",gap:4,flex:1,minWidth:160}}>
                              <label style={{fontSize:11,color:"#94a3b8"}}>Name</label>
                              <input required value={editForm.name} onChange={e=>setEditForm(p=>({...p,name:e.target.value}))}/>
                            </div>
                            <div style={{display:"flex",flexDirection:"column",gap:4,flex:1,minWidth:180}}>
                              <label style={{fontSize:11,color:"#94a3b8"}}>Flow / Script</label>
                              <FlowPicker value={editForm.workflow} graphs={graphs} scripts={scripts}
                                onChange={({workflow,graph_id})=>setEditForm(p=>({...p,workflow,graph_id}))}/>
                            </div>
                          </div>
                          <div style={{marginTop:10,display:"flex",gap:6,marginBottom:10}}>
                            {pill(editForm.mode==="recurring", ()=>setEditForm(p=>({...p,mode:"recurring"})), "🔁 Recurring")}
                            {pill(editForm.mode==="once",      ()=>setEditForm(p=>({...p,mode:"once"})),      "⚡ Run Once")}
                          </div>
                          {editForm.mode==="recurring" ? (
                            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12,marginBottom:10}}>
                              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                                <label style={{fontSize:11,color:"#94a3b8"}}>Cron</label>
                                <input value={editForm.cron} onChange={e=>setEditForm(p=>({...p,cron:e.target.value}))} style={{fontFamily:"monospace"}}/>
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                                <label style={{fontSize:11,color:"#94a3b8"}}>Timezone</label>
                                <TimezoneSelect value={editForm.timezone} onChange={v=>setEditForm(p=>({...p,timezone:v}))}/>
                              </div>
                            </div>
                          ) : (
                            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12,marginBottom:10}}>
                              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                                <label style={{fontSize:11,color:"#94a3b8"}}>Run at</label>
                                <DateTimePicker value={editForm.run_at} onChange={v=>setEditForm(p=>({...p,run_at:v}))}/>
                              </div>
                              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                                <label style={{fontSize:11,color:"#94a3b8"}}>Timezone</label>
                                <TimezoneSelect value={editForm.timezone} onChange={v=>setEditForm(p=>({...p,timezone:v}))}/>
                              </div>
                            </div>
                          )}
                          <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10}}>
                            <label style={{fontSize:11,color:"#94a3b8"}}>Payload (JSON)</label>
                            <input value={editForm.payload} onChange={e=>setEditForm(p=>({...p,payload:e.target.value}))}/>
                          </div>
                          <div style={{display:"flex",gap:6}}>
                            <button type="submit" className="btn btn-primary">Save</button>
                            <button type="button" className="btn btn-ghost" onClick={()=>setEditingId(null)}>Cancel</button>
                          </div>
                        </form>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );})}
            </tbody>
          </table>
        )}
      </div>
      {confirmState && <ConfirmModal message={confirmState.message} confirmLabel={confirmState.confirmLabel} onConfirm={()=>{confirmState.fn();setConfirmState(null);}} onCancel={()=>setConfirmState(null)}/>}
    </div>
  );
}

function Logs({ showToast }) {
  const [runs, setRuns]           = useState([]);
  const [total, setTotal]         = useState(0);
  const [page, setPage]           = useState(1);
  const [pages, setPages]         = useState(1);
  const PAGE_SIZE                 = 50;
  const [loading, setLoading]     = useState(true);
  const [selected, setSelected]   = useState(null);
  const [search, setSearch]       = useState("");
  const [searchInput, setSearchInput] = useState("");
  const [statusFilter, setStatus] = useState("all");

  const load = async (pg, st, sq) => {
    setLoading(true);
    try {
      const params = new URLSearchParams({page: pg, page_size: PAGE_SIZE});
      if (st && st !== "all") params.set("status", st);
      if (sq) params.set("q", sq);
      const data = await api("GET", `/api/runs?${params}`);
      setRuns(data.runs ?? data);
      setTotal(data.total ?? (data.runs ?? data).length);
      setPage(data.page ?? pg);
      setPages(data.pages ?? 1);
    } catch(e){ showToast(e.message,"error"); }
    setLoading(false);
  };

  useEffect(()=>{ load(1, statusFilter, search); },[]);

  const handleStatusChange = (val) => {
    setStatus(val); setPage(1); setSelected(null);
    load(1, val, search);
  };
  const handleSearch = (val) => {
    setSearch(val); setPage(1); setSelected(null);
    load(1, statusFilter, val);
  };
  const goToPage = (pg) => {
    setPage(pg); setSelected(null);
    load(pg, statusFilter, search);
  };

  const STATUS_COLOR = {succeeded:"#4ade80",failed:"#f87171",running:"#34d399",queued:"#60a5fa",cancelled:"#9ca3af"};
  const TRACE_DOT    = {ok:"#4ade80",error:"#f87171",skipped:"#64748b"};

  function fmtTs(ts) {
    if (!ts) return "—";
    try { return new Date(ts).toLocaleString(); } catch { return ts; }
  }
  function fmtDur(ms) {
    if (!ms && ms !== 0) return "—";
    if (ms < 1000) return `${ms}ms`;
    return `${(ms/1000).toFixed(1)}s`;
  }

  const selRun = selected != null ? runs.find(r=>r.id===selected) : null;
  const traces = selRun?.traces || [];

  return (
    <div>
      <h1 className="page-title">Run Logs</h1>
      <div className="info-box" style={{marginBottom:16}}>
        Per-node execution traces for every run. Each entry shows status, duration, retries,
        and the input/output at each step. Data is stored in the database — there are no
        separate log files.
      </div>

      {/* Filter bar */}
      <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
        <input placeholder="Search by flow name or run ID…" value={searchInput}
          onChange={e=>setSearchInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handleSearch(searchInput)}
          onBlur={()=>handleSearch(searchInput)}
          style={{maxWidth:280,flex:"none"}}/>
        <select value={statusFilter} onChange={e=>handleStatusChange(e.target.value)} style={{width:130,flex:"none"}}>
          <option value="all">All statuses</option>
          <option value="succeeded">Succeeded</option>
          <option value="failed">Failed</option>
          <option value="running">Running</option>
          <option value="queued">Queued</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button className="btn btn-ghost" onClick={()=>load(page, statusFilter, search)}>↻ Refresh</button>
        <span style={{marginLeft:"auto",fontSize:12,color:"#64748b"}}>{total} run{total!==1?"s":""}</span>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"340px 1fr",gap:16,alignItems:"start"}}>
        {/* Run list + pagination */}
        <div>
          <div style={{background:"#1a1d2e",border:"1px solid #2a2d3e",borderRadius:10,overflow:"hidden"}}>
            {loading && <div className="empty-state" style={{padding:"30px 0"}}>Loading…</div>}
            {!loading && runs.length===0 && <div className="empty-state" style={{padding:"30px 0"}}>No runs match.</div>}
            {runs.map(r=>(
              <div key={r.id} onClick={()=>setSelected(r.id===selected?null:r.id)}
                style={{padding:"10px 14px",borderBottom:"1px solid #1e2235",cursor:"pointer",
                  background:selected===r.id?"#252840":"transparent",
                  borderLeft:`3px solid ${selected===r.id?"#7c3aed":"transparent"}`,
                  transition:"background .12s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                  <span style={{fontWeight:600,fontSize:13,color:"#e2e8f0"}}>
                    {r.flow_name || `run #${r.id}`}
                  </span>
                  <span style={{fontSize:11,fontWeight:600,color:STATUS_COLOR[r.status]||"#94a3b8"}}>
                    {r.status}
                  </span>
                </div>
                <div style={{fontSize:11,color:"#64748b"}}>
                  #{r.id} · {fmtTs(r.created_at)}
                  {(r.traces||[]).length > 0 &&
                    <span style={{marginLeft:6}}>{r.traces.length} node{r.traces.length!==1?"s":""}</span>}
                </div>
              </div>
            ))}
          </div>
          {/* Pagination controls */}
          {pages > 1 && (
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:10}}>
              <button className="btn btn-ghost" style={{padding:"3px 10px",fontSize:12}}
                disabled={page<=1} onClick={()=>goToPage(page-1)}>‹ Prev</button>
              <span style={{fontSize:12,color:"#94a3b8"}}>Page {page} of {pages}</span>
              <button className="btn btn-ghost" style={{padding:"3px 10px",fontSize:12}}
                disabled={page>=pages} onClick={()=>goToPage(page+1)}>Next ›</button>
            </div>
          )}
        </div>

        {/* Trace detail */}
        <div>
          {!selRun
            ? <div className="empty-state" style={{paddingTop:60,background:"#1a1d2e",border:"1px solid #2a2d3e",borderRadius:10}}>
                ← Select a run to view its node traces
              </div>
            : <>
                <div className="card" style={{marginBottom:12}}>
