<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Accept invitation — HiveRunr</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0f1a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#13151f;border:1px solid #1e2130;border-radius:16px;padding:40px 36px;
    width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
  .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#7c3aed,#a855f7);
    border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
  .logo-text{font-size:22px;font-weight:700;color:#e2e8f0;letter-spacing:-.5px}
  h1{font-size:18px;font-weight:600;color:#e2e8f0;margin-bottom:4px;text-align:center}
  .subtitle{font-size:13px;color:#64748b;text-align:center;margin-bottom:28px}
  label{display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px;
    text-transform:uppercase;letter-spacing:.04em}
  input{width:100%;padding:10px 13px;background:#0d0f1a;border:1px solid #2a2d3e;border-radius:8px;
    color:#e2e8f0;font-size:14px;outline:none;transition:border-color .15s}
  input:focus{border-color:#7c3aed}
  .field{margin-bottom:18px}
  .btn{width:100%;padding:11px;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;
    border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;
    transition:opacity .15s;margin-top:8px}
  .btn:hover{opacity:.88}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;
    color:#fca5a5;font-size:13px;padding:10px 14px;margin-bottom:16px;display:none}
  .info-box{background:#1e2130;border:1px solid #2d3148;border-radius:8px;
    padding:12px 16px;margin-bottom:20px;font-size:13px;color:#94a3b8}
  .info-box strong{color:#e2e8f0}
  .role-badge{display:inline-block;background:#312e81;color:#a78bfa;border-radius:4px;
    font-size:11px;font-weight:600;padding:2px 8px;margin-left:6px}
  .spin{animation:spin .8s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">HiveRunr</div>
  </div>
  <h1 id="title">You've been invited</h1>
  <p class="subtitle" id="subtitle">Loading invitation…</p>
  <div class="err" id="err"></div>

  <!-- Signup form (shown for new users) -->
  <form id="signupForm" style="display:none" onsubmit="return doSignup(event)">
    <div class="field">
      <label>Email</label>
      <input type="email" id="emailDisplay" readonly style="opacity:.6"/>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Choose a username" required autocomplete="username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" required autocomplete="new-password"/>
    </div>
    <input type="hidden" id="inviteToken"/>
    <button class="btn" type="submit" id="signupBtn">Create account & join</button>
  </form>

  <!-- Already accepted message -->
  <div id="acceptedMsg" style="display:none;text-align:center">
    <div style="font-size:36px;margin-bottom:16px">✅</div>
    <p style="color:#64748b;font-size:14px;margin-bottom:20px" id="acceptedText">You now have access to the flow.</p>
    <a href="/canvas" class="btn" style="display:inline-block;text-decoration:none;text-align:center">
      Open canvas →
    </a>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token  = params.get("token");

function showErr(msg) {
  const el = document.getElementById("err");
  el.textContent = msg;
  el.style.display = "block";
}

async function init() {
  if (!token) { showErr("No invite token found in URL."); return; }
  try {
    const res = await fetch(`/api/invite/accept?token=${encodeURIComponent(token)}`);
    const data = await res.json();
    if (!res.ok) { showErr(data.detail || "Invalid or expired invite link."); return; }

    if (data.logged_in) {
      // Existing user — already granted, just redirect
      document.getElementById("title").textContent = "Invitation accepted!";
      document.getElementById("subtitle").textContent = `You now have ${data.role} access to "${data.graph_name}".`;
      document.getElementById("acceptedMsg").style.display = "block";
      // Auto-redirect after 2s
      setTimeout(() => {
        if (data.graph_id) window.location.href = "/canvas";
        else window.location.href = "/canvas";
      }, 2000);
      return;
    }

    if (data.needs_signup) {
      document.getElementById("title").textContent = "Create your account";
      const roleHtml = `<span class="role-badge">${data.role}</span>`;
      document.getElementById("subtitle").innerHTML =
        `You've been invited to <strong>${data.graph_name}</strong> as ${roleHtml}`;
      document.getElementById("emailDisplay").value = data.email;
      document.getElementById("inviteToken").value  = data.token;
      document.getElementById("signupForm").style.display = "block";
    }
  } catch(e) {
    showErr("Failed to validate invite: " + e.message);
  }
}

async function doSignup(e) {
  e.preventDefault();
  document.getElementById("err").style.display = "none";
  const btn  = document.getElementById("signupBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> Creating account…';
  try {
    const res = await fetch("/api/invite/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        token:    document.getElementById("inviteToken").value,
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
      }),
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.detail || "Signup failed."); btn.disabled=false; btn.textContent="Create account & join"; return; }

    document.getElementById("signupForm").style.display = "none";
    document.getElementById("title").textContent = "Welcome aboard!";
    document.getElementById("subtitle").textContent = `Account created. You now have ${data.role} access.`;
    document.getElementById("acceptedText").textContent = `You now have ${data.role} access.`;
    document.getElementById("acceptedMsg").style.display = "block";
    setTimeout(() => { window.location.href = "/canvas"; }, 1500);
  } catch(err) {
    showErr(err.message);
    btn.disabled=false;
    btn.textContent="Create account & join";
  }
}

init();
</script>
</body>
</html>
