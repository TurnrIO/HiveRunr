<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign in — HiveRunr</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0f1a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#13151f;border:1px solid #1e2130;border-radius:16px;padding:40px 36px;
    width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
  .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#7c3aed,#a855f7);
    border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
  .logo-text{font-size:22px;font-weight:700;color:#e2e8f0;letter-spacing:-.5px}
  h1{font-size:18px;font-weight:600;color:#e2e8f0;margin-bottom:4px;text-align:center}
  .subtitle{font-size:13px;color:#64748b;text-align:center;margin-bottom:28px}
  label{display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px;
    text-transform:uppercase;letter-spacing:.04em}
  input{width:100%;padding:10px 13px;background:#0d0f1a;border:1px solid #2a2d3e;border-radius:8px;
    color:#e2e8f0;font-size:14px;outline:none;transition:border-color .15s}
  input:focus{border-color:#7c3aed}
  .field{margin-bottom:18px}
  .btn{width:100%;padding:11px;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;
    border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;
    transition:opacity .15s;margin-top:8px}
  .btn:hover{opacity:.88}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{border-radius:8px;padding:10px 13px;font-size:13px;margin-bottom:18px;display:none}
  .msg.error{background:#f871711a;border:1px solid #f8717140;color:#fca5a5}
  .msg.success{background:#22c55e1a;border:1px solid #22c55e40;color:#86efac}
  .forgot-link{display:block;text-align:right;font-size:12px;color:#64748b;text-decoration:none;margin-top:-10px;margin-bottom:14px}
  .forgot-link:hover{color:#7c3aed}
  .back-link{display:block;text-align:center;font-size:13px;color:#64748b;text-decoration:none;margin-top:16px;cursor:pointer}
  .back-link:hover{color:#7c3aed}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
    border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">HiveRunr</div>
  </div>
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your account</p>

  <div class="msg error" id="err"></div>
  <div class="msg success" id="ok"></div>

  <!-- Login form -->
  <form id="login-form" onsubmit="login(event)">
    <div class="field">
      <label>Username</label>
      <input id="username" type="text" autocomplete="username" autofocus required placeholder="your-username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••"/>
    </div>
    <a class="forgot-link" href="#" onclick="showForgot(event)">Forgot password?</a>
    <button class="btn" id="btn" type="submit">Sign in</button>
  </form>

  <!-- Forgot password form (hidden by default) -->
  <form id="forgot-form" style="display:none" onsubmit="forgotPassword(event)">
    <p style="font-size:13px;color:#64748b;margin-bottom:18px;">
      Enter the owner account email address and we'll send a reset link.
    </p>
    <div class="field">
      <label>Owner email</label>
      <input id="forgot-email" type="email" autocomplete="email" required placeholder="owner@example.com"/>
    </div>
    <button class="btn" id="forgot-btn" type="submit">Send reset link</button>
    <a class="back-link" onclick="showLogin()">← Back to login</a>
  </form>

  <p id="signup-link" style="display:none;text-align:center;font-size:13px;color:#64748b;margin-top:16px">
    Don't have an account? <a href="/signup" style="color:#7c3aed;text-decoration:none">Create one free</a>
  </p>
</div>

<script>
// Show signup link if self-serve signup is enabled on this instance
(async () => {
  try {
    const res = await fetch('/api/auth/status');
    if (res.ok) {
      const data = await res.json();
      if (data.allow_signup) {
        document.getElementById('signup-link').style.display = 'block';
      }
    }
  } catch (e) { /* ignore */ }
})();

function showForgot(e) {
  e && e.preventDefault();
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('forgot-form').style.display = '';
  document.getElementById('err').style.display = 'none';
  document.getElementById('ok').style.display = 'none';
  document.getElementById('forgot-email').focus();
}
function showLogin() {
  document.getElementById('forgot-form').style.display = 'none';
  document.getElementById('login-form').style.display = '';
  document.getElementById('err').style.display = 'none';
  document.getElementById('ok').style.display = 'none';
}

async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    if (res.ok) {
      const next = new URLSearchParams(window.location.search).get('next') || '/';
      window.location.href = next;
    } else {
      const data = await res.json().catch(()=>({}));
      err.textContent = data.detail || 'Invalid username or password';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  } catch(ex) {
    err.textContent = 'Network error — please try again';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

async function forgotPassword(e) {
  e.preventDefault();
  const btn = document.getElementById('forgot-btn');
  const err = document.getElementById('err');
  const ok  = document.getElementById('ok');
  err.style.display = 'none';
  ok.style.display  = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending…';
  try {
    const res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: document.getElementById('forgot-email').value.trim()}),
    });
    const data = await res.json().catch(()=>({}));
    if (res.ok) {
      ok.textContent = data.message || 'If that email matches the owner account, a reset link has been sent.';
      ok.style.display = 'block';
    } else {
      err.textContent = data.detail || 'Something went wrong. Please try again.';
      err.style.display = 'block';
    }
  } catch(ex) {
    err.textContent = 'Network error — please try again';
    err.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = 'Send reset link';
}
</script>
</body>
</html>
