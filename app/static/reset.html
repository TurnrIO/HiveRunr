<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset password — HiveRunr</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0f1a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#13151f;border:1px solid #1e2130;border-radius:16px;padding:40px 36px;
    width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
  .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#7c3aed,#a855f7);
    border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
  .logo-text{font-size:22px;font-weight:700;color:#e2e8f0;letter-spacing:-.5px}
  h1{font-size:18px;font-weight:600;color:#e2e8f0;margin-bottom:4px;text-align:center}
  .subtitle{font-size:13px;color:#64748b;text-align:center;margin-bottom:28px}
  label{display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px;
    text-transform:uppercase;letter-spacing:.04em}
  input{width:100%;padding:10px 13px;background:#0d0f1a;border:1px solid #2a2d3e;border-radius:8px;
    color:#e2e8f0;font-size:14px;outline:none;transition:border-color .15s}
  input:focus{border-color:#7c3aed}
  .field{margin-bottom:18px}
  .btn{width:100%;padding:11px;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;
    border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;
    transition:opacity .15s;margin-top:8px}
  .btn:hover{opacity:.88}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{border-radius:8px;padding:10px 13px;font-size:13px;margin-bottom:18px;display:none}
  .msg.error{background:#f871711a;border:1px solid #f8717140;color:#fca5a5}
  .msg.success{background:#22c55e1a;border:1px solid #22c55e40;color:#86efac}
  .back{display:block;text-align:center;margin-top:20px;font-size:13px;color:#64748b;text-decoration:none}
  .back:hover{color:#7c3aed}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
    border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">HiveRunr</div>
  </div>
  <h1>Set new password</h1>
  <p class="subtitle" id="subtitle">Enter your new password below.</p>

  <div class="msg error" id="err"></div>
  <div class="msg success" id="ok"></div>

  <form id="form" onsubmit="reset(event)">
    <div class="field">
      <label>New password</label>
      <input id="pw1" type="password" autocomplete="new-password" required placeholder="At least 8 characters" autofocus/>
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input id="pw2" type="password" autocomplete="new-password" required placeholder="Same password again"/>
    </div>
    <button class="btn" id="btn" type="submit">Set password</button>
  </form>

  <a class="back" href="/login">← Back to login</a>
</div>

<script>
function getToken() {
  return new URLSearchParams(window.location.search).get('token') || '';
}

// If no token in URL, show error immediately
if (!getToken()) {
  document.getElementById('subtitle').textContent = 'Missing or invalid reset link.';
  document.getElementById('form').style.display = 'none';
}

async function reset(e) {
  e.preventDefault();
  const btn  = document.getElementById('btn');
  const err  = document.getElementById('err');
  const ok   = document.getElementById('ok');
  err.style.display = 'none';
  ok.style.display  = 'none';

  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  if (pw1 !== pw2) {
    err.textContent = 'Passwords do not match';
    err.style.display = 'block';
    return;
  }
  if (pw1.length < 8) {
    err.textContent = 'Password must be at least 8 characters';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Saving…';

  try {
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token: getToken(), new_password: pw1}),
    });
    const data = await res.json().catch(()=>({}));
    if (res.ok) {
      ok.textContent = 'Password updated! Redirecting to login…';
      ok.style.display = 'block';
      document.getElementById('form').style.display = 'none';
      setTimeout(() => window.location.href = '/login', 2000);
    } else {
      err.textContent = data.detail || 'Invalid or expired reset link.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Set password';
    }
  } catch(ex) {
    err.textContent = 'Network error — please try again';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Set password';
  }
}
</script>
</body>
</html>
