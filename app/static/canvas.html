            {node.data.type==="action.merge"&&(
              <div style={{background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:6,padding:"8px 10px",fontSize:10,color:"#94a3b8",marginTop:6,lineHeight:1.9}}>
                <div style={{color:"#a78bfa",fontWeight:600,marginBottom:4}}>⇒ Merge / Join</div>
                <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:"0 10px",marginTop:4}}>
                  <code style={{color:"#4ade80"}}>dict</code><span>→ merge dicts (last wins)</span>
                  <code style={{color:"#60a5fa"}}>all</code><span>→ {"{ merged: [...], count }"}</span>
                  <code style={{color:"#94a3b8"}}>first</code><span>→ pass first upstream value</span>
                </div>
              </div>
            )}
            {node.data.type==="action.switch"&&(
              <div style={{background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:6,padding:"8px 10px",fontSize:10,color:"#94a3b8",marginTop:6,lineHeight:1.8}}>
                Output: <code style={{color:"#a78bfa"}}>{"{ value, matched_case, matched_index, no_match }"}</code><br/>
                <div style={{color:"#64748b",marginTop:3}}>Cases matched in order — first match wins. <code>no_match: true</code> if nothing matched.</div>
              </div>
            )}
            {node.data.type==="action.aggregate"&&(
              <div style={{background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:6,padding:"8px 10px",fontSize:10,color:"#94a3b8",marginTop:6,lineHeight:1.8}}>
                <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:"0 10px"}}>
                  <code style={{color:"#4ade80"}}>list</code><span>→ {"{ items:[...], count }"}</span>
                  <code style={{color:"#60a5fa"}}>dict</code><span>→ merged object</span>
                  <code style={{color:"#94a3b8"}}>concat</code><span>→ {"{ result: '...', count }"}</span>
                </div>
              </div>
            )}
            {node.data.type==="action.date"&&(
              <div style={{background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:6,padding:"8px 10px",fontSize:10,color:"#94a3b8",marginTop:6,lineHeight:1.8}}>
                Output: <code style={{color:"#a78bfa"}}>{"{ iso, unix, formatted, year, month, day, hour, minute, second, weekday }"}</code><br/>
                <code>diff</code>: <code style={{color:"#a78bfa"}}>{"{ seconds, minutes, hours, days, human, past }"}</code>
              </div>
            )}
            {node.data.type==="action.discord"&&(
              <div style={{background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:6,padding:"8px 10px",fontSize:10,color:"#94a3b8",marginTop:6}}>
                Output: <code style={{color:"#a78bfa"}}>{"{ sent: true, message }"}</code>
              </div>
            )}
            {node.data.type==="action.csv"&&(
              <div style={{background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:6,padding:"8px 10px",fontSize:10,color:"#94a3b8",marginTop:6,lineHeight:1.8}}>
                <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:"0 10px"}}>
                  <code style={{color:"#4ade80"}}>parse</code><span>→ {"{ rows, count, headers }"}</span>
                  <code style={{color:"#60a5fa"}}>generate</code><span>→ {"{ csv, count }"}</span>
                </div>
              </div>
            )}
            {node.data.type==="action.http_request"&&(
              <div style={{background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:6,padding:"8px 10px",fontSize:10,color:"#94a3b8",marginTop:6}}>
                Output: <code style={{color:"#a78bfa"}}>{"{ status, ok, body, headers }"}</code>
              </div>
            )}

            {/* Retry Policy */}
            {!isNote&&!isTrigger&&(<>
              <div className="section-divider">Retry Policy</div>
              <div className="form-row" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div className="field-group" style={{marginBottom:0}}>
                  <label style={{fontSize:11,color:"#94a3b8",fontWeight:500,marginBottom:4}}>Max retries</label>
                  <input className="field-input" type="number" min="0" max="5" value={retryMax} onChange={e=>updateRetryMax(e.target.value)}/>
                </div>
                <div className="field-group" style={{marginBottom:0}}>
                  <label style={{fontSize:11,color:"#94a3b8",fontWeight:500,marginBottom:4}}>Retry delay (sec)</label>
                  <input className="field-input" type="number" min="1" max="60" value={retryDelay} onChange={e=>updateRetryDelay(e.target.value)}/>
                </div>
              </div>
              <div className="field-group" style={{marginTop:10}}>
                <label style={{fontSize:11,color:"#94a3b8",fontWeight:500,marginBottom:4}}>On failure</label>
                <select className="field-input" value={failMode} onChange={e=>updateFailMode(e.target.value)}>
                  <option value="abort">abort — stop the graph (default)</option>
                  <option value="continue">continue — store error, keep going</option>
                </select>
                {failMode==="continue"&&(
                  <div style={{fontSize:10,color:"#f59e0b",marginTop:4}}>
                    ⚠ Downstream nodes receive {"{ __error, __node, __type }"} as input.
                  </div>
                )}
              </div>
            </>)}

            {!isNote && onTestNode && (
              <div style={{marginTop:16}}>
                <button
                  className="btn btn-sm"
                  style={{width:"100%",background:"#1e3a5f",color:"#93c5fd",border:"1px solid #2563eb",borderRadius:6,padding:"6px 0",fontWeight:600,cursor:"pointer"}}
                  onClick={()=>{ setTestOpen(o=>!o); setTestError(null); }}
                >
                  {testOpen ? "▼ Test node" : "▶ Test node"}
                </button>
                {testOpen && (
                  <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:6}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <label style={{fontSize:11,color:"#94a3b8",fontWeight:500}}>Input JSON</label>
                      {upstreamPinned && (
                        <span style={{fontSize:10,color:"#fbbf24"}}>
                          📌 from {upstreamLabel}
                          <button
                            onClick={()=>{ const p=upstreamPinnedRef.current; if(p) setTestInput(JSON.stringify(p, null, 2)); }}
                            style={{marginLeft:4,fontSize:10,color:"#fbbf24",background:"none",border:"none",cursor:"pointer",padding:0,textDecoration:"underline"}}
                          >reset</button>
                        </span>
                      )}
                    </div>
                    <textarea
                      value={testInput}
                      onChange={e=>{ setTestInput(e.target.value); setTestError(null); }}
                      rows={4}
                      spellCheck={false}
                      style={{width:"100%",background:"#0f1117",color:"#e2e8f0",border:"1px solid #334155",borderRadius:4,padding:"6px 8px",fontFamily:"monospace",fontSize:12,resize:"vertical",boxSizing:"border-box"}}
                    />
                    {testError && <div style={{fontSize:11,color:"#f87171"}}>{testError}</div>}
                    <div style={{display:"flex",gap:6}}>
                      <button
                        className="btn btn-sm"
                        disabled={testLoading}
                        style={{flex:1,background:"#064e3b",color:"#6ee7b7",border:"1px solid #059669",borderRadius:6,padding:"5px 0",fontWeight:600,cursor:testLoading?"not-allowed":"pointer",opacity:testLoading?0.7:1}}
                        onClick={async()=>{
                          let inp;
                          try { inp = JSON.parse(testInput); }
                          catch(e){ setTestError("Invalid JSON: " + e.message); return; }
                          setTestLoading(true);
                          setTestError(null);
                          await onTestNode(node.id, inp);
                          setTestLoading(false);
                        }}
                      >
                        {testLoading ? "Running…" : "▶ Run"}
                      </button>
                      {runOutput && runStatus === "ok" && onPinOutput && (
                        <button
                          className="btn btn-sm"
                          title={isPinned ? "Unpin output" : "Pin output — downstream nodes will use this as their test input"}
                          style={{background: isPinned ? "#78350f" : "#1c1917", color: isPinned ? "#fbbf24" : "#a8a29e", border: `1px solid ${isPinned ? "#d97706" : "#44403c"}`, borderRadius:6, padding:"5px 10px", cursor:"pointer", fontSize:14}}
                          onClick={()=> onPinOutput(node.id, isPinned ? null : runOutput)}
                        >
                          📌
                        </button>
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}

            <button className="delete-node-btn" style={{marginTop:16}} onClick={()=>{ onDelete(node.id); onClose(); }}>🗑 Remove node</button>
          </div>

          {/* ── RIGHT: OUTPUT ── */}
          <div className="nem-io-col right">
            <div className="nem-io-col-hdr">Output →</div>
            <div className="nem-io-view-tabs">
              <button className={`nem-io-view-tab${outputView==="schema"?" active":""}`} onClick={()=>setOutputView("schema")}>Schema</button>
              <button className={`nem-io-view-tab${outputView==="json"?" active":""}`} onClick={()=>setOutputView("json")}>JSON</button>
            </div>
            <div className="nem-io-col-body">
              <NioBody data={runOutput} view={outputView} sourceNodeId={node.id} isTruncated={!!(runOutput&&runOutput.__truncated)}/>
            </div>
          </div>

        </div>{/* end nem-columns */}
      </div>{/* end nem-panel */}
    </div>
  );
}

// ── Permissions Modal ─────────────────────────────────────────────────────────
function PermissionsModal({ isOpen, onClose, graphId, showToast }) {
  const [perms, setPerms]       = useState([]);
  const [users, setUsers]       = useState([]);
  const [loading, setLoading]   = useState(false);
  const [saving, setSaving]     = useState(false);
  const [selUser, setSelUser]   = useState("");
  const [selRole, setSelRole]   = useState("viewer");
  const [invEmail, setInvEmail] = useState("");
  const [invRole, setInvRole]   = useState("viewer");
  const [inviting, setInviting] = useState(false);
  const [inviteLink, setInviteLink] = useState(null);

  const ROLES = ["viewer", "runner", "editor"];
  const ROLE_DESC = { viewer: "View-only", runner: "Can trigger runs", editor: "Can edit flow" };

  async function load() {
    if (!graphId) return;
    setLoading(true);
    try {
      const data = await api("GET", `/api/graphs/${graphId}/permissions`);
      setPerms(data.permissions || []);
      setUsers(data.users || []);
    } catch(e) { showToast(e.message, "error"); }
    setLoading(false);
  }

  useEffect(() => { if (isOpen) { load(); setInviteLink(null); setInvEmail(""); } }, [isOpen, graphId]);

  async function grantPermission() {
    if (!selUser) return;
    setSaving(true);
    try {
      await api("PUT", `/api/graphs/${graphId}/permissions`, { user_id: parseInt(selUser), role: selRole });
      showToast("Permission set ✓");
      setSelUser("");
      await load();
    } catch(e) { showToast(e.message, "error"); }
    setSaving(false);
  }

  async function removePermission(userId) {
    try {
      await api("DELETE", `/api/graphs/${graphId}/permissions/${userId}`);
      showToast("Access removed");
      await load();
    } catch(e) { showToast(e.message, "error"); }
  }

  async function changeRole(userId, role) {
    try {
      await api("PUT", `/api/graphs/${graphId}/permissions`, { user_id: userId, role });
      await load();
    } catch(e) { showToast(e.message, "error"); }
  }

  async function sendInvite() {
    if (!invEmail.trim()) return;
    setInviting(true);
    setInviteLink(null);
    try {
      const res = await api("POST", `/api/graphs/${graphId}/invite`, { email: invEmail.trim(), role: invRole });
      if (res.email_sent) {
        showToast(`Invite sent to ${res.email} ✓`);
      } else {
        setInviteLink(res.invite_url);
        showToast("Email not configured — copy the link below", "error");
      }
      setInvEmail("");
      await load();
    } catch(e) { showToast(e.message, "error"); }
    setInviting(false);
  }

  if (!isOpen) return null;

  // Users not yet in the permissions list
  const permUserIds = new Set(perms.map(p => p.user_id));
  const availUsers  = users.filter(u => !permUserIds.has(u.id));

  return (
    <div className="modal-overlay" aria-hidden="true" onClick={e=>{ if(e.target.className==="modal-overlay") onClose(); }}>
      <div className="modal" style={{minWidth:520,maxWidth:600,maxHeight:"80vh",overflowY:"auto"}} role="dialog" aria-modal="true" aria-label="Flow Permissions">
        <div className="modal-header">
          <h3 style={{margin:0,fontSize:15}}>🔐 Flow Permissions</h3>
          <button className="modal-close" aria-label="Close" onClick={onClose}>✕</button>
        </div>

        {loading ? (
          <div style={{padding:"32px",textAlign:"center",color:"#64748b"}}>Loading…</div>
        ) : (<>
          {/* Current permissions */}
          <div style={{padding:"16px 20px 8px"}}>
            <div style={{fontSize:12,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Current access</div>
            {perms.length === 0 ? (
              <div style={{color:"#475569",fontSize:13,padding:"8px 0"}}>No users have been granted access yet.</div>
            ) : (
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr>
                    <th style={{textAlign:"left",padding:"4px 8px",color:"#64748b",fontWeight:500}}>User</th>
                    <th style={{textAlign:"left",padding:"4px 8px",color:"#64748b",fontWeight:500}}>Role</th>
                    <th style={{padding:"4px 8px"}}></th>
                  </tr>
                </thead>
                <tbody>
                  {perms.map(p => (
                    <tr key={p.user_id} style={{borderTop:"1px solid #1e2130"}}>
                      <td style={{padding:"6px 8px",color:"#e2e8f0"}}>
                        {p.username}
                        <span style={{color:"#475569",fontSize:11,marginLeft:6}}>{p.email}</span>
                      </td>
                      <td style={{padding:"6px 8px"}}>
                        <select value={p.role} onChange={e=>changeRole(p.user_id, e.target.value)}
                          style={{background:"#1e2130",border:"1px solid #2d3148",borderRadius:4,
                                  color:"#e2e8f0",fontSize:12,padding:"2px 6px"}}>
                          {ROLES.map(r=><option key={r} value={r}>{r}</option>)}
                        </select>
                        <span style={{fontSize:10,color:"#64748b",marginLeft:6}}>{ROLE_DESC[p.role]}</span>
                      </td>
                      <td style={{padding:"6px 8px",textAlign:"right"}}>
                        <button onClick={()=>removePermission(p.user_id)}
                          style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:13}}>
                          ✕
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>

          {/* Add existing user */}
          {availUsers.length > 0 && (
            <div style={{padding:"12px 20px",borderTop:"1px solid #1e2130"}}>
              <div style={{fontSize:12,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Add existing user</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <select value={selUser} onChange={e=>setSelUser(e.target.value)}
                  style={{flex:1,minWidth:120,background:"#1e2130",border:"1px solid #2d3148",
                          borderRadius:6,color:"#e2e8f0",fontSize:13,padding:"6px 10px"}}>
                  <option value="">Select user…</option>
                  {availUsers.map(u=><option key={u.id} value={u.id}>{u.username} ({u.email})</option>)}
                </select>
                <select value={selRole} onChange={e=>setSelRole(e.target.value)}
                  style={{background:"#1e2130",border:"1px solid #2d3148",borderRadius:6,
                          color:"#e2e8f0",fontSize:13,padding:"6px 10px"}}>
                  {ROLES.map(r=><option key={r} value={r}>{r}</option>)}
                </select>
                <button className="btn btn-primary btn-sm" onClick={grantPermission}
                  disabled={!selUser || saving}>{saving?"Saving…":"Grant"}</button>
              </div>
            </div>
          )}

          {/* Invite by email */}
          <div style={{padding:"12px 20px",borderTop:"1px solid #1e2130"}}>
            <div style={{fontSize:12,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Invite by email</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <input value={invEmail} onChange={e=>setInvEmail(e.target.value)}
                placeholder="user@example.com"
                onKeyDown={e=>e.key==="Enter"&&sendInvite()}
                style={{flex:1,minWidth:160,background:"#1e2130",border:"1px solid #2d3148",
                        borderRadius:6,color:"#e2e8f0",fontSize:13,padding:"6px 10px"}}/>
              <select value={invRole} onChange={e=>setInvRole(e.target.value)}
                style={{background:"#1e2130",border:"1px solid #2d3148",borderRadius:6,
                        color:"#e2e8f0",fontSize:13,padding:"6px 10px"}}>
                {ROLES.map(r=><option key={r} value={r}>{r}</option>)}
              </select>
              <button className="btn btn-primary btn-sm" onClick={sendInvite}
                disabled={!invEmail.trim() || inviting}>{inviting?"Sending…":"Send invite"}</button>
            </div>
            {inviteLink && (
              <div style={{marginTop:10,background:"#1e2130",border:"1px solid #2d3148",
                           borderRadius:6,padding:"8px 12px",fontSize:12}}>
                <div style={{color:"#94a3b8",marginBottom:4}}>Email not configured. Share this link manually:</div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input readOnly value={inviteLink}
                    style={{flex:1,background:"#0d0f1a",border:"1px solid #2d3148",borderRadius:4,
                            color:"#a78bfa",fontSize:11,padding:"4px 8px",fontFamily:"monospace"}}/>
                  <button className="btn btn-ghost btn-sm"
                    onClick={()=>{ navigator.clipboard.writeText(inviteLink); showToast("Copied!"); }}>
                    Copy
                  </button>
                </div>
              </div>
            )}
          </div>

          <div style={{padding:"8px 20px 16px",borderTop:"1px solid #1e2130"}}>
            <div style={{fontSize:11,color:"#374151"}}>
              <strong style={{color:"#64748b"}}>viewer</strong> — read-only canvas access &nbsp;|&nbsp;
              <strong style={{color:"#64748b"}}>runner</strong> — can trigger runs &nbsp;|&nbsp;
              <strong style={{color:"#64748b"}}>editor</strong> — can modify the flow
            </div>
          </div>
        </>)}
      </div>
    </div>
  );
}

// ── Keyboard Shortcuts cheatsheet ─────────────────────────────────────────────
// Shortcuts are grouped: {section} entries render a header row, {key,desc} entries render a shortcut
// ── Canvas node search ────────────────────────────────────────────────────────
const SEARCH_GROUPS = [
  { key:"all",         label:"All" },
  { key:"trigger",     label:"Triggers" },
  { key:"action",      label:"Actions" },
  { key:"integration", label:"Integrations" },
  { key:"utility",     label:"Utility" },
];

function NodeSearchBar({ nodes, onJump, onClose }) {
  const [query, setQuery]   = useState("");
  const [group, setGroup]   = useState("all");
  const inputRef = useRef(null);

  useEffect(()=>{ inputRef.current?.focus(); },[]);

  // Escape closes
  useEffect(()=>{
    const h = e => { if(e.key==="Escape"){ e.preventDefault(); onClose(); } };
    document.addEventListener("keydown", h, true);
    return ()=>document.removeEventListener("keydown", h, true);
  },[onClose]);

  const q = query.trim().toLowerCase();
  const results = nodes.filter(n=>{
    const def  = NODE_DEFS[n.data?.type] || {};
    const label = (n.data?.label || def.label || n.data?.type || "").toLowerCase();
    const type  = (n.data?.type || "").toLowerCase();
    const grp   = def.group || "action";
    if(group !== "all" && grp !== group) return false;
    if(!q) return true;
    return label.includes(q) || type.includes(q);
  });

  return (
    <div style={{
      position:"absolute",top:64,left:"50%",transform:"translateX(-50%)",
      zIndex:9999,width:380,background:"#1a1d2e",border:"1px solid #6366f1",
      borderRadius:10,boxShadow:"0 8px 32px rgba(0,0,0,.6)",overflow:"hidden",
    }} role="dialog" aria-modal="true" aria-label="Search nodes"
      onClick={e=>e.stopPropagation()}>
      {/* Input row */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",
        borderBottom:"1px solid #2a2d3e"}}>
        <span style={{color:"#6366f1",fontSize:14}}>🔍</span>
        <input
          ref={inputRef}
          value={query}
          onChange={e=>setQuery(e.target.value)}
          placeholder="Search by label or type…"
          style={{flex:1,background:"transparent",border:"none",outline:"none",
            color:"#e2e8f0",fontSize:13,fontFamily:"inherit"}}
          aria-label="Node search query"
        />
        {query && (
          <button onClick={()=>setQuery("")}
            style={{background:"none",border:"none",color:"#475569",cursor:"pointer",
              fontSize:13,padding:0}} aria-label="Clear search">✕</button>
        )}
        <button onClick={onClose}
          style={{background:"none",border:"none",color:"#475569",cursor:"pointer",
            fontSize:13,padding:0,marginLeft:2}} aria-label="Close search">✕</button>
      </div>
      {/* Group filter chips */}
      <div style={{display:"flex",gap:6,padding:"8px 12px",borderBottom:"1px solid #2a2d3e",
        flexWrap:"wrap"}}>
        {SEARCH_GROUPS.map(g=>(
          <button key={g.key} onClick={()=>setGroup(g.key)}
            style={{
              background: group===g.key ? "#6366f1" : "#0f1117",
              color:      group===g.key ? "#fff"    : "#94a3b8",
              border:     group===g.key ? "1px solid #6366f1" : "1px solid #374151",
              borderRadius:20, padding:"2px 10px", fontSize:11, cursor:"pointer",
              fontFamily:"inherit",
            }}>
            {g.label}
          </button>
        ))}
      </div>
      {/* Results */}
      <div style={{maxHeight:260,overflowY:"auto"}}>
        {results.length === 0 ? (
          <div style={{padding:"16px 12px",color:"#475569",fontSize:12,textAlign:"center"}}>
            No nodes match
          </div>
        ) : results.map(n=>{
          const def = NODE_DEFS[n.data?.type] || {};
          const lbl = n.data?.label || def.label || n.data?.type || "Node";
          const typ = n.data?.type || "";
          const clr = def.color || "#475569";
          return (
            <button key={n.id} onClick={()=>{ onJump(n); onClose(); }}
              style={{
                display:"flex",alignItems:"center",gap:10,width:"100%",
                background:"none",border:"none",borderBottom:"1px solid #12151f",
                padding:"8px 12px",cursor:"pointer",textAlign:"left",
                fontFamily:"inherit",
              }}
              onMouseEnter={e=>e.currentTarget.style.background="#1e2235"}
              onMouseLeave={e=>e.currentTarget.style.background="none"}
              title={`Jump to: ${lbl}`}
            >
              <span style={{
                width:28,height:28,borderRadius:6,background:clr,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:13,flexShrink:0,
              }}>{def.icon||"⬡"}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:"#e2e8f0",fontSize:12,fontWeight:600,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lbl}</div>
                <div style={{color:"#475569",fontSize:10,marginTop:1,fontFamily:"monospace"}}>{typ}</div>
              </div>
              <span style={{color:"#4b5563",fontSize:10,whiteSpace:"nowrap"}}>⏎ jump</span>
            </button>
          );
        })}
        {!q && results.length > 0 && (
          <div style={{padding:"6px 12px",color:"#374151",fontSize:10,textAlign:"center"}}>
            {results.length} node{results.length!==1?"s":""} on canvas
          </div>
        )}
      </div>
    </div>
  );
}

// ── Replay-with-edits modal (canvas) ─────────────────────────────────────────
function ReplayEditModal({ runId, payload: initPayload, onClose, onSubmit }) {
  const [payload, setPayload] = useState(initPayload || "{}");
  // Escape handler
  useEffect(()=>{
    const h = e => { if(e.key==="Escape") onClose(); };
    document.addEventListener("keydown", h);
    return ()=>document.removeEventListener("keydown", h);
  },[onClose]);
  return (
    <div className="modal-overlay" aria-hidden="true"
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal" style={{maxWidth:480,padding:"20px 24px"}}
        role="dialog" aria-modal="true" aria-label="Replay with custom payload">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <span style={{fontWeight:700,fontSize:14,color:"#e2e8f0"}}>✏ Replay Run #{runId} with Custom Payload</span>
          <button className="btn btn-ghost btn-sm" onClick={onClose} aria-label="Close">✕</button>
        </div>
        <p style={{color:"#94a3b8",fontSize:12,marginBottom:12}}>
          Edit the trigger payload below. The run will be re-enqueued with this data instead of the original.
        </p>
        <textarea
          value={payload}
          onChange={e=>setPayload(e.target.value)}
          rows={10}
          autoFocus
          style={{width:"100%",boxSizing:"border-box",background:"#0f1117",border:"1px solid #374151",
            borderRadius:6,padding:"8px 10px",color:"#e2e8f0",fontFamily:"monospace",fontSize:12,
            resize:"vertical",outline:"none"}}
          aria-label="Payload JSON"
          spellCheck={false}
        />
        <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end"}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-success" onClick={()=>onSubmit(runId, payload)}>▶ Run with this payload</button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [nodes, setNodes, onNodesChange] = useNodesState([]);
  const [edges, setEdges, onEdgesChange] = useEdgesState([]);
  const [selectedNode, setSelectedNode]  = useState(null);
  const [selectedEdge, setSelectedEdge]  = useState(null);
  const [edgeLabelInput, setEdgeLabelInput] = useState("");
  const [currentGraph, setCurrentGraph]  = useState(null);
  const [graphName, setGraphName]        = useState("Untitled Graph");
  const [graphs, setGraphs]              = useState([]);
  const [showModal, setShowModal]        = useState(false);
  const [showTestModal, setShowTestModal] = useState(false);
  const [showHistoryModal, setShowHistoryModal] = useState(false);
  const [showPermissionsModal, setShowPermissionsModal] = useState(false);
  const [currentUser, setCurrentUser] = useState(null);
  const [workspaces, setWorkspaces]     = useState([]);
  const [activeWorkspace, setActiveWorkspace] = useState(null);
  const [contextMenu, setContextMenu]    = useState(null); // {x,y,node}
  const [toast, setToast]                = useState(null);
  const [saving, setSaving]              = useState(false);
  const [isDirty, setIsDirty]            = useState(false);
  const [running, setRunning]            = useState(false);
  const [runError, setRunError]          = useState(null);  // {msg, nodeName}
  const [showMap, setShowMap]            = useState(true);
  const [paletteSearch, setPaletteSearch]= useState("");
  const [testPayload, setTestPayload]    = useState("{}");
  const [validationIssues, setValidationIssues] = useState(null); // null=not shown, []=clear
  const [inspectorRuns, setInspectorRuns] = useState([]);  // recent runs for current graph
  const [inspectorRunId, setInspectorRunId] = useState(null); // selected run for inspection
  const [credentials, setCredentials]    = useState([]);   // for variable autocomplete
  const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false); // mobile palette drawer
  const [showShortcuts, setShowShortcuts]         = useState(false); // keyboard cheatsheet
  const [showSearch,   setShowSearch]             = useState(false); // Ctrl+F node search
  const [replayEdit,   setReplayEdit]             = useState(null);  // {runId, payload}

  // undo/redo
  const histRef = useRef([]);
  const histIdx = useRef(-1);
  const restoring = useRef(false);
  const [histState, setHistState] = useState({idx:-1, len:0});
  function syncHistState(){ setHistState({idx:histIdx.current, len:histRef.current.length}) }

  const reactFlowWrapper = useRef(null);
  const importFileRef    = useRef(null);
  const { screenToFlowPosition, setCenter } = useReactFlow();

  const showToast = useCallback((msg, type="success")=>{
    setToast({msg,type,key:Date.now()});
  },[]);

  // Jump viewport to a node (used by NodeSearchBar)
  function jumpToNode(n){
    const x = n.position.x + (n.width  || 180) / 2;
    const y = n.position.y + (n.height || 60)  / 2;
    setCenter(x, y, { zoom: 1.2, duration: 400 });
    // Briefly highlight by selecting the node
    setNodes(ns => ns.map(nd => ({...nd, selected: nd.id === n.id })));
  }

  useEffect(()=>{
    loadGraphList();
    // Pre-fetch credentials for the variable autocomplete dropdown
    api("GET","/api/credentials").then(setCredentials).catch(()=>{});
    // Fetch current user for permission-gating UI elements
    api("GET","/api/auth/me").then(setCurrentUser).catch(()=>{});
    // Load workspaces and resolve active one from cookie
    api("GET","/api/workspaces/my/list").then(list=>{
      setWorkspaces(list||[]);
      const wid = _getWorkspaceId();
      const active = wid ? (list||[]).find(w=>String(w.id)===String(wid)) : null;
      setActiveWorkspace(active || (list&&list[0]) || null);
    }).catch(()=>{});
  },[]);

  // keyboard shortcuts
  // Always-fresh ref for keyboard handler — avoids stale closure over state/functions
  const kbRef = useRef({});
  kbRef.current = {
    saveGraph, doUndo, doRedo,
    setSelectedNode, setSelectedEdge, setContextMenu, setRunError,
    setShowModal, setShowTestModal, setShowHistoryModal, setShowPermissionsModal,
    setShowShortcuts, setShowSearch,
  };
  useEffect(()=>{
    function onKey(e){
      const kb = kbRef.current;
      const mac = e.metaKey;
      const ctrl = e.ctrlKey;
      // Ctrl/Cmd shortcuts fire even from inputs
      if((ctrl||mac) && e.key==="z" && !e.shiftKey){ e.preventDefault(); kb.doUndo(); return; }
      if((ctrl&&e.key==="y")||(mac&&e.shiftKey&&e.key==="z")){ e.preventDefault(); kb.doRedo(); return; }
      if((ctrl||mac) && e.key==="s"){ e.preventDefault(); kb.saveGraph(); return; }
      if((ctrl||mac) && e.key==="f"){ e.preventDefault(); kb.setShowSearch(s=>!s); return; }
      // Remaining shortcuts only fire when not typing in an input
      const tag = document.activeElement?.tagName;
      if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT"||document.activeElement?.isContentEditable) return;
      if(e.key==="Escape"){
        kb.setContextMenu(null); kb.setSelectedEdge(null); kb.setRunError(null);
        kb.setSelectedNode(null); kb.setShowModal(false); kb.setShowTestModal(false);
        kb.setShowHistoryModal(false); kb.setShowPermissionsModal(false);
        kb.setShowShortcuts(false); kb.setShowSearch(false);
        return;
      }
      if(e.key==="?"){ kb.setShowShortcuts(s=>!s); return; }
    }
    window.addEventListener("keydown", onKey);
    return ()=>window.removeEventListener("keydown", onKey);
  },[]);

  useEffect(()=>{
    if (!isDirty) return;
    const h = e => { e.preventDefault(); e.returnValue = ""; };
    window.addEventListener("beforeunload", h);
    return ()=>window.removeEventListener("beforeunload", h);
  }, [isDirty]);

  function saveSnap(ns, es){
    if(restoring.current) return;
    histRef.current = histRef.current.slice(0, histIdx.current + 1);
    histRef.current.push({
      nodes: JSON.parse(JSON.stringify(ns)),
      edges: JSON.parse(JSON.stringify(es))
    });
    if(histRef.current.length > 60) histRef.current.shift();
    histIdx.current = histRef.current.length - 1;
    syncHistState();
    setIsDirty(true);
  }

  function doUndo(){
    if(histIdx.current <= 0) return;
    histIdx.current--;
    const snap = histRef.current[histIdx.current];
    restoring.current = true;
    setNodes(snap.nodes.map(n=>({...n})));
    setEdges(snap.edges.map(e=>({...e,type:"smoothstep",animated:true,style:{stroke:"#7c3aed",strokeWidth:2},markerEnd:{type:MarkerType.ArrowClosed,color:"#7c3aed"}})));
    setSelectedNode(null);
    syncHistState();
    setTimeout(()=>{ restoring.current = false }, 50);
  }

  function doRedo(){
    if(histIdx.current >= histRef.current.length - 1) return;
    histIdx.current++;
    const snap = histRef.current[histIdx.current];
    restoring.current = true;
    setNodes(snap.nodes.map(n=>({...n})));
    setEdges(snap.edges.map(e=>({...e,type:"smoothstep",animated:true,style:{stroke:"#7c3aed",strokeWidth:2},markerEnd:{type:MarkerType.ArrowClosed,color:"#7c3aed"}})));
    setSelectedNode(null);
    syncHistState();
    setTimeout(()=>{ restoring.current = false }, 50);
  }

  async function loadGraphList(){
    try { setGraphs(await api("GET","/api/graphs")) } catch(e){}
  }

  // Auto-open a graph from sessionStorage (admin page link) or URL hash (refresh)
  useEffect(()=>{
    const ssId      = sessionStorage.getItem("canvas_open_graph");
    const slugMatch = window.location.hash.match(/^#flow-([a-f0-9]{8})$/);
    const idMatch   = window.location.hash.match(/^#graph-(\d+)$/); // legacy fallback
    const endpoint  = ssId
      ? `/api/graphs/${ssId}`
      : slugMatch
        ? `/api/graphs/by-slug/${slugMatch[1]}`
        : idMatch
          ? `/api/graphs/${idMatch[1]}`
          : null;
    if(!endpoint) return;
    sessionStorage.removeItem("canvas_open_graph");
    api("GET", endpoint)
      .then(full => {
        const gd = full.graph_data || { nodes:[], edges:[] };
        const newNodes = (gd.nodes||[]).map(n=>({
          id:n.id, type:"custom", position:n.position||{x:100,y:100},
          data:{ type:n.type, label:n.data?.label||"", config:n.data?.config||{},
                 disabled:!!n.data?.disabled, retry_max:n.data?.retry_max||0, retry_delay:n.data?.retry_delay||5 }
        }));
        const newEdges = (gd.edges||[]).map(e=>({
          ...e, type:"smoothstep", animated:true,
          style:{stroke:"#7c3aed",strokeWidth:2},
          markerEnd:{type:MarkerType.ArrowClosed,color:"#7c3aed"}
        }));
        setNodes(newNodes); setEdges(newEdges);
        setCurrentGraph(full); setGraphName(full.name);
        setSelectedNode(null); setRunError(null);
        histRef.current=[]; histIdx.current=-1; syncHistState();
        saveSnap(newNodes, newEdges);
        setIsDirty(false);
        window.location.hash = "flow-" + full.slug;
        showToast(`Opened: ${full.name}`);
      })
      .catch(()=>{ window.location.hash = ""; });
  },[]);

  const onConnect = useCallback((params)=>{
    setEdges(eds => {
      const newEdges = addEdge({
        ...params, type:"smoothstep", animated:true,
        style:{stroke:"#7c3aed",strokeWidth:2},
        markerEnd:{type:MarkerType.ArrowClosed,color:"#7c3aed"},
        label: undefined
      }, eds);
      saveSnap(nodes, newEdges);
      return newEdges;
    });
  },[nodes]);

  function onNodeClick(e, node){ setSelectedNode(node); setContextMenu(null) }
  function onPaneClick(){ setSelectedNode(null); setContextMenu(null); setSelectedEdge(null) }

  function onEdgeClick(e, edge){
    setSelectedEdge(edge);
    setEdgeLabelInput(edge.label || "");
    setSelectedNode(null);
    setContextMenu(null);
  }

  function updateEdgeLabel(label){
    setEdges(es => {
      const updated = es.map(e => e.id===selectedEdge.id ? {...e, label: label||undefined} : e);
      saveSnap(nodes, updated);
      return updated;
    });
    setSelectedEdge(null);
  }

  function onNodeContextMenu(e, node){
    e.preventDefault();
    setContextMenu({ x: e.clientX, y: e.clientY, node });
    setSelectedNode(node);
  }

  function ctxDuplicateNode(node){
    const newId = uid();
    const newNode = {
      ...node,
      id: newId,
      position: { x: node.position.x + 40, y: node.position.y + 40 },
      data: { ...node.data, label: (node.data.label||"") + " (copy)", _runStatus:undefined, _runOutput:undefined },
      selected: false
    };
    setNodes(ns => { const u=[...ns, newNode]; saveSnap(u,edges); return u });
    setSelectedNode(newNode);
  }

  function ctxToggleDisabled(id){
    setNodes(ns => {
      const u = ns.map(n => n.id===id ? {...n, data:{...n.data, disabled:!n.data.disabled}} : n);
      saveSnap(u, edges);
      return u;
    });
    setSelectedNode(s => s && s.id===id ? {...s, data:{...s.data, disabled:!s.data.disabled}} : s);
  }

  function ctxCopyId(id){
    navigator.clipboard.writeText(id).catch(()=>{});
    showToast(`Copied: ${id}`);
  }

  function ctxRenameNode(node){
    const newLabel = window.prompt("Rename node:", node.data.label || (NODE_DEFS[node.data.type]||{}).label || "");
    if(newLabel === null || newLabel.trim() === "") return;
    onNodeChange(node.id, { ...node.data, label: newLabel.trim() });
  }

  function onNodeChange(id, newData){
    setNodes(ns => {
      const updated = ns.map(n => n.id===id ? {...n, data:newData} : n);
      saveSnap(updated, edges);
      return updated;
    });
    setSelectedNode(s => s && s.id===id ? {...s, data:newData} : s);
  }

  function onDeleteNode(id){
    setNodes(ns => { const u=ns.filter(n=>n.id!==id); saveSnap(u,edges); return u });
    setEdges(es => es.filter(e=>e.source!==id && e.target!==id));
    setSelectedNode(null);
  }

  function onDragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect="move" }

  function onDrop(e){
    e.preventDefault();
    const type = e.dataTransfer.getData("application/reactflow-type");
    if(!type) return;
    const def = NODE_DEFS[type];
    const pos = screenToFlowPosition({ x:e.clientX, y:e.clientY });
    const id = uid();
    setNodes(ns => {
      const updated = [...ns, { id, type:"custom", position:pos, data:{ type, label:def.label, config:{}, retry_max:0, retry_delay:5 } }];
      saveSnap(updated, edges);
      return updated;
    });
  }

  function buildGraphData(){
    return {
      nodes: nodes.map(n=>({
        id:n.id, type:n.data.type, position:n.position,
        data:{
          label:n.data.label||"",
          config:n.data.config||{},
          disabled:!!n.data.disabled,
          retry_max:n.data.retry_max||0,
          retry_delay:n.data.retry_delay||5,
          fail_mode:n.data.fail_mode||"abort"
        }
      })),
      edges: edges.map(e=>({ id:e.id, source:e.source, target:e.target, sourceHandle:e.sourceHandle||null, targetHandle:e.targetHandle||null, label:e.label }))
    };
  }

  function doAutoLayout(){
    setNodes(ns => {
      const laid = computeAutoLayout(ns, edges);
      saveSnap(laid, edges);
      return laid;
    });
    showToast("Layout applied");
  }

  async function saveGraph(){
    setSaving(true);
    try {
      const gd = buildGraphData();
      if(currentGraph){
        await api("PUT",`/api/graphs/${currentGraph.id}`,{ name:graphName, graph_data:gd });
        setIsDirty(false);
        showToast("Graph saved!");
        await loadGraphList();
      } else {
        const g = await api("POST","/api/graphs",{ name:graphName, description:"", graph_data:gd });
        setCurrentGraph(g);
        setIsDirty(false);
        showToast("Graph created!");
        await loadGraphList();
      }
    } catch(e){ showToast(e.message,"error") }
    setSaving(false);
  }

  function exportFlow(){
    if (!currentGraph) return;
    const data = {
      version: 8,
      name: graphName,
      description: currentGraph.description || "",
      graph_data: buildGraphData(),
      exported_at: new Date().toISOString(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `${graphName.replace(/[^a-z0-9]/gi,"_").toLowerCase()}.flow.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("Exported flow JSON");
  }

  async function importFlow(e){
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      const name   = (data.name || file.name.replace(/\.flow\.json$/i,"").replace(/_/g," ")) + " (imported)";
      const gd     = data.graph_data || data; // support raw graph_data too
      const created = await api("POST","/api/graphs",{name, description: data.description||"", graph_data: gd});
      showToast(`Imported as "${created.name}"`);
      await loadGraphList();
      onSelectGraph(created);
    } catch(err){ showToast("Import failed: " + err.message, "error") }

  async function validateAndRun(payload){
    // load credentials list for reference checking
    let creds = [];
    try { creds = await api("GET","/api/credentials"); } catch(e){}
    const issues = validateFlow(nodes, edges, creds);
    if (issues.length === 0) {
      runGraph(payload);
    } else {
      setValidationIssues({issues, payload});
    }
  }

  async function runGraph(payload){
    if(!currentGraph){ showToast("Save the graph first","error"); return }
    setRunning(true);
    setRunError(null);
    // Mark all non-note nodes as pending so they pulse while running
    setNodes(ns => ns.map(n=>({...n, data:{ ...n.data,
      _runStatus: n.data.type==="note" ? undefined : "pending",
      _runOutput:undefined, _runInput:undefined
    }})));
    setSelectedNode(s => s ? {...s, data:{...s.data, _runStatus:"pending", _runOutput:undefined}} : s);

    let taskId;
    try {
      let runPayload = {};
      if (payload) {
        try { runPayload = JSON.parse(payload); } catch(e) { showToast("Invalid JSON in test payload","error"); setRunning(false); return }
      }
      const r = await api("POST",`/api/graphs/${currentGraph.id}/run`,{source:"canvas", payload: runPayload});
      taskId = r.task_id;
    } catch(e){
      showToast(e.message,"error");
      setRunning(false);
      return;
    }

    // ── Live streaming via SSE — falls back to polling if EventSource fails ──
    const liveTraceMap = {};

    function applyRunDone(status, errMsg) {
      setRunning(false);
      refreshInspectorRuns();
      if (status === "succeeded") {
        showToast("Run succeeded ✓");
      } else if (status === "timeout") {
        showToast("Run timed out", "error");
      } else {
        const err = errMsg || "";
        let failedNodeId = null;
        const m = err.match(/\[([a-zA-Z0-9_]+)\]/);
        if (m) failedNodeId = m[1];
        let failedNodeName = failedNodeId;
        setNodes(ns => { const n = ns.find(x => x.id === failedNodeId); if (n) failedNodeName = n.data?.label || failedNodeId; return ns; });
        setRunError({ msg: err, nodeName: failedNodeName });
      }
      // Final node annotation — clear any nodes still stuck on "pending"
      setNodes(ns => ns.map(n => {
        if (n.data.type === "note") return n;
        const t = liveTraceMap[n.id];
        if (t) {
          const st = t.status === "ok" ? "ok" : t.status === "error" ? "err" : "skip";
          return { ...n, data: { ...n.data, _runStatus: st, _runOutput: t.output, _runInput: t.input, _runDurationMs: t.duration_ms } };
        }
        return { ...n, data: { ...n.data, _runStatus: undefined } };
      }));
      setSelectedNode(s => {
        if (!s) return s;
        const t = liveTraceMap[s.id];
        if (!t) return { ...s, data: { ...s.data, _runStatus: undefined } };
        const st = t.status === "ok" ? "ok" : t.status === "error" ? "err" : "skip";
        return { ...s, data: { ...s.data, _runStatus: st, _runOutput: t.output, _runInput: t.input, _runDurationMs: t.duration_ms } };
      });
    }

    let evtSource = null;
    const safetyTimer = setTimeout(() => { if (evtSource) { evtSource.close(); applyRunDone("timeout"); } }, 300000);

    try {
      evtSource = new EventSource(`/api/runs/${taskId}/stream`);

      evtSource.onmessage = (e) => {
        let event;
        try { event = JSON.parse(e.data); } catch { return; }

        if (event.type === "node_start") {
          // Flip the node to "running" pulse while it executes
          setNodes(ns => ns.map(n => n.id !== event.node_id ? n :
            { ...n, data: { ...n.data, _runStatus: "running" } }));
          setSelectedNode(s => s && s.id === event.node_id
            ? { ...s, data: { ...s.data, _runStatus: "running" } } : s);
        }

        if (event.type === "node_done") {
          liveTraceMap[event.node_id] = event;
          const st = event.status === "ok" ? "ok" : event.status === "error" ? "err" : "skip";
          setNodes(ns => ns.map(n => n.id !== event.node_id ? n :
            { ...n, data: { ...n.data, _runStatus: st, _runOutput: event.output, _runInput: event.input, _runDurationMs: event.duration_ms } }));
          setSelectedNode(s => s && s.id === event.node_id
            ? { ...s, data: { ...s.data, _runStatus: st, _runOutput: event.output, _runInput: event.input, _runDurationMs: event.duration_ms } } : s);
        }

        if (event.type === "run_done") {
          clearTimeout(safetyTimer);
          evtSource.close();
          applyRunDone(event.status, event.error);
        }
      };

      evtSource.onerror = () => {
        evtSource.close();
        clearTimeout(safetyTimer);
        // Fallback: single poll to get final state
        api("GET", `/api/runs/by-task/${taskId}`).then(run => {
          if (!run) { setRunning(false); return; }
          (run.traces || []).forEach(t => { if (t.node_id) liveTraceMap[t.node_id] = t; });
          applyRunDone(run.status, (run.result || {}).error || run.error);
        }).catch(() => setRunning(false));
      };

    } catch(initErr) {
      // EventSource not supported — fall back to polling
      clearTimeout(safetyTimer);
      const poll = setInterval(async () => {
        try {
          const run = await api("GET", `/api/runs/by-task/${taskId}`);
          if (!run || run.status === "running" || run.status === "queued") return;
          clearInterval(poll);
          (run.traces || []).forEach(t => { if (t.node_id) liveTraceMap[t.node_id] = t; });
          applyRunDone(run.status, (run.result || {}).error || run.error);
        } catch(e) { /* keep polling */ }
      }, 800);
      setTimeout(() => { clearInterval(poll); setRunning(false); }, 300000);
    }
  }

  // ── Single-node test ───────────────────────────────────────────────────────
  async function testNode(nodeId, testInput) {
    if (!currentGraph) { showToast("Save the graph first", "error"); return; }
    // Show pending state on the node
    setSelectedNode(s => s ? {...s, data:{...s.data, _runStatus:"pending", _runOutput:undefined, _runInput:testInput}} : s);
    setNodes(ns => ns.map(n => n.id !== nodeId ? n : {...n, data:{...n.data, _runStatus:"pending"}}));
    try {
      const result = await api("POST", `/api/graphs/${currentGraph.id}/nodes/${nodeId}/test`, {input: testInput});
      const status = result.error ? "err" : "ok";
      const out    = result.error ? {__error: result.error} : result.output;
      setSelectedNode(s => s ? {...s, data:{...s.data, _runStatus:status, _runOutput:out, _runInput:testInput, _runDurationMs:result.duration_ms}} : s);
      setNodes(ns => ns.map(n => n.id !== nodeId ? n : {...n, data:{...n.data, _runStatus:status, _runOutput:out, _runInput:testInput, _runDurationMs:result.duration_ms}}));
      showToast(result.error ? `Test failed: ${result.error}` : "Test succeeded ✓", result.error ? "error" : "success");
    } catch(e) {
      showToast(e.message || "Test request failed", "error");
      setSelectedNode(s => s ? {...s, data:{...s.data, _runStatus:undefined}} : s);
      setNodes(ns => ns.map(n => n.id !== nodeId ? n : {...n, data:{...n.data, _runStatus:undefined}}));
    }
  }

  // ── Pin node output ────────────────────────────────────────────────────────
  function pinNodeOutput(nodeId, output) {
    // output=null to unpin
    setNodes(ns => ns.map(n => n.id !== nodeId ? n : {...n, data:{...n.data, _pinnedOutput: output || undefined}}));
    setSelectedNode(s => s && s.id === nodeId ? {...s, data:{...s.data, _pinnedOutput: output || undefined}} : s);
    showToast(output ? "Output pinned 📌" : "Output unpinned", "success");
  }

  // ── Run replay helpers ────────────────────────────────────────────────────
  function _getInspectorRunDbId() {
    if (!inspectorRunId) return null;
    const run = inspectorRuns.find(r => String(r.id) === inspectorRunId || r.task_id === inspectorRunId);
    return run?.id || null;
  }
  async function replayInspectorRun() {
    const dbId = _getInspectorRunDbId();
    if (!dbId) return;
    try { await api("POST", `/api/runs/${dbId}/replay`); showToast("Queued for replay"); }
    catch(e) { showToast(e.message, "error"); }
  }
  async function openReplayEditCanvas() {
    const dbId = _getInspectorRunDbId();
    if (!dbId) return;
    try {
      const data = await api("GET", `/api/runs/${dbId}/payload`);
      setReplayEdit({ runId: dbId, payload: JSON.stringify(data.payload || {}, null, 2) });
    } catch(e) { showToast(e.message, "error"); }
  }
  async function submitReplayEditCanvas(runId, payloadStr) {
    try {
      let payload;
      try { payload = JSON.parse(payloadStr); } catch { showToast("Invalid JSON", "error"); return; }
      await api("POST", `/api/runs/${runId}/replay`, { payload });
      showToast("Queued for replay with custom payload");
      setReplayEdit(null);
    } catch(e) { showToast(e.message, "error"); }
  }

  // ── Live Data Inspector ────────────────────────────────────────────────────
  async function refreshInspectorRuns() {
    if (!currentGraph) { setInspectorRuns([]); return; }
    try {
      const allRuns = await api("GET", "/api/runs");
      const graphRuns = allRuns
        .filter(r => r.workflow === currentGraph.name || String(r.graph_id) === String(currentGraph.id))
        .slice(0, 20);
      setInspectorRuns(graphRuns);
    } catch(e) { /* silent */ }
  }

  async function loadInspectorRun(runId) {
    setInspectorRunId(runId);
    if (!runId) {
      // Clear annotations
      setNodes(ns => ns.map(n => ({...n, data:{...n.data, _runStatus:undefined, _runOutput:undefined, _runInput:undefined}})));
      setSelectedNode(s => s ? {...s, data:{...s.data, _runStatus:undefined, _runOutput:undefined, _runInput:undefined}} : s);
      return;
    }
    try {
      const allRuns = await api("GET", "/api/runs");
      const run = allRuns.find(r => String(r.id) === String(runId) || r.task_id === runId);
      if (!run) { showToast("Run not found","error"); return; }
      const traces = run.traces || [];
      // Build a map: node_id → trace
      const traceMap = {};
      traces.forEach(t => { if (t.node_id) traceMap[t.node_id] = t; });
      const ctx = run.result?.context || {};
      setNodes(ns => ns.map(n => {
        if (n.data.type === "note") return n;
        const t = traceMap[n.id];
        if (!t) return n;
        let status = t.status === "ok" ? "ok" : t.status === "error" ? "err" : "skip";
        return { ...n, data: { ...n.data, _runStatus: status, _runOutput: t.output, _runInput: t.input, _runDurationMs: t.duration_ms, _runAttempts: t.attempts } };
      }));
      setSelectedNode(s => {
        if (!s) return s;
        const t = traceMap[s.id];
        if (!t) return s;
        let st = t.status === "ok" ? "ok" : t.status === "error" ? "err" : "skip";
        return { ...s, data: { ...s.data, _runStatus: st, _runOutput: t.output, _runInput: t.input, _runDurationMs: t.duration_ms, _runAttempts: t.attempts } };
      });
      showToast(`Loaded run #${run.id || runId.slice(0,8)}`);
    } catch(e) { showToast("Failed to load run: " + e.message, "error"); }
  }

  async function onSelectGraph(g){
    try {
      const full = await api("GET",`/api/graphs/${g.id}`);
      const gd = full.graph_data || { nodes:[], edges:[] };
      const newNodes = (gd.nodes||[]).map(n=>({
        id:n.id, type:"custom", position:n.position||{x:100,y:100},
        data:{ type:n.type, label:n.data?.label||"", config:n.data?.config||{}, disabled:!!n.data?.disabled, retry_max:n.data?.retry_max||0, retry_delay:n.data?.retry_delay||5, fail_mode:n.data?.fail_mode||"abort" }
      }));
      const newEdges = (gd.edges||[]).map(e=>({
        ...e, type:"smoothstep", animated:true,
        style:{stroke:"#7c3aed",strokeWidth:2},
        markerEnd:{type:MarkerType.ArrowClosed,color:"#7c3aed"}
      }));
      setNodes(newNodes);
      setEdges(newEdges);
      setCurrentGraph(full);
      setGraphName(full.name);
      setSelectedNode(null);
      setShowModal(false);
      setRunError(null);
      setInspectorRunId(null);
      setInspectorRuns([]);
      // Reset undo history on graph load
      histRef.current = [];
      histIdx.current = -1;
      syncHistState();
      saveSnap(newNodes, newEdges);
      setIsDirty(false);
      window.location.hash = "flow-" + full.slug;
      showToast(`Loaded: ${full.name}`);
      // Auto-load most recent run traces so the I/O panel shows data immediately
      try {
        const allRuns = await api("GET", "/api/runs");
        const graphRuns = allRuns.filter(r =>
          r.workflow === full.name || String(r.graph_id) === String(full.id)
        );
        if(graphRuns.length > 0){
          const latest = graphRuns[0];
          setInspectorRuns(graphRuns.slice(0,20));
          setInspectorRunId(String(latest.id || latest.task_id));
          const traces = latest.traces || [];
          const traceMap = {};
          traces.forEach(t => { if(t.node_id) traceMap[t.node_id] = t; });
          setNodes(ns => ns.map(n => {
            if(n.data.type === "note") return n;
            const t = traceMap[n.id];
            if(!t) return n;
            const st = t.status === "ok" ? "ok" : t.status === "error" ? "err" : "skip";
            return { ...n, data:{ ...n.data, _runStatus:st, _runOutput:t.output, _runInput:t.input, _runDurationMs:t.duration_ms, _runAttempts:t.attempts }};
          }));
        }
      } catch(e){ /* non-fatal: run data is optional */ }
    } catch(err){ showToast(err.message,"error") }
  }

  async function onNewGraph(name){
    setNodes([]); setEdges([]); setCurrentGraph(null);
    setGraphName(name); setSelectedNode(null); setShowModal(false); setRunError(null);
    histRef.current = []; histIdx.current = -1;
    window.location.hash = "";
  }

    // Template was already imported by OpenModal; just open it like a normal graph
    try {
      await loadGraphList();
      showToast(`Created "${created.name}" from template`);
      setShowModal(false);
      // Load the full graph and open it
      const full = await api("GET", `/api/graphs/${created.id}`);
      onSelectGraph(full);
    } catch(e){ showToast(e.message, "error"); }
  }

  async function duplicateGraph(g){
    try {
      const full = await api("GET",`/api/graphs/${g.id}`);
      const copy = await api("POST","/api/graphs",{
        name: full.name.replace(TEMPLATE_EMOJIS,"").trim() + " (copy)",
        description: full.description || "",
        graph_data: full.graph_data || {}
      });
      showToast(`Duplicated as "${copy.name}"`);
      await loadGraphList();
    } catch(e){ showToast(e.message,"error") }
  }

  async function renameGraph(g){
    const newName = window.prompt("Rename flow:", g.name);
    if(!newName || newName.trim() === g.name) return;
    try {
      await api("PUT",`/api/graphs/${g.id}`,{name:newName.trim()});
      showToast(`Renamed to "${newName.trim()}"`);
      // Update currently open graph name if it's the renamed one
      if(currentGraph && currentGraph.id === g.id) setGraphName(newName.trim());
      await loadGraphList();
    } catch(e){ showToast(e.message,"error") }
  }

  async function deleteGraph(id, name){
    try {
      await api("DELETE",`/api/graphs/${id}`);
      showToast(`Deleted "${name}"`);
      // If we just deleted the currently open graph, reset
      if(currentGraph && currentGraph.id === id){
        setNodes([]); setEdges([]); setCurrentGraph(null);
        setGraphName("Untitled Graph"); setSelectedNode(null); setRunError(null);
        histRef.current = []; histIdx.current = -1;
        window.location.hash = "";
      }
      await loadGraphList();
    } catch(e){ showToast(e.message,"error") }
  }

            {showMap && (
              <MiniMap
                nodeColor={n=>{ const def=NODE_DEFS[n.data?.type]; return def?def.color:"#475569" }}
                nodeStrokeWidth={0}
                maskColor="#0f11178a"
                pannable
                zoomable
                style={{
                  background:"#1a1d2e",
                  border:"1px solid #374151",
                  borderRadius:10,
                  boxShadow:"0 4px 16px rgba(0,0,0,.5)",
                  height:120,
                  width:180,
                }}
              />
            )}
          </FlowCanvas>
        </div>
        {/* Slim right panel: only shows the empty-state hint */}
        <ConfigPanel node={null} onChange={onNodeChange} onDelete={onDeleteNode} edges={edges}/>
      </div>

      {/* Node Editor Modal — opens when a node is selected */}
      {selectedNode && (
        <NodeEditorModal
          key={selectedNode.id}
          node={selectedNode}
          onChange={onNodeChange}
          onDelete={onDeleteNode}
          onClose={()=>setSelectedNode(null)}
          edges={edges}
          allNodes={nodes}
          credentials={credentials}
          onTestNode={testNode}
          onPinOutput={pinNodeOutput}
        />
      )}

      {showModal && (
        <OpenModal
          graphs={graphs}
          onClose={()=>setShowModal(false)}
          onSelect={onSelectGraph}
          onNew={onNewGraph}
          onDuplicate={duplicateGraph}
          onDelete={deleteGraph}
          onRename={renameGraph}
          onFromTemplate={onFromTemplate}
        />
      )}

      <TestPayloadModal isOpen={showTestModal} onClose={()=>setShowTestModal(false)} onRun={runGraph} testPayload={testPayload} onPayloadChange={setTestPayload} />

      <PermissionsModal isOpen={showPermissionsModal} onClose={()=>setShowPermissionsModal(false)} graphId={currentGraph?.id} showToast={showToast} />

      <HistoryModal isOpen={showHistoryModal} onClose={()=>setShowHistoryModal(false)} graphId={currentGraph?.id} showToast={showToast}
        onRestored={(restoredGraph) => {
          // Reload the canvas in-place from the restored graph data
          const gd = restoredGraph.graph_data || { nodes:[], edges:[] };
          const newNodes = (gd.nodes||[]).map(n=>({
            id:n.id, type:"custom", position:n.position||{x:100,y:100},
            data:{ type:n.type, label:n.data?.label||"", config:n.data?.config||{},
                   disabled:!!n.data?.disabled, retry_max:n.data?.retry_max||0, retry_delay:n.data?.retry_delay||5 }
          }));
          const newEdges = (gd.edges||[]).map(e=>({
            ...e, type:"smoothstep", animated:true,
            style:{stroke:"#7c3aed",strokeWidth:2},
            markerEnd:{type:MarkerType.ArrowClosed,color:"#7c3aed"}
          }));
          setNodes(newNodes); setEdges(newEdges);
          setCurrentGraph(restoredGraph); setGraphName(restoredGraph.name);
          setSelectedNode(null); setRunError(null); setIsDirty(false);
          histRef.current=[]; histIdx.current=-1; syncHistState();
          saveSnap(newNodes, newEdges);
        }}
      />

      {selectedEdge && (
        <EdgeLabelModal edge={selectedEdge} value={edgeLabelInput} onChange={setEdgeLabelInput}
          onConfirm={updateEdgeLabel} onClose={()=>setSelectedEdge(null)}/>
      )}

      {validationIssues && (
        <ValidationModal
          issues={validationIssues.issues}
          onClose={()=>setValidationIssues(null)}
          onRunAnyway={()=>{ runGraph(validationIssues.payload); setValidationIssues(null); }}
        />
      )}

      {contextMenu && (
        <NodeContextMenu
          menu={contextMenu}
          onClose={()=>setContextMenu(null)}
          onDuplicate={ctxDuplicateNode}
          onDelete={id=>{ onDeleteNode(id); setContextMenu(null); }}
          onToggleDisabled={ctxToggleDisabled}
          onCopyId={ctxCopyId}
          onRename={ctxRenameNode}
        />
      )}
      {showShortcuts && <ShortcutsModal onClose={()=>setShowShortcuts(false)}/>}
      {showSearch && (
        <NodeSearchBar
          nodes={nodes}
          onJump={jumpToNode}
          onClose={()=>setShowSearch(false)}
        />
      )}
      {replayEdit && (
        <ReplayEditModal
          runId={replayEdit.runId}
          payload={replayEdit.payload}
          onClose={()=>setReplayEdit(null)}
          onSubmit={submitReplayEditCanvas}
        />
      )}
      {toast && <Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </>
  );
}

function Root(){
  return (
    <ReactFlowProvider>
      <App/>
    </ReactFlowProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root/>);
</script>
</body>
</html>
