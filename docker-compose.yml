services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hiverunr
      POSTGRES_USER: hiverunr
      POSTGRES_PASSWORD: hiverunr
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U hiverunr"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      retries: 10

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
      # static_dist is a named volume pre-populated from the image at build time.
      # It mounts OVER the ./app bind mount for app/static/dist/ so the bind
      # mount never clobbers the Vite-built assets (which are no longer in git).
      - static_dist:/app/app/static/dist
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - ./runlogs:/app/runlogs
    env_file: .env
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}

  worker:
    build: .
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - ./runlogs:/app/runlogs
    env_file: .env
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}

  scheduler:
    build: .
    command: python -m app.scheduler
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    env_file: .env
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}

  flower:
    build: .
    command: celery -A app.worker flower --port=5555 --url_prefix=flower
    env_file: .env
    depends_on:
      - redis

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - flower

volumes:
  pg_data:
  caddy_data:
  caddy_config:
  # Vite build output — populated from the Docker image at build time.
  # Mounting this here prevents the ./app bind mount from overriding the
  # compiled frontend assets with an empty host directory.
  # To rebuild: docker compose up -d --build (recreates volume from new image)
  static_dist:
