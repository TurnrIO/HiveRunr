name: CI

on:
  push:
    branches: [main, Flux]
  pull_request:
    branches: [main, Flux]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check app/ tests/

  # ── dependency audit ───────────────────────────────────────────────────────
  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt --progress-spinner off

  # ── unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hiverunr
          POSTGRES_PASSWORD: hiverunr
          POSTGRES_DB: hiverunr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov
      - name: Run unit tests
        run: pytest tests/ --ignore=tests/integration --cov=app --cov-report=term-missing
        env:
          DATABASE_URL: postgresql://hiverunr:hiverunr@localhost:5432/hiverunr
          ENABLE_RUN_SCRIPT: "false"

  # ── container build check ──────────────────────────────────────────────────
  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Build API image
        run: docker build -t hiverunr-api:ci .

  # ── container vulnerability scan ──────────────────────────────────────────
  scan:
    name: Container scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    # Non-blocking: reports vulnerabilities but does not fail the pipeline
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
      - name: Build image for scanning
        run: docker build -t hiverunr-api:scan .
      - name: Run Trivy vulnerability scanner
        # report only — change exit-code to 1 to make this blocking
        run: trivy image --format table --severity CRITICAL,HIGH --exit-code 0 hiverunr-api:scan

  # ── integration smoke test (runs only on push to main) ────────────────────
  integration:
    name: Integration smoke test
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Flux')
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Start stack
        run: |
          cp .env.example .env
          SECRET_KEY=$(python3 -c "import base64,os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())")
          API_KEY=$(python3 -c "import secrets; print(secrets.token_urlsafe(32))")
          sed -i "s|^SECRET_KEY=$|SECRET_KEY=$SECRET_KEY|" .env
          sed -i "s|^API_KEY=.*|API_KEY=$API_KEY|" .env
          docker compose up -d --build
      - name: Wait for api container to be healthy
        run: |
          echo "Waiting for api container to be healthy..."
          for i in $(seq 1 60); do
            status=$(docker inspect --format '{{.State.Health.Status}}' $(docker compose ps -q api) 2>/dev/null || echo "starting")
            if [ "$status" = "healthy" ]; then
              echo "Api healthy after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "Api did not become healthy in 120s"
          docker compose ps
          exit 1
      - name: Wait for stack to be healthy
        run: |
          # After the container is healthy it has run init_db() (= run_migrations()),
          # but Docker healthcheck only confirms the /health endpoint responds.
          # Poll alembic_version directly so we don't depend on alembic
          # command.current() resolving alembic.ini inside the container.
          for i in $(seq 1 30); do
            # Query the alembic_version table directly — works even when
            # current() returns None (e.g. empty DB or pre-migration state).
            # Check if alembic_version table exists and has a row.
            # On a fresh DB the table may not exist yet (created by stamp),
            # or the row may be absent. In both cases we keep waiting.
            debug_output=$(docker compose exec -T api \
              python3 -c "
              import os, psycopg2
              dsn = os.environ['DATABASE_URL']
              conn = psycopg2.connect(dsn)
              cur = conn.cursor()
              cur.execute(\"SELECT EXISTS (SELECT FROM information_schema.tables WHERE table_name='alembic_version')\")
              exists = cur.fetchone()[0]
              print('DEBUG: table_exists=' + str(exists))
              if not exists:
                  print('')
              else:
                  cur.execute('SELECT version_num FROM alembic_version LIMIT 1')
                  row = cur.fetchone()
                  print(row[0] if row else '')
              conn.close()
              " \
              2>/dev/null || echo "")
            version=$(echo "$debug_output" | grep -v DEBUG)
            echo "DEBUG: iteration $i, output=$debug_output"
            if [ -n "$version" ]; then
              echo "Migrations complete (version=$version) after $((i*2))s"
              exit 0
            fi
            echo "Waiting for migrations... ($((i*2))s)"
            sleep 2
          done
          echo "Migrations not complete in 60s"
          docker compose ps
          exit 1
      - name: Bootstrap first admin user
        run: |
          # -s = silent, -w = append HTTP code; no -f so we can inspect the code ourselves
          resp=$(curl -s -w "\nHTTP:%{http_code}" -X POST http://localhost/api/auth/setup \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","email":"admin@ci.local","password":"adminadmin"}')
          echo "Setup response: $resp"
          http_code=$(echo "$resp" | grep "^HTTP:" | cut -d: -f2)
          # 200 = created, 400 = already exists (idempotent re-run) — both are fine
          if [ "$http_code" != "200" ] && [ "$http_code" != "400" ]; then
            echo "Unexpected HTTP code: $http_code"
            exit 1
          fi
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pytest httpx -r requirements.txt
      - name: Wait for Celery tasks to be registered
        run: |
          echo "Waiting for Celery task registration..."
          for i in $(seq 1 30); do
            if docker exec $(docker compose ps -q worker) celery -b redis://redis:6379/0 inspect registered 2>/dev/null | grep -q "enqueue_graph"; then
              echo "Tasks registered after $((i*5))s"
              exit 0
            fi
            sleep 5
          done
          echo "Tasks did not register in 150s — dumping logs"
          docker compose logs --tail=50
          exit 1
      - name: Run integration tests
        run: pytest tests/integration/ -v
        env:
          HIVERUNR_BASE_URL: "http://localhost"
          HIVERUNR_USER: "admin"
          HIVERUNR_PASS: "adminadmin"
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=100
