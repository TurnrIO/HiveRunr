name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check app/ tests/

  # ── dependency audit ───────────────────────────────────────────────────────
  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt --progress-spinner off

  # ── unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov
      - name: Run unit tests
        run: pytest tests/ --ignore=tests/integration --cov=app --cov-report=term-missing
        env:
          # Ensure run_script is disabled (default) — tests handle their own flag
          ENABLE_RUN_SCRIPT: "false"

  # ── container build check ──────────────────────────────────────────────────
  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Build API image
        run: docker build -t hiverunr-api:ci .

  # ── container vulnerability scan ──────────────────────────────────────────
  scan:
    name: Container scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    # Non-blocking: reports vulnerabilities but does not fail the pipeline
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Build image for scanning
        run: docker build -t hiverunr-api:scan .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "hiverunr-api:scan"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"   # report only — flip to "1" to make this blocking

  # ── integration smoke test (runs only on push to main) ────────────────────
  integration:
    name: Integration smoke test
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Start stack
        run: |
          cp .env.example .env
          SECRET_KEY=$(python3 -c "import base64,os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())")
          sed -i "s|^SECRET_KEY=$|SECRET_KEY=$SECRET_KEY|" .env
          docker compose up -d --build
      - name: Wait for stack to be healthy
        run: |
          echo "Waiting for stack..."
          for i in $(seq 1 45); do
            if curl -sf http://localhost/health > /dev/null 2>&1; then
              echo "Stack healthy after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "Stack did not become healthy in 90s — dumping logs"
          docker compose logs --tail=50
          exit 1
      - name: Bootstrap first admin user
        run: |
          resp=$(curl -sf -X POST http://localhost/api/auth/setup \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","email":"admin@ci.local","password":"adminadmin"}')
          echo "Setup response: $resp"
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pytest httpx
      - name: Run integration tests
        run: pytest tests/integration/ -v
        env:
          HIVERUNR_BASE_URL: "http://localhost"
          HIVERUNR_USER: "admin"
          HIVERUNR_PASS: "adminadmin"
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=100
